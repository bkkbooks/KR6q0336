body:
  text: 小師善遇編偈頌閑人好歌有客為愛閑人好冷眼看人忙未了自言搆得閑家珍受用一生閑不少髑髏影子能幾何去日已遠來無多利門名路苦不徹誰識我有閑娑婆閑來佛也無心做禪板蒲團何用過沙鍋水暖沸松濤爛煑白雲松粉和諸方浩浩誇談玄我已洗耳寒山泉只貪夢裏好說夢睡著不怕三千年別有一閑不如此不遭十二時辰使伸拳放出虗空華觸碎涅槃與生死便能掘地求青天逼拶佛祖成風顛驢胎馬腹撞頭入劒樹鐵網橫身眠咲他枯坐忘昏曉外似閑閑中擾擾都緣不奈牯牛何驀鼻牽來還入草寧知絕處有生機靜却喧喧閙悄悄有時圓鏡裏藏形帝釋散花無處討有時閙市裏挨肩銕壁銀山但靠倒箇是吾儂格外閑離此別求吾未保廬陵亦有閑道人通身自被閑圍繞等閑一語忽相投為伊歌作閑人好絕照講主棄教參禪經有經師論有論師大唐國裏無禪師古人一摑一掌血是痛是癢誰曾知當時德山好箇漢明眼人前三尺暗紙燈滅處喪精魂經論把作冤讐看豈不見曹溪賺殺老永嘉破家散宅尋生涯葛藤露布擺不脫入海依前去筭沙禪與經論果何物有師無師誰辨的草鞋跟底金剛圈佛來祖來跳不出絕照座主生緣古荊無佛無祖海上橫行有時問禪却答教徹骨窮來思古窖有時問教却答禪三箇胡孫夜簸錢有時又向諸人道教禪總是閑之繞待我吹起殘紙燈照看龍潭德山面皮厚多少送翠巖藏主一大藏教是切脚那字何曾切得著向他問處一默酬總是顢頇懡㦬休既非一默又非語只貴點頭自相許點頭自許也不然擔板禪和見一邊這邊那邊不恰好若未到家俱不了翠巖禪者不受人瞞離却這箇別著眼看見成句子非心境門近洪崖千尺井非境非心作麼參石橋分水繞松杉便恁麼去成粘縛不恁麼去難湊泊何如瞥轉一機放教磊磊落落是甚麼西山走入滕王閣贈天台宗無礙辨師盡十方是箇自己獨露堂堂無可比恒河沙劫只在一彈指間三世如來只在一毛孔裏等閑眨得眼來早是白雲萬里地自地天自天山自山水自水本具者誰變造者誰你不似渠渠不似你曰心曰佛曰眾生萬別千差從此始累及黃面瞿曇只管粘頭綴尾說實說權指事指理引得龍猛老漢論假論空達磨大師分皮分髓無端好肉剜成瘡白日青天眼花起疑團栲栳鈎鎻連環誤賺來學胡躋亂攀進一步銀山銕壁退一步銕壁銀山不進不退平地牢關若是箇定動衲僧豈肯似瞎驢趂隊如來禪與祖師禪信手拈來百雜碎理也無礙事也無礙諦境也無礙觀智也無礙乃至辭無礙義無礙千差萬別俱無礙無礙之無亦復無是名絕待真無礙到與麼時更須點檢王老師頷下眉毛在不在若於絕待處承當行人猶在千峯外存心室歌心不可存可存非心虗空背上釘木橛娑竭龍王痛不禁心無定所操之則存蚊蚋吸乾東海水藕絲牽動銕崑崙格外之存不如是放之不行把不住一身普現一切身一處普攝一切處少林直指熱椀鳴二祖求安揑恠生牛頭觀底是何物打失自家雙眼睛道人作室天目頂以境示心心示境心境雙存人不知如井驢驢井火聚刀林正法幢魔宮鬼國菩提場紛飛妄想入正定雜樹變作旃檀香存與不存無不可眾生心佛全包裹客來更擬定誵訛拈起橘皮喚作火耳裏著得水眼裏著得沙莫問是不是莫問差不差有佛無佛莫亂走也莫將身藏北斗萬仞崖頭撒手時聽取一聲師子吼送安上人歸廬陵跨牛菴廬陵米作麼價鄉人眼空四天下若喚作禪機鑽頭無縫罅若不喚作禪機早是逼龜成卦兩頭坐斷解承當許你銕牛顛倒跨你是廬陵人我說廬陵話若言老漢有鄉情三千里外遭人罵題了堂禪師松風堂圖松而不風聲不吐風而不松不成語謂渠有情渠不知謂渠無情渠不許聲不孤起從緣生聞不自顯因其聲聲聞究竟本同體物我孰辨情無情龍吟枯木怒潮走萬鶴起舞仙珂鳴夜肅師行響金銕壯士劒吼神鬼驚或言入耳便心閑或言靜聽聲愈好靜喧截作兩頭機等是隨塵性顛倒了堂松風獨不同松堂攝歸圖𦘕中𦘕堂𦘕松默無語來者撥草徒瞻風風無形狀誰曾識聲相本空無起滅無起滅處眼能聞閑却一雙新卷葉靈溪歌靈源浩渺無東西九淵之深比不齊乘機乘勢忽發動流出一派為靈溪靈溪西來十萬里決石排山誰敢擬奔湍泛濫過曹溪十八灘頭俱漲起靈溪之湛也如含古鏡之光照人面目難覆藏靈溪之鳴也如聚萬鼓之發喧轟海嶽聲浪浪德山之棒震風雨激濁揚清未輕許臨濟之喝驚雷霆逐浪隨波成錯舉偃溪入處非真聞虎溪舌相尤妄傳古渡打濕洞山脚淺灘飜却華亭船大地羣靈漚生漚滅三世諸佛頭出頭沒急流勇退無先機淹浸何止千七百或謂溪無靈溪之惡毒難具陳或謂溪有靈溪之妙用如有神溪靈不靈吾不可以智知而識識君其問取松江江上靈溪源上人題金上人血書華嚴遮那身住虗空土垃圾堆頭寶光聚普賢行海知識門萬派百川同一源七處九會因行掉臂四分五周看樓打樓塵說剎說熾然說真佛現前難辨析海水為墨須彌筆從古至今書不得彼上人者別展神通了知行布不礙圓融攝遮那身土於十指頭上含普賢境界於一毛孔中針鋒一劄文彩露血滴滴地談圓宗紫雲行空現樓閣雨染雜花春樹紅五十三人口掛壁風前疑殺善財童懶牛歌懶牛一生嬾入骨自是天然懶標格堂堂露地三十年頭角崢嶸人未識既不入桃林羣隊又豈受溈山鞭筞犯人苗稼久無心鼻孔撩天穿不得春山蒼蒼水茫茫烟莎露草春蹄香渴飲飢飡隨分納卷桐聲外眠斜陽抖擻渾身空索索珍寶大車難繫縛三界無家何用歸平田識路俱成錯五千四十八軸閑繩頭惹著絲毫不自由一千七百箇未了漢牽犁拽杷何時休人言懶是偷安計我懶豈容人妄擬有時力挽不回有時興來自起觸碎微塵剎土欄𣙢無門踏飜祖父田園虗空沒底政恁麼時不妨寄語老東山尾巴不在窓櫺裏送道林訓書記南匾頭沒伎倆疑著洞山三頓棒却來註解趙州婆道有道無爭倔強殊不知萬法根源只在一毫端上一毫端上見根源猶是眾盲同摸象所以馬大師一扭扭折百丈鼻梁一踏踏倒水潦和尚又道自從胡亂後三十年不少鹽醬全放是收全收是放當時若會這一機莫道老慈明佛也難近傍山僧與麼指點黃龍敢問道林書記是贊是謗若也緇素不行佛手驢脚生緣更下一分供養可庭歌可師立處一庭雪金剛脚跟凍欲裂覓心不得便心安敢保老兄猶未徹一方明月可中庭妄認浮光昧己靈未明光境俱亡話屋底窺天天杳冥別有可庭非此類以可為庭無向背萬象交參齊點頭誰道我宗無肯意有時揑聚輪圍山浮幢王剎手可攀佛佛祖祖落階級只在周遭簷廡間有時放開空索索十方洞然無壁落堂上一呼人不聞舜若多神隨應諾黃葉飄飄砧杵中脩廊浩浩鳴松風生臺得飯鳥聲樂一一代我談心宗今人未信吾言直門戶萬差難可測虗空落地已多時栢樹子不肯成佛却請盤龍詎可庭為他露箇真消息中洲歌我聞毗盧華藏海海面湧出蓮華王華中持地若洲潬其地堅厚皆金剛洲中復現海無數海復現華若雲布一一華持地若洲各有剎種依洲住種中現剎數復多剎剎相依如蜜窠一剎一佛一眾會各現相好光交羅又聞有說不如此於諸法相俱無取大海吞在一毛頭諸佛安身無處所若執有相非作家天地之隔毫厘差海洲洲海本非實一切世界猶空華又聞非空亦非有拈得鼻孔失却口盡在當人一念間二由一有一莫守楚士有海禪家流因海得號為中洲我持如上三種義試問中洲會也不中洲曰恁麼也不得不恁麼也不得恁麼不恁麼總不得仰天一咲忽忘言雲盡湘潭暮山出金陵行有一句㝡揑恠山圍故國周遭在有一句㝡𣯧潮打空城寂寞回山是山水是水平地無端骨堆起水非水山非山五花猫子身無斑衲僧格外有一著道是道非都剗却也解拏空塞空也解將錯就錯漢來現漢胡來現胡釋迦彌勒猶是他奴鉢袋傾出四大海草鞋踢倒須彌盧非心非境非三昧絕照講師知此意摟飜教窟與禪窠却道古人都未會第一要問牛頭融第二要問鷹巢翁杖頭鬬起金剛鑽奮迅勢若龍翔空我似大虫看水磨又如牛向窓櫺過雖然脚債還未清學得蘇州呆打坐這箇這箇及那箇與麼與麼不與麼待君勘辨歸來一一為吾說破吳門清上人遊天台石橋那畔有一路只在轉身下床處虗空踏得脚跟牢橋流水流誰暇顧華頂峯前有一關只在推門落臼間門裏門外總莫問但見滿目皆青山衲僧能舍亦能取大地撮來無寸土有時百億閻浮提放開只在秋毫許此話雖靈信者難今人不受古人瞞山高水深路長短親到一回心始安瀑龍吼空山欲動萬雷急鼓犇相送浪花飛上蒸餅峯六月陰崖雪霜凍雲鎻通玄路不通國師去後無遺蹤頭陀坐石𦘕難就明月在泉烟在松半千尊者何由見陽𦦨空花是宮殿點茶莫認茶中花花前認取娘生面興䦨政在下山時山水絲毫不可移離聞離見得消息誰去誰來應自知有問石橋亡恙不那時切忌輕開口又問華頂今如何掉臂便行莫回首若問靈巖與虎丘不妨向道蘇州有送淨慈別流涇藏主歸湖南為乃師銕牛和尚建塔銘我也不會說禪釘樁搖艣三十年禪也不會我說赤眼烏龜喚作鱉依稀南海老波斯牙齒生來半邊缺拍盲爛嚼虗空渣吐作炎天三尺雪洞山麻三斤雲門乾屎橛拈來一處看不覺腦門裂何似別流機更別銕牛之子金駢脅蹉脚踏飜西子湖出摩尼藏中楔三世諸佛被渠橫吞口縫纔開雷奔電掣此行歸去靈雲山要向懸崖峭壁上磨出先師金剛眼睛却把髑髏都屏疊臨行求我下轉語我無語千里萬里一條銕無文奎藏主喫粥了洗鉢盂去趙州死句是活句向他開口處承當者僧道悟何曾悟箇事本非悟得又非直下現成如密有砒綿有刺動著絲毫即禍生一大藏教臭肉爛鮓千七百則烏焉成馬仰山解用藤條總是之乎也者我一手搦一手擡放之不去收不來且無一法繫綴汝待汝他時眼自開眼開提起無文印萬象森羅都印定印破空王銕面皮三世如來從乞命歸去橫推六字峰納在蟭螟眼睫中拈一莖草打噴嚏萬壑凜凜生清風有問吾儂著落向道無你摸索龍王吞却夜明珠海底泥牛鬪折角無等功藏主開口咬著舌洗面摸著鼻明明百草頭明明祖師意當年黃檗有眼睛六十痛棒打臨濟打得臨濟掣風顛逢人吐出粥飯氣大愚喚作老婆心喪盡衲僧窮活計擊著南邊動北邊張公喫酒李公醉若是英靈大丈夫豈肯問人求解會陽𦦨空花撮聚來一揑虗空如粉碎却向自己胸中流出蓋天蓋地有時越格示一機攪得藂林成鼎沸蒺藜輥作百花毬橫拈倒用如遊戲是名無等等功勛亦名無等等三昧直饒達磨再來賣弄百千鬼伎只消搖手向他道老兄老兄那裏洎希雲悅藏主雲峰之悅眼見鬼精魂落在桶篐裏指點他人藥汞銀破桶自家提不起希雲雖與悅同名娘生鼻直雙眼橫頂天立地作活計一步不肯隨他行曾向獅巖遭一拶機前學得飜身法倒握主丈江東西拍盲撞倒張三八石耳峰連馬耳峰三喚如雷聽若聾海藏摩尼都潑撒龍翔觸撥僧中龍此行會我吳門路狹路相逢沒回互掛起風霜銕面皮為他勘辨同參句塞却現成途轍摟空舊日生涯也解虗空揣出骨見佛見祖如冤家斬新號令超今古別有一機須薦取揭飜狗䑛熱油鐺打作藂林塗毒鼓寂上人遊五臺寂而常照照而常寂百億毛頭師子師子毛頭百億我真文殊無是文殊舉著當機不薦目前遠隔程途只如僧問臺山路婆子向道驀直去趙州勘破沒來由古今疑殺人無數上人此去挽不留要勘文殊并趙州肩橫楖慄徤如虎破衲價重千金裘清涼石上雲似水六月寒風氷骨髓攝身光裏見文殊隨人拜倒隨人起前三三與後三三見了文殊政好參若遇善財莫相咲牛頭自北馬頭南用邵菴虞學士韻送楚石首座道人途路即家舍也曾三處度殘夏邵菴居士識此機咲他坐破蒲團者大千揑聚一毛端萬斛驪珠恣揮洒鐵蛇橫路斷人行破山怒雷吼春夜曾是毗耶詐病來現陰非取前非舍世人言下探淺深兔子渡河疑象馬自稱瞎漢眼生花佛亦被他瞞了也渠儂用處楚石知此去重登芘寒廈眉間拈出金剛王截斷舊時長脚話贈洞山藏主東山道箇鉢囉娘渾侖吞却一大藏雲門颺下一片柴生銕蒺䔧難近傍誰知弄到如今飜成不了公案俊快衲僧當斷即斷會得㝡初一機便是末後一段沒誵訛處却誵訛殺活臨機無榜樣豈不見慈明激發南匾頭只消洞山三頓棒次篷字韻道林書記與立卓峰二三禪友用篷字韻一再唱和既已成卷復於余言有所須隨喜兩篷聊當行贐船子不具眼度水尋魚蹤斫盡釣竿竹踏飜波面篷近年有錦鯉不落虀甕中擘開龍門浪點額成點胸回頭咲我懶坐殺殘與融問我舊行路漿水錢誰供我聚百千海毛吞廓有容勞汝探深淺從西復過東古人用棒喝掛角羊無蹤如經惡毒海艣棹隨篙篷覿面一蹉過躲跟窠臼中漆桶既不快換手徒槌胸道林脫教網氣壓生肇融徵我棒喝話屎腸無可供老大會魔說人情無少容北斗面南看瞿耶尼在東用月江和尚韻送一如藏主昨夜西風撼門扇鄮峰關棙深難見後二十載松月翁為渠和臼重推轉一如振錫甞造門栗棘便解渾侖吞捋猛虎鬚打𨁝跳就地踏飜風水輪去年喝石巖前路拈出東山切脚句萬丈龍淵徹底乾搆取驪珠下山去鉢袋中藏蠱毒盂氣吞佛祖誠非虗重來江上見松月下視龍象皆黔驢老鰕之屈為其子落草之談不成語閩蜀同風話㝡靈此去逢人莫輕舉送法眷順菴歸禾山白雲峰坐臥非禪禪非坐臥口縫未開早成話墮六字峰頭有一機祖父不曾輕說破累吾與汝向外馳求有佛無佛都走過二十年間兩相見查查牙牙俱老大汝既知水漲船高我亦道飯是米做諸方浩浩今何為轉大法輪水推磨水銀不敵阿魏真巴歌將作陽春和若之何兮爭奈何政與麼時堪作麼白雲峰下汝當掃跡歸來師子林中吾亦橫身打坐莫隨祖父脚跟賣弄陳年滯貨豈不見道吾舞笏禾山打鼓盡是勾賊破家燒香惹禍三世諸佛一口吞千人萬人箇半箇歸善室歌太湖山上君祥錢作歸善室栖吾禪入門一見眼卓朔坐久稍覺身安便人言善惡本無性取捨悉由情變遷捨惡取善曰歸善惡去善存猶是偏善歸極善善亦捨歸至無歸性始圓亦如設藥以治病病止藥除神自全山僧用處不如此善惡取捨無擇焉見佛不欣魔不厭出生入死皆隨緣主人共我室中坐我坐既倦還復眠興來曳杖出門去摩挲老眼湖山顛湖山倒壓天在水天水水月光相連仰觀俯察天地闊萬象歷歷森吾前初疑湖山共一室又疑一室容大千大千廓爾徧法界徧界羣昏俱了然佛法無所用其說祖燈無所施其傳兩岸中流人不見山前閑却過湖船送玉磵首座禮祖達磨未來那一著獨露乾坤空索索無端覓心又覓罪重重鑽破靈龜殻君不見破頭山下栽松钁撞入禍胎揚醜惡至今濁港水橫流兩岸行人難湊泊又不見黃梅夜半神鬼喧墜腰石在無人傳後來喚作銕酸餡滿世有口誰能吞何況牛頭之融鶴林之素橫出一枝閑露布亂拋無孔生銕鎚擊碎虗空重錮鏴承虗接響熾然異同正法既掃土滿眼皆魔宗君亦浩氣如秋虹早曾拶倒雙峨峰此行為我拔魔壘手握主丈猶獰龍海門一關攔不住雷電鼓舞號天風石頭城外打𨁝跳怒浪捲起長江空不然劃斷淮山路轉身直上𭅖廬去坐看銀河落九天南山起雲北山雨托鉢歌衲僧家無活計又無祖父閑田地靠箇隨身黑鉢盂飢來喫飯困來睡古佛棄却金輪王領徒乞食遊城隍兜羅綿手捧鉢出千二百眾生威光鉢盂喚作多寶藏逐日生涯無限量現成受用學無為佛與兒孫為榜樣鉢盂喚作長熟莊古佛化飯吾化粮化粮隨意作粥飯雨濕風寒都不妨鉢盂只是一張口其量不過容一斗有時吞却太虗空千倉萬倉無路走夜半曾將付老盧黃梅一眾驚相呼曹溪降得惡龍住拍拍正令行江湖趙州喫粥洗鉢去禪者疑團頓開悟德山托鉢下堂來會得巖頭末後句維摩取鉢來上方飯顆如珠爭煒煌百萬大士同一飽毛孔七日猶生香鉢盂靈妙說不盡佛祖仗他延慧命持來折我憍慢幢發汝施心生正信今年施了又明年年年來結飯僧緣我圖成道故持鉢道成為汝增福田此事有因還有果施少施多無不可你若慳囊不肯開是你無緣蹉過我我不作化疏亦不持飯籮聊將佛祖求道意寫作長篇托鉢歌有人指我歌中病咲我未空文字性言多道遠佛難成鉢盂何用重安柄我咲諸人病更多鉢盂無柄却誵訛若還摸得柄在手成佛何消一剎那勸世十首有生有死大家知知不回頭也是癡傀儡一棚看不厭可憐終有散場時驢事未了馬事到鉤鎻連環沒斷頭只管今朝又明日等閑蹉過一生休蜣蜋負糞長嫌少老鼠搬金不怕多只道臨終將得去臨終却不奈他何病來便作死承當箇是單傳秘密方你若目前無主宰落湯螃蠏沒商量得休休去便休休放去收來總自由畢竟勞生非久計休將妄想掛心頭脩行如買世間物肯破慳囊事即圓只把口頭閑議論恰如著價未還錢不知那箇是我性反覆看渠渠是誰驀地相逢親識破如魚飲水自家知工夫一步緊一步銕鑄牢關也拶開父母未生前面目還他親見一回來密意從來在汝邊通身都是祖師禪自家痒處忽抓著海底蝦蟆飛上天一念不生成正覺古人開口見心肝機先若解承當得快便何消指一彈吳門送牧幻藏主之江陵十首會得雲門六不收行藏無處覓蹤由姑蘇城外聞鐘意却在江陵石馬頭八角磨盤生銕鑄秋毫才動泰山傾那吒費盡腕頭力攔不住時須放行蘇州有與常州有湘北湘南誰道無酒好不論深巷裏醋酸何必大葫蘆龍潭滅燭口唇焦南嶽磨磚臂骨勞牧幻道人閑不徹江陵水長看船高牧真牧幻絕商量滿把摩尼解放光拈却盤山光境話佳聲從此播諸方丈六金身一莖草一莖草上現瓊樓陳年公案忽靈驗頑石聞風也點頭三世如來一口吞古人事出急家門却將教化眾生事千載相傳累子孫白蓮峰與白蓮橋幾度交參話寂寥一句現成曾舉似銕牛背上刮龜毛碧眼相看兩不疑屎腸抖擻見家私臨行縱有堪持贈也是重添眼上眉不是冤家不聚頭行人莫與路為讐淡交雖似水無力却也能勝萬斛舟山居雜言十首拈得尖頭小屋兒諸方公舉兩無疑有時地黑天昏去也被雲來奪住持佛法文章一字無柴床對客觜盧都胸中流出盖天地老倒岩頭牙齒踈憶在蘇堤過六橋小番羅帽被風飄滿頭帶得湖山雪幾度驕陽曬不消齒搖面皴髮星星眼裏青黃不蹔停有箇不隨他變底鄉談依舊是廬陵剗草分明錯用心殿前回首翠林林工夫用在皮膚上根脚誰曾見淺深髮生道我法財寬白紙相呈請破慳誰信山僧空好看剃頭錢是別人還語言學解弄狐疑莫費光陰強記持多少英靈被埋沒白頭忘却出家時野牛浪蕩本無家纔擬關攔事轉差徧界是國王水草任他隨分納些些賓中主即主中賓逆順縱橫莫認真狹路相逢解回互閙籃政好著閑人鼻孔裏有三寸氣眉毛下有三寸光好箇西來祖師意問人都是錯商量能上人回廬山省師舊日廬山舊眼看阿師有甚不平安放蠅莫打紙窓破風雨落花春政寒夢菴三世如來眼未醒昏沉妄想立門庭客來不把拳頭竪寐語從他隔壁聽玉圃鑿開頑璞得𬅿子瓊樹瑤花種滿林却咲祗園布金處近年荒草沒頭深天目純上人歸萬峰菴瓦鼎煎茶嚥芋頭萬峰茅屋記同遊開門趕出睡魔去放入松蘿月一鈎枯木岩前舊路頭松花滿地沒人收藂林佛法無多子倒握烏藤歸去休福首座禮文殊文殊相見福城東有語須防是脫空曾道南方有知識百城走殺善財童靈頭陀往五臺都道文殊在五臺幾人親到却空回頭陀主丈有靈變為我一肩挑取來古關二千年外立宗風把定禪門第一重千七百人𢬵命拶至今歸路不曾通觀上人禮補陀補陀巖畔去何求不見觀音誓不休見了觀音當自咲元來胡餅是饅頭隆上人回廬陵青原老漢得人憎慣用危機辨衲僧米價至今無倒斷相逢莫說是廬陵無言演上人閱華嚴了心非法法非參勘破南方五十三烟水百城知己少低頭各自打鄉談保寧銕舟首座歸新羅保寧有箇金剛鑽首座傳來用處多變作無毛生銕銕舟載取過新羅空菴裏許洞然無一物能含法界也虗傳趙州不具機前眼被箇拳頭礙却船贈劉鶴心會讀能消多少書㝡聰顏子却如愚丈夫莫被聰明使能使聰明是丈夫盡大地人都病瘧從生至死不曾閑一年一度發寒熱汝瘧明年五十番向聞遇風彭蠡湖大舟欲沒神鬼呼驚魂脫死亂不定一夜白却三牙鬚如海比似滄溟納眾流滄溟元不是同儔世間何物能相似惟有虗空似一漚古耕威音王世墾荒丘留與兒孫種復收今代未知承佃法教人空手把鋤頭贈費子潤并引費子潤者松江上海縣人也其父謙甫嘗被盜里有念佛婆子累受謙甫周急之惠一日持金珠來賣乃甫被盜之物甫寞厚隱而不問家有寵妾謂婆曰汝賣賊贓事發不汝累乎婆始悟且懼遂自刎而死未幾妾有娠將誕之夕夢刎婆入臥內妾叱之婆曰吾與謙甫有宿緣當為作子過五年汝當償吾命及覺而誕子潤是也生五年其母果卒子潤今四十餘歲矣生而頸有刎跡不脗以手按之則鮮血津津而出至今猶然余目擊之其事恠甚因述三偈以贈令知報償之說不誣而業力有不可思議者也婆子前身子潤知報緣影響巧相隨皮囊脫換名生死能死能生箇是誰誰死誰生認不真胞胎出入豈由人㝡憐業力難思議刎跡相傳到後身出胞胎又入胞胎百劫千生與麼來誰解髑髏前照破摩醯眼在頂門開禪人以偈見呈索和凡三首紙上傳來說得親飜腔易調轉尖新是人愛聽人言語言語從來賺殺人長篇禪偈短篇詩我又如何敢措詞倒腹傾膓無點墨看人文字眼如眉說甚全潮與一漚定盤星在秤無鈎陳年滯貨誰曾問羊店即今懸狗頭送徑山誾首座歸住盤龍且勉其復出夢升兜率在凌霄夢覺和光把手招井底蓬塵飛一點龍峰增起插天高換一機來答問漚秤鎚落井也教浮盤龍三十六盤路須信盤盤有轉頭贈海上人掛角羚羊跡已懸追風良馬不容鞭脚頭脚尾忽蹉過又隔途程萬八千直下承當也不難通身慶快始心閑衲僧行履如遊戲平地何曾有嶮關示天目同參五首天目元無道可傳神頭鬼面認難全先師不具參方眼見得師翁鼻半邊曲踛彎闌不是禪單傳直指也徒然古人一度被蛇咬三二十年疑井圈波斯臘月嚼寒氷灼艾眉間救齒疼今日思量當日錯病源不在灸瘡痕爛葛藤窠滿道途諸方邪法愈難扶熱油鐺子掀飜看火性如今尚有無燈籠一咲口喃喃露柱橫吞師子巖接得當時第三句老僧許你是同參水西原十首并引至正丙戌余年六十又一緇白諸禪友念余不知老之將至乃裒錢買山六七畞於虎丘之南二里許為余作歸藏之計云今年丁亥秋九月戊申作門于水際榜曰水西原廿一日庚申預定葬所穴而甓之徒僧善遇手刻于石納諸穴以志之曰師子林開山老人之壽藏也穴之上覆大石以為塔之基河西大師唆南獻巧以圖塔樣高丈許塔之正體南為門而洞其中以安無量壽佛佛高一尺有六寸紫石琢而黃金塗使天人鬼神知所敬仰十一月九日塔按圖而告成前為軒似舟扁曰山舟皆諸友之力成之也立卓峰買舟載余往觀之舟自半塘而西過金氏圓覺菴又西過掠象寺不遠水忽盡而舟及門矣入山行數百步路轉而折萬松間一塔出焉於是或循塔而行或乘高而望或倚松而立或踞石而坐或語或默皆作已滅度想既而復自念曰生本無生吾其果有滅耶滅既無滅吾其果歸乎此耶不覺隨意顛倒衝口而發說十偈以紀之噫古人有自祭者有自狀其行者有自銘其塔者皆足以傳誦於人而垂化於世也余敢望於古人哉自警自訃而已大千世界水西原百億須彌是土墳無位真人埋不定又添一穴累兒孫業債如山不可摧當死隨業受輪廻是誰望我先成佛平地無端起骨堆胡孫樹上掛心肝弄鬼精魂有兩般未死先埋留活路龍睛虎眼不能看仙人禮骨鬼鞭屍恩怨難忘合共知珍重娘生皮袋子是吾弟子是吾師鍬钁隨身不露蹤虗空掘窟葬虗空虗空一夜生頭角穿破白雲千萬重兒童好看活屍死行去扛來喚不譍喚不譍時當自悟活時元是假精靈鑽天子落黃泉脫殻烏龜飛上天半死道人渾不管自敲瓦礫筭流年曾從演若學狂來老大新添一種呆生死海中狂不盡安排狂上涅槃臺山似排班水似朝萬松繞座似兒曹相看一念萬年去老子門庭未寂寥地涌浮圖未足誇風流須出當行家髑髏眼裏春風動徧界吹開五葉花
