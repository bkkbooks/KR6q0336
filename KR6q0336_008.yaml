body:
  text: 小師善遇編答木林和尚別時別處猶昨夢不可記每念同參幾何死者過半存者東飄西泊落落晨星惟足下燕坐深山道俗歸化余嘗謂法雲一宗未必便掃土者此也比辱教汗亹亹連幅鋪敘二十年間往復離合之緣而過分贊美似非家裏人說話余敢當此哉承索會解楞嚴此則劣者不了之公案也未償之宿債也昔幻住老人語余曰楞嚴一經禪者多取以為準的吾嘗就徵心辨見處略加指點而全經大旨尚缺發明云云又命足下取武昌魏靜復所寄新刊小本經一帙付余余亦默領其意當時此一段話獨足下與聞之余謂足下忘之矣今忽見索是代老人刷稽遲邪催宿逋邪使余愧悚不已然草創之本成已多年特未暇刪改故亦未敢以寄勢須會面當持以共讀云與義海都正江西受業二僧歲旦日至謂吾母年七十八望歸省傳族黨諸弟兄親鄰朋友法屬勸歸之書堆滿凡華亭諸公雖甚欲強吾留而不可因得乘興一動及至杭適漳寇敗一路班師擾攘咸謂不可進遲延久之立卓峰又領徑山書記之職念其二三十載死生憂患之伴一旦棄之不情故止西江之行登山相守秋未決意來訪復因他事左牽至蘇從而遷延不及見吾義海也世態如碁著著是變所在藂林不堪措足惟欲向青山碧雲有水有竹處尋箇放莆團位蘇人知余心懼余他適遍城裏城外為尋之皆未敢輕就蓋亦有歸省之約未酬意擬輕包暫歸而即出却來杭蘇山水間倚松結茅相招義海柴床地爐煨芋酌水相娛以送殘年此余念平生不可忘之道義而欲挽足下盡未來際常為法侶之願也然行止去就俱未有的期茲因天目人回先布此意山川之遠歲月之多問訊之踈想念之切與夫顏𩯭衰朽故舊凋殘法社荒寒人情變遷之感凡縷縷欲言者皆在書外與物外長老頃嘗共絶際翁扣關丈室寒爐夜燈煮茶聽雪曰主曰賓同入物外機境今思之十五年前陳迹也眼中故人十喪八九世習日移愈趍愈下惟老師坐斷荊溪照了諸相視隨波逐流之輩果何如哉區區託隱唳鶴灘頭者十有二稔澤國渺茫雖欲奉一狀不可得也今夏偶出遇徑而止九月會無礙居士詢道履而未詳十月抵吳門借幻室一榻為度寒計因希雲藏主來始得遣是楮也希雲別余十七載相見如隔生其受業有藏無經得得來扣蔣公大長者求四大部以榮其歸煩老師為之宛曲導請使法寶流布於大江之西則蔣氏法施之福物外成美之功希雲得法之喜皆當與經同為不朽者也助人求法諒不避言答友雲長老舊游張公洞宿留金鵝峰聞保安伊邇而未及到蓋古寺殘僧相知者少耳江山有待得足下一來寺之興復可想見矣近代諸方建葺務以勢利侈華相勝鮮克以行道接納為心保社之衰病政在此吾意友雲力弘祖道推誠以待衲子必自有神物助化使施者雲合響應又豈在言語間哉余所寓半間草屋衲被蒙頭其凝塵積灰埋筆硯者深數寸矣源西江來承委撰疏投我以雙墨乃守待三日不容辭於是報之以數語耳答梅孝子久矣絶聞問忽得孝感詩文玩讀不能已聞者惻然有感欣然相傳遠邇唶唶稱羡宇宙間誰無父母凡為人子者誰不思孝求其動天地感鬼神見稱於人而人所敬服可以裨教化可以激流俗者一代之間曾幾人哉足下孝心純至故感靈異如此非特延母之壽其或增自己之福致子孫之顯皆未可量也承索鄙作聊奉短序一章繫之卷末未由瞻對以寫我心不匱錫類之辭為君三誦答別流藏主避影林壑間今十年絶交文字亦已久矣比承下顧以鐵牛師叔翁行述見喻萬不獲辭謄其實以為求銘之藉手耳政恐不直大方揑鼻一笑古愚來乃枉書以言謝何至是哉竊謂老和尚飛聲八紘取信千載者固不在文字間此蓋孝子順孫之心不忍不為者以足下用心之誠若此其所激發者何限亦何事而不集然世故日變時不待人惟勉之速之是所囑也秋涼杖錫必動未知再見何處何時臨楮悵悵又己卯春松江送別明年余亦別松江度夏雙徑又明年客吳門幻住會臨川楚石首座謂與足下解逅於虞公之門因舉塔銘一二語復舉虞公問先有鐵邪先有牛邪足下答云先師親見仰山來虞笑曰吾試為汝模畫之余聞是語嘗有頌曰鐵牛誰後復誰先口未開時缺一拳好本弄成模畫去牽犂拽杷錯流傳所恨未見其詳今壬午七月二十六日承書及所抄全文讀之欣躍不已以靈雲老和尚真證實悟之道簡編不待書金石不待勒而其昭晣堅確舉天下後世孰得而磨涅之哉然虞公為當代董狐得其隨分發揮數語非特塔銘取重蓋亦有補於化道也觀其筆底餘波激揚吾宗盛衰之迹有總有別或引或却明敲暗磕次第歸重於靈雲老人然後假老人榜樣擊策來學吾以是知此老眼空諸方舌頭拖地是亦吾門中在家說法之一善知識也刻而傳之使聞者有所感發其於化道之補豈小小者哉望速成之復示石本則幸甚松江地卑多水不復往矣今吳群東河有地數畞古樹竹石如山中幽僻可愛遂以衆施之力得之就樹下作小屋數間正月作二月成三月入居之已過一夏又秋矣二時粥飯仰給於施不足則持鉢以補之諸方公選私舉一皆謝絶日與同志之士收拾天目山蘿蔔頭莧菜根東咬西嚼聊以自娛其不甘枯淡者過吾門而不敢入也自己卯至是凡四年出處趣向如是而已其他不足言答費總管雲間歸時假道海上適騎從他出不及晤言以慰契濶得敏之西英數客共坐雪洞之中周遊梅圃荷堤滿眼皆主人風度雖不見猶見也比厪惠問良佩撫存而浮蹤以無住而住栖隱闔閭城古檜高竹長夏如秋何時得公過我淨洗人間箏笛耳偷半日間說方外話亦一佳會也世味如酒能使人既醉且狂倘於未飲之先或半酣之隙冷眼破寧不悟醉者狂者之可憐哉答可庭藏主殘年風雪中蒙衲枯坐有時恍忽江陵入我清夢有時大開兩眼如見江陵點檢將來初非人境遷訛又非識想變造蓋只為江陵有未歸之客耳因自笑參方三十餘年視朋舊散聚之緣如飛花落絮無絲毫滯情與足下相識最晚相交又最淺何獨若此之拳拳哉蓋亦以道義之懷相知頗至相念頗真相託者頗多而相聚之日獨少故乃爾耳自五月別至十月凡三度遣書臘月領來翰知兩書已到惟第三書未達即日想亦達矣書中所報師子林禪室之營稍見就緒者大槩務從苟簡以圖速辦而已此外未辦固多姑待他日每思三界往還同一旅邸勞生擾擾有甚了期而況二三子相依相從所圖何事惟欲與之攝心寧處豈忍使其困於土木間哉奈何邇來時有信慕之士相率相過請法請戒而室隘無足容二三子又動東偏別築之念既未有獨力任辦又不欲苟求人倘非足下與謀吾未保其能辦茲事吳門諸道友每會必曰可庭別時謂江陵之事一語可決約在歲盡必再到吳可庭信士也義士也安有如此信義之士而肯妄語失約今之過期而不到者過在無催歸之書也余意則曰築室之謀固可寬道聚之念為最急以故今度之書專為催歸而發今書既發則諸友之望日急而余之開眼作夢又有甚於前所云者矣足下其能忍於不重信義不急道聚而為江陵久淹之客乎又癸未十月末得所寄書殊慰想渴荊南人境事物歷歷如在眼前兩浙高下皆熟連三載無水旱憂視他處氣象頗殊林下一鉢亦隨分隨量而已八月復到上洋慶贊新佛受薄施歸門外檜行之側各作矮磚墻開二小門入東西圃小池四岸疊以蠻石而青石蓋之繞池石闌之外作小街道池南種竹數箇池北撤去舊籬古柏臨池如蓋樹下灑掃列瓦鼓為數客坐處禪餘飯罷儘有負暄散步之所矣此等皆瑣瑣微事何足言者蓋足下嘗同經始一木一石皆知來歷故今日瑣瑣工役亦必具報云爾此來百務俱寢與衆宴默同處俯仰攀緣悉非吾事門巷憧憧氣味不相入者亦不敢扣吾關也況自四月以來文字應酬一皆杜絶嘗謂近時學者不肯向無依倚處著工夫不肯就最險峻處放身命往往挨籬傍壁猶自不能動步病在一知半解粘手綴腳所以不得獨脫自由何況宗師家不以本分草料待人偶爾狹路相逢便牽引爛葛藤窠沒頭却彼此纏繞無出頭分先幻翁痛嫌此斃故一世費盡口業以言遣言大似靈龜曳尾無可奈何以區區視古人奚止天地懸隔今之所以杜絶應酬者且圖自家省緣亦免引人入草筆便及此不自顧其醜也十一月西山間有願聞法要者倡率成會余懼其勞擾乃往就之山東西遠邇數百人一時皆發道意由是盤桓六七日方歸此類應酬又在杜絶之外惟足下知余意也與普達實立副使逼仄禪窩嘗辱繡衣臨賁龍梅皎柏至今燁然有光當時小軒中爐香共坐語及肺腑即知是佛法中再來人也第以榮任日迫不得續奉清談舟行之日又不及追送江滸負此缺然近會明德教授審知惠政揚揚聲撼荊楚楚人何多幸哉且廑屢書賜問自慚無似之人遠勞垂念何感如之惟公素稟清明如止水如懸鏡事物之來固不受絲𩬊之蔽尚望於應接紛擾之際毋起厭煩之心當念唐之裴公美宋之張無盡諸公皆不離功名富貴不舍政事文章而能成就佛祖無上妙道者也故龐老有云日用事無別惟吾自偶諧此其力行親到之驗而有是語然則擾擾塵緣政者佛法妙用處也茲因附書上謝故僭言及之然非知言則不敢僭也答白楊絶照和尚先白楊順禪師數語示衆而天下學者家喻戶知視汗牛充棟之文不足多也閲今二百餘年復得和尚振耀于茲山非特作興其遺業亦乃鼓勇參徒力踐其遺示以今視昔豈二人哉余雖不獲親奉追拂而幸得與令徒卓峰遊故亦時時得舉此話以私相慶耳今夏四月華侍者來承手畢并細葛之貺且感且愧及觀與令徒促歸之書因自念先師化去久矣雖無所省然亦惻然動念從而推己之念力勉其一歸乃令徒正色對余曰吾師住白楊昔之示衆即吾之家訓也所謂染緣易就道業難成者政患學者率易湊泊或自畫於中道小成而不能深詣遠造也世之常情孰不畏難而好易此吾所以甘就難處東挨西拶縱使終其身晦韜困滯吾心無愧焉無憾焉今家書促吾歸者乃所以䇿吾進也吾能確守家訓不移初心圖遠大之效以為師恩之報則雖數十年之別數千里之遠而未嘗一日不在吾師之側又何待及門問訊然後為歸省者哉其對余者如此若其父子之間真情密語當必詳具他書非余得以盡知者也高帽一頂聊答先施未卜趍參望臨汝玉立諸峰如在天外與卓峰書記甲申二月小孤山舟中發離姑蘇日閶關楓橋一路不忍別又同舟相送九十里宿無錫明日遂分以二十六年之道聚流行坎止頃刻未嘗離死生相託休戚相關股肱骨肉之親不足云喻乃一旦有數千里之別況此行是歸鄉省母母子弟兄恩義之桎梏老病死葬變故之牽纏稱鎚落井之說從古有焉又況長江天塹風濤之險惡轉面隔生之慮彼此胸中有之語在唇吻而不忍發倘非曠達之懷處斷素定者其孰能堪此哉分之日待君祥父子不到或謂在毗陵遂迫暮呼小艇夜行達旦追及之毗陵相知相聞者皆有請不暇赴止受曹士英一飯而行夜過奔牛越二日渡大江抵瓜州熊氏圃卉石臺榭亦荒荒淮鄉之所僅有者明日鑾江登錢子明大舟一倉三榻琴書筆硯滿前君祥寄長紙二幅求寫今春普說因舟候風連日不發得滿填其紙以答之忽大風起舟人擂鼓歌呼一日走數百里不減舊時天上飛驊騮之喻也自是或逆或順然亦無日不張帆不數日已過小孤海門關矣晚泊關外乃自喜曰長江險惡已落吾後矣廬山面目明發可相見矣但恨子明之舟趍武昌而不至湖口政擬投江州附船天賜其便適有廬陵大舟同泊遂欣然移行李就之復自喜曰到家消息在是矣水光月涼夜不能寐因思足下必為吾憂而莫知吾喜吾反憂汝之憂而莫由汝解問子明歸期則曰歸在余先遂挑燈作是書詳具行程託以報平安也楞嚴會解想已入梓幸夙夜靡懈以促其成遇徒之寫道林之磨勘應念百千萬本由此本出必各盡手眼神通以致其精敏也錢塘炬菩薩四十八日大會已許其五月初旬說法滿散此約決不可爽矣鄉關轉身之計吾亦籌之熟矣今度舟還必由常山小溪以達錢塘穩且順矣稱鎚落井之疑轉面隔生之慮是書既到可一笑而釋諸答景深夏處士庚辰二月別令府謙齊公意謂非久即相見奈何行止不自由者若此今年省母西江往復八千里歸則令府仙矣死生契濶之感可勝言哉區區瓣香致慰敢後於人而賤體以暑途感冒抱病者兩月是以七月末先遣徒下代達此情期以體力稍蘇即當躬唁苫次今辱書乃知襄事告嚴而有秉薪掩土之命夫復何辭惟招而後行愈重吾愧矣答妙空居士禿魯平章師子林發地結茆屢枉惠顧草樹竹石精采百倍傅徒匪材荷玉成之賜石郝二侯復領外護之囑秋七月承至行院公文八月承寄所刊傅大士頌又見為法流通之心以居士內懷菩薩願外現宰官身往往有氣陵佛祖底作略如此根機如此力量要到佛祖不到之地亦何難哉特以工用未深而情纍未忘耳茲審榮佩新除總握憲綱而風厲上下此雖居士平日常行之事然浙右之民引領而望者亦已久矣今幸慰其所望靡不以手加額私相稱慶惟山僧之意則不然尚望居士由今以去毋忘大法之念於未了未徹處時時猛省而力攻之忽爾時至緣熟公事私事世法佛法一了一切了然後總握吾道之紀綱風厲三界之群有此則宗門與天下之士同一引領而稱慶者也地遠天寒未能候謁公務之隙以道自強又兩載不得相見懸懸此情比聞高踞臺端虎視諸道其凜然肅然者不令而行矣林下一鉢生涯之外宴默安居外惱不至皆餘光之所照映其敢一日忘邪竊嘗謂當今貴公子身處顯位而信慕佛法者固有之求如居士不肯以少自足直欲親到大休大歇之地者幾何人哉蓋於般若分上夙有緣契以故世出世間昭昭不自昧也抑嘗聞之大休大歇之地不在荒間寂寞之濵政在功名事業熾然作用處所以道百務紛紛萬緣擾擾著著有個出身路倘能於緣務紛擾中熾然作用處著得眼出得身譬如百鍊精金攧撲不碎得其全體大用應變無窮較之守荒間寂寞而局於一知半解者天地相遼矣古人云幻緣即實相煩惱即菩提妙在一翻翻轉直下便是不遇盤根錯節何以別利器不因塵勞業識何以顯佛祖之妙用如昔者趙清獻公退食公堂憑几之次忽然識得自家底張丞相在兜率山中一挨一拶一夜睡不著打破平日疑團范左丞因圓通長老呼其名一呼一諾之頃認得自己面目前輩往往如此就塵緣俗務中了辦大事又何待致仕休官向水邊林下間居獨處然後為參學哉今余觀居士趣向之高遠根器之深厚識見之弘博與前輩何異何別敢望於公事之餘以醒眼看破醉夢急著精采加鞭進步為佛祖出一口氣此天下之至望者也又七八月間審聞獨坐中書堂化聲震動大江之右未幾又聞擁萬騎南征掃空寇穴吾祖云奮大勇猛如一人與萬人敵手握金剛王寶劒全殺全活坐致太平此皆平昔慣聞之話今幸試而行之已見靈驗矣異時如法華所云用賢聖軍與五陰諸魔共戰破魔網出三界有大功勳得受輪王髻裏寶珠者在居士分上皆不難矣茲承寄音故此奉答未由會面無任馳情此話且止且道五陰諸魔即今在甚麼處若言他是魔自己亦非佛若言他是佛自己却成魔政當佛魔兩立人境交參畢竟誰是自己又若人境俱奪佛魔兩忘自己還在甚麼處參與受業寺昱藏主向者之歸遍擾上下諸寮臨別又各有所將曲盡未忘之情靡所不至因思甲子再出甲申再歸才二十年而山中眷屬消忘殆盡存者相見如再世世相遷流不容眨眼更二十年相見當又何如哉噫業風業火夙夜交煎十個五雙半斤八兩惟英俊之士不昧己靈者於此當發深省別後四月十八抵姑胥護侍者相隨師子林住方熟忽龍山雪庭來引動鄉念不可留矣因其歸顧無以為法眷意適楞嚴會解刊成聊寄一部留之觀山公界披閲此經直指人心備談禪旨故禪者視如契券二十年前余嘗受先幻翁囑纍之命不敢違至近年始成之學者不可不細讀讀之不可不深思思之不可不力行既讀既思而不行則白紙黑字而已答道場竺遠和尚昔圓鑑老人大唱慧朗之道追蹤正續老祖於五髻峰頭誠一世之龍門也出其門者固多惟和尚以疾足高才駸駸步武其故家青氈必不久屬他人矣某忝聯眷系而焦敗無似老懶相持故不敢僭妄攀附由是走賀之禮貢問之狀皆不敢輕舉近在吳城營小窩為老病計日與竹石輩周旋笑傲不覺避喧求靜之毒愈中愈深矣隱首座來自几下辱二教增重愧悚因其再參布下忱如此惟大法在任毋倦應接是禱答盤龍雲峰和尚泰定改元余歸自浙嘗造集雲關非久復出斫額龍峰萬松巃嵸出沒雲漢間而趼足困頓可望不可即始信三十六盤天上去豈尋常步驟所可及哉仰惟老師紹古佛之門風化洽中外者二三十載四方才俊咸願處席下至若掃劫灰蕩魔壘飛樓湧殿現於指顧之頃不思議解脫神力殆不是過人境之勝若此獨余負瞻拜之缺中抱梗焉近數載得與上足可庭周旋吳會爾汝討論間時時及家訓一二深有起余繼是復得無禪笑如二士相尋乎寂寞之濵雖未識公而識公諸子向之梗焉者日益消矣笑如自雙徑重來出所賜教并白苧兩端愧感交集不審何從而辱此大法垂絶之秋尚幸老師宗綱在握學者日望其未倦又聞有為笑如舉古潭返錫之話者此則父子一家機軸放行把住各適其宜非他人之所能知者也因其歸乃敢貢數字西望遡風不勝悚仄答江陵性海長老往者可庭會間嘗談及性海能疏引南泉道脉布衍于荊南不待募而施者畢至無所勞而有作皆成余恨留滯三吳末由一見嘗謂普庵老人古佛應世於達本情亡知心體合處示其悟迹遠嗣臨濟正宗近則以牧庵為父佛眼為祖承祖父遺風用寬平慈忍化物使學者如駕舟於恬風靜浪間不犯驚險坐達彼岸此其垂手大機用也若夫救灾恤難應禱隨緣者皆餘事耳海內之士受其賜者固多而知其垂手者獨少亦嘗疑弘化者密其傳而不務速說也歟惟吾性海當力弘大機使學者向情亡體合處親見老人面目斯法門之厚幸者也與希雲長老辛巳姑蘇之會之別客櫩低回彼此不盡意甲申歸省廬陵道經洪都問足下出處不得詳又以同舟牽掣不自由故不能物色一見近聞說法東山美聲籍籍而數千里外一書問賀無端便乃爾遲也足下平生厲精于學天不負才使得展其志試所學於出世不早不晚之年雖六藏巖壑與世相遺者亦為之助喜百倍也昔鑾江送別五偈今二十三年忘之矣惟末後二句尚時時蹉口道著獨不知足下頗能紬繹之乎院子無大小衆無多寡當力任古道先之率之進止崇卑一付定分慎莫循時輩患得患失之途轍也余老未死豈無再會之日以傾倒所欲言哉豐城真相長老住後嘗有書來昨已答附新淦僧還偶會更煩道訊與龍翔曇芳和尚追憶鍾山方丈纍日奉慈誨今已四五閏矣比審携鍾山登徑塢挾徑塢歸龍河又雙峨置於五髻之間去去來來腕頭不費絲毫力此皆曠古異聞也某數年來移茆舍入中吳盤旋草樹之底而大方黜陟之事耳目不到是故輿從往還吳門皆不及奔走送迎者非敢慢也蓋無所預聞也高明之見寬弘之量必照而恕之或謂龍河之雄麗視率陀天報境不殊昔笑隱翁竭力營之今曇翁高造而安居之異時挾外院以歸內院促補處之佛下生而身與交代亦豈費腕頭力哉呵呵參晤末由臨風無任傾向答載之蕭萬戶夏初栖鳳亭前屢辱敲門看修竹每羡韜略兼濟將種之真才也方勳名鼎興之日而能與林下野逸相尋非世味淡泊者不足以語此旌麾去吳閩洞鼠閙謂必振旅南行辱書之來乃尚留天台山水間未舍苔臥緑沉之樂何哉天生英雄當念為時而出方外高談他日相逢未晚也答太府監朵烈帖木兒臥龍梅邊話別已月餘京口人來再領手帖謂即日渡江北歸矣遙想神物護持驛車安健歸覲清光慶賞交集其到家之樂何樂如之獨未審本參事上能念念著到否念念相應否能致其自慶自賞之樂否邪以足下居王孫公子之貴負英靈聰辨之資而能折節相從究心此事非宿植德本而何然此事妙在力行知而不行行而不力終無到家之理近時宰官士大夫學佛法者往往以聰明穿鑿情識領攬得一知半解自以為是殊不知政是迷妄根本惟足下才思不群志趣遠大終不墯此等窠臼故余之所望足下者親證親悟親到法王家與佛祖把手並行推恩群有而後己豈肯侶淺根劣器隨流掠虗之習者哉茲因馮總管別余入京乃得答此以致力行之勉云答湛書記七月草五日早粥罷立卓峰送天台僧泰出門余方飛虹橋上解衣燕坐詎可庭自掃池上落葉忽然呌報有新事帶露木犀開數枝於是移瓦鼓子環樹而坐呼山僮小嚴汲氷壺井花烹武寧伊山喻子德磨頭茶賞之以鼻香為緣深入無著無礙自在遊戲間不徹三昧未幾鄉人迪惠林來扣關二三子曰這場窮快活莫使他儂知遂散去延之入戶即日恭惟後道湛書記傳語送丘仲榮扇一把又出白紙一張求法語我無語亦無法只有些兒窮快活不堪持贈君答汴京月堂明戒師霜風吼寒落葉滿路忽宣城澍法主來得書審別後尚留江左擬來歲借座黃教開壇放戒謬承見招為衆普說以發明直指之道且謂憲府衆官主盟斯會者咸望振錫一來已議移文勸請此行不可得而辭也竊嘗謂登壇受具乃諸宗頓漸大小之機共由之轍惜壇場廢久學者無所持循此話果行末法受賜多矣惟普說之命則區區不敢與聞究論吾宗本以單傳心印直接上根道箇直指早是曲了豈容復有言說哉其後根器不齊宗師垂手處不得已曲施巧便如黃檗痛棒臨濟臨濟見僧便喝此棒喝之機非三藏之所能收非識情之所能測而三千威儀八萬細行以至五時之教却盡在棒喝之中其捷要者若此而無能領荷於是曲順來機始有請益之說既而曲順之至又有大請益而謂之普說者豈得已哉然此普說非真正宗師不敢說是其師矣無其機不說有其機矣非信樂憤悱之切不說必若渴饑之極然後飲之食之則聽者有領悟之益說者無失言之過否則門庭施設以圖炫耀觀瞻作者之不許也若某者自知無法可說亦非說法之師沙鍋煮黃菜箕踞看白雲昨嘗兩辱降訪其冷淡退縮家風公所親見此豈赴遠招臨廣衆而普說者哉抑嘗聞攝心為戒擬心即犯月堂以此開示聽徒令於擬處攝處見徹根源則直指在是矣抑又聞廣教乃黃檗禪林今雖易講而禪額仍舊來者升堂入室目擊道存無往而非禪旨又何待他求普說哉幸體此情毋煩再命萬一不然却煩轉命於大方之家容我不動跬步遙瞻戒光此則真受其賜者也答仲溫副使病中疑問北行別余之日官從林立睟然春姿獨足下頗有晦色竊謂去家割愛無怪其然詰朝得報登舟忽疾作遂艤留關外既而留三日病不退遂不果行竊疑行興既阻病勢必增復自解曰仲溫達士也坎止流行素善處置況近年篤志聞道今父子兄弟別而復聚諸良醫爭願納誠以取效非久必平復豈料淹淹一至乎此可怪也足下才德粹美秉清要之權者十餘任矣忠孝兩全朝野交頌民無貴賤老少被其澤嚮其風者咸不願其一日去官及聞有疾恨不能以身代之其得人之感戴慕望者若此勳業方興乃縮縮退避以究吾宗別傳之學每語人曰某之精神夢想無日不在師子林下今病既劇復取余向來勉勵激策切要之語書而揭之窗壁梁柱几榻屏帳之間使其坐立臥起俯仰皆在眼中旦夕二僮奉藥粥外使嬖雜喧一皆屏絶此尤見處置有方而操守有力豈常流所可擬哉昨暮令尊平章公來再三致懇謂足下欲邀余一會余既久不出山且知病中亦厭喧雜縱草草一會奚益遂託平章公致意云不會最親切今晨繼領來命陳所疑問者凡數條因得徹見足下之底蘊而有以發余之所當告者焉來問諸經教中或說空或說有或說不空不有何者為的義邪當知吾佛常依二諦說法法說隨機不守一途方便若彼衆生為名相所迷而著於有者說空以破之或不著有而復著於空者說有以奪之偏空偏有固非實法不有不空亦非了義若夫直示一心妙圓性體應以四義明之四義者當處即空全體即有非空非有即空即有是也空則不動不變不立一法有則隨緣變現諸法宛然是以楞嚴經云非一切法即一切法離即離非是即非即非一切法者空也即一切法者有也離即是即等者配彼第三第四義也以真俗中道三諦配之真諦空也俗諦有也中道諦非真非俗即真即俗同彼雙離空有雙即空有者也應知離即不二一四互融舉其一則四義具焉言其四則其體惟一此乃人人本具之性理也嘗試研而究之前二義則空有對待尚涉名言後之二義則不容分別而不可湊泊矣不容分別則言語道斷不可湊泊則心行處滅心行處滅則不可思矣言語道斷則不可議矣是即一真法界如來藏心不可思議之妙者也如是妙理悟而證之者為聖人迷而背之者為凡夫為聖人者德相圓融應化無礙為凡夫者識情用事顛倒何窮於是聖人愍之思啓其悟以革其迷乃依本具之性理以起修法而謂之教令依修法以立觀行觀行成則如理而證證其本具之理體而已耳修法固多且以空假中三觀論之空觀觀真諦假觀觀俗諦中觀觀中諦而中觀有雙遮空假雙照空假之二義也遮照相須一心三觀觀智諦理理智一如是名性修不二圓妙之教法也原夫別傳之學雖曰教外然亦未嘗外乎教理特其功用趣向之稍別耳如昔者僧問禪師曰道以有心而求可邪曰不也以無心而求可邪曰不也以亦有亦無之心而求可邪曰不也以非有非無之心而求可邪曰不也如是四答味其言外之旨則與性理四義教法四義吻然契合矣但禪者離其名言泯其行相不涉義路直截根源務令識謝情消忘心頓證而有一超直入如來地之說豈非圓妙之法者哉降此以往曰空曰有總是隨宜說法故教外之傳要在忘知解絶思惟超情見離能所獨弄單提真參實悟斷不許其粘枝帶葉障自悟門苟不如此任將性理之文廣資談辨如談美食終不療饑非惟不療其饑亦且愈增其熾然之饑火也吾仲溫腳跟下自有一條通天活路只消驀直向前更不必問其何者為的義也來問禪學之流有一聞而頓悟者有久參久修而不獲悟證者其所聞所參之法有難易者耶又有謂時節既至其理自彰然則不勞參學但待其悟時之自至耶余嘗聞教中道凡夫賢聖人平等無高下惟在心垢滅取證如反掌觀其反掌之喻則取證容易論其心垢則非修不滅只者滅之一字易在剎那而難在纍劫也當知法無難易難易在人在人者何由其汙染有厚薄修治有勤怠垢滅有頓漸是故悟證有難易而時節有遲速遠近之不同也所云時至理彰者是其參修功行既成則心垢既滅之時至而悟證之理自彰也非曰不參不修而有自悟之時至也以耕者譬之有種時有熟時有脫時種而至於熟熟而至於脫是其工作收成之時至也不種而望其熟不熟而望其脫其可得乎人徒見其一聞頓悟之易而不知其未悟之先其功行亦未嘗不難也人徒畏其久參久修之難而不知其總是刮磨心垢功不浪施之時也儒典亦云先難而後獲苟不從事乎難而妄希其易則易者終不可得而難者愈覺其難矣是猶惰農廢種而妄希熟脫不亦難乎望足下莫問心垢染汙之厚薄莫計悟證時節之遲速但就所參處加功進行顛沛造次必於是先辦一種耐勤苦之心甘守其難不圖速效則其頓悟之易不期至而驀然至矣所以道不因汗馬奔馳力安得全收蓋代功來問病是衆生良藥吾已識其內病矣病知前路資糧少吾亦深知而猛省矣奈何四大痛苦百憂現前雖曰堅持正念時加猛省或稍失照顧則被渠攪擾其將何策以排遣之余詳足下所謂識病者不過識其狂妄顛倒為內病耳謂深知者不過知其道業資糧之未充耳此知此識固佳爭奈未除我相我相未除病根未則四大苦憂之境安有排遣之分哉應知我本非我生本無生身屬不淨身如幻化不淨者如經云此身非旃檀亦復非蓮華糞穢所長養但從尿道出從生至死曰裏曰外皆不淨也其初生時不應生取一枚必死底及其死時也只死却一枚本非我底生則為漏糞囊徒爾遭其負纍死則如朽敗木於我果何有哉幻化者如經云妄認四大為自身相六塵緣影為自心相譬彼病目見空中華空實無華病者妄執能作如是觀者內外諸病皆空夫是之謂安間法也祖師云老僧自有安間法八苦交煎總不妨八苦者生老病死愛別離怨憎會求不得五陰盛是也病特八苦中之一苦耳八苦交煎既不妨則可謂深得其安間法矣然猶法在苦外對待未忘更須撥轉目前關棙別顯格外真機回觀八苦之境總是安間法方許藥病兩忘親到縱橫無礙解脫處也來問圭峰云散亂隨情轉臨終被業牽醒悟不由情臨終能轉業古來了達之士固知落處分明然其坐脫立亡之際亦豈無處置之方如某者向道既晚情業未空倘無所醒悟又無所處置臨終何所恃耶余聞生死岸頭事不是臨期處置底古德云預前若打不徹臘月三十日到來管取手忙腳亂所以古人盡是預前打徹其於未徹以前則不容不處置凡參方問法下手做工夫皆處置也既徹已後生死涅槃視如昨夢隨緣消舊業任運過時光世緣既盡擺手便行無所用其處置矣如興化和尚一日鳴鐘集衆問曰還識老僧麼衆無對擲下拐子端坐而逝汾陽禪師因府尹李侯遣使請住院師辭以老病不出山使者強其往師曰必欲往則先後行使者許之師令饌飯且俶裝曰吾先行矣停筯而化揚州陳尚書請孚上座講涅槃經孚揮尺一下云如是我聞乃召尚書尚書應諾孚云一時佛在遂安然脫去歸宗宣禪師因郡守責其不禮以非法窘之宣馳書與南昌尉郭功甫曰某尚有六年世緣未盡今日不奈抑逼何欲託生君家望君相照乃化去功甫與師厚善得書驚喜不以示其妻妻中夜夢宣入臥內不覺失聲云此不是和尚來處甫問其故妻答所見甫乃呼燈以書示之果有娠及生即名宣老人扣之記問如昔逮三歲白雲端禪師往驗之宣望見便呼云師姪來也端問云與和尚相別幾年宣屈指曰四年也甚處相別曰白蓮莊忽門外推車過端云什麼聲宣便作推車勢端云過後如何宣曰平地一條溝後果六周無疾而化似此等來去自由不可測度豈是臨期處置者乎今足下病既至此別無所恃請將大小家務盡情撥置併將自己身命盡情放捨任他成佛作祖也得永墮惡道也得一切得失是非付之不問却單單恃取箇本參公案絲毫不容其走漏生與同生死與同死忽爾懸崖撒手絶後再蘇却不妨轉一機來為汝別通消息答夏景深萬竹山房招隱啓偶地安居柳刺史識江華風度半山招隱王荊公結鍾阜禪交何幸相遭自慚未稱某人學詩學禮素有真傳潤屋潤身視如常事廣廈千間庇士吾已見其胸襟義方三世教人孰不感其惠澤此家之望也豈閭里之榮哉詎期雲水之蹤與承顧念為卜林泉之築許以栖遲錦箋薌瓣下臨禪板莆團催動過竹院偷間半日古人憐醉夢之無厭炙橘皮共語深更今我喜叨陪之有分答石萬戶請為父起骨啓歿於戎事星隕石而死諸葛英雄之淚滿襟馬踣地而葬夏侯忠烈之名動世寂寥千載今見而翁變化一機合資吾法某人堂堂將種咄咄父風書連屋樹拂雲千金之子總能文矣笏滿床印如斗萬石之君奚足道哉奈何志學之盛年當此送終之大事佳城見白日合一郡盡爾傷心素幕隨朱幡來四方觀其有禮乃待著語爰方啓行玉芝瑤草芙蓉城未是大休歇處金池寶樹蓮華國為歌歸去來辭率此占酬倚須造謝祭文祭天目幻住和尚濟北陰涼大樹歷世久兮向衰至老雪而復盛盛三傳而至師師秉大用應變隨宜化聲八達雷震風馳念余所出同本異支棄家忘返五載于茲巖巖天目既高且危石枯松老嵐蒸霧炊嘗自謂孤雲野鶴何天不飛清水白米何處無之何不舍是而他適乃復守荒寒而自怡師即凹凸示之坦夷以瞬揚為棒喝以談笑為針錐為人切處知者自知如反攻之藥如變局之棋屈強兵於不戰起絶命於懸絲去歲壬戌多士來歸余首衆衆駭且疑授黑蚖之三尺警龍象以鞭笞尚賴護傅枝之弱羽亦猶試反躑之狻猊師忽余棄余將孰依惟忍死以承命誓潛行而密施奈有言貴勢不獲辭鼓喉舌於箋翰代多士吐哀而訴悲貌太虗之妍醜酌滄海之盈虧知師者誰知余者誰倘不任力行以圖報縱眼枯腸斷兮何裨祭父維至順二年七月七日出家男某寓華亭得弟中行書知先考某人以是年四月初五沒于江西廬陵之故家越六日為七月十三始克就所寓會諸僧作佛事設位致祭陳情以昭告曰不肖之罪有三此平生不欲言而今之不容不言者也早捐世業不待父母之命毀形而僧一也既業於僧復飄然遠遊以纍父母之懷二也遊既遠且不能以時致父及聞訃又不能匍匐歸葬三也嗚呼不肖嘗讀世書稍諳時議其果忍於是哉蓋由慕出世之法有大利於父母故從其大者忘其世之所謂孝也父云死矣修阻奈何惟常勉事吾法以盡吾心父兮有靈死而不死苟沾吾法之利則知不肖之不孝非不孝也乃酌杯水訴情以文萬里咫尺靈其鑑之祭九峰壽首座臨終有偈云七十二年這邊那邊喫十方飯參達磨禪今朝一躑翻身去笑破傍觀觜半邊吾天目正宗之道固非文字之所能詮在當機脫略乎生死乃因言語以驗其真傳如吾九峰之末後句子亦足以振後而光前今吾招萬象以共聽為君下注腳而重宣七十二年赤腳波斯算卦錢這邊那邊杖挑日月透金圈喫十方飯陳年佛法從教爛參達磨禪正法眼藏野狐涎今朝一躑翻身去腕頭迸斷娘生袴笑破傍觀觜半邊若是同參則不然為甚麼不然蒼天蒼天祭松江喜菩薩道不同不相為謀心相知者千里相求公始會吾於獅巖多士同參之室吾已識公敦重木訥誠輔道之良儔獅吼既寂巖壑驚秋多士若鳳麒之散漫諸方愧鐵網之難收公操鈯斧於華亭蒲葦之隙吾乃聞公喚菩薩子踵芳躅於金牛祖道日喪俗習日浮慨同參之零落懷乘桴以海游公適移文以招隱吾亦乘興采船子撥棹之遺謳就蝸廬以容膝倣象骨而低頭刮眼目以相視嘔心肝以相酬豈無故山可以懷首丘豈無大方可以營菟裘胡為乎至是而淹留吾由感公忘年重義致交道之綢繆公且聚群材樹廣剎鬼輸神運㵎抉林搜疲奔命於東酬西酢罔晝夜額額而忘休人或愳其積勞以致疾吾復愛公忘身利衆行廣而化周病魔忽作神劑莫投目不勝舉氣不禁抽尚指揮其職務戒群工之是鳩人或慮其臨變而失守吾愈驗公操持素定瀕死而無憂體離生滅數踰短修露法身於萬象消覺海之一漚人或慟其千古之永訣吾獨見公面目現在絶來去之蹤由收彼涕眶禁彼哀喉歌吾楚些薦吾茗甌吾其為公盡情於世禮公毋謂吾劒去而刻舟祭良毒海兄我異鄉而視兄猶股肱者同參之義也吁嗟兄兮才足以濟用緣足以展化志足以任大法也昔幻翁之坐天目化機四出紛然百為兄服其勞衆賴以逸逮翁寂而塔也饗有堂贍有壤兄任其責衆藉以安此兄之材緣足以盡兄之分矣至如遁迹池山單提獨弄養痾卞塢密鍊潛鞭此兄之志有進而進不容自己者胡為乎若是而已焉彼蒼者天與人必全既優其材復多其緣獨嗇其壽以奪其志者何哉嗚呼萬事落葉兮百年頽波兄不我待兮我將奈何送兄兮山之阿去日短兮來日多兄之志兮不可磨九峰插天兮青峩峩斷崖翁祭幻住和尚代先師門戶壁立千仞惟我與兄剛犯嚴峻劄腳死關翻身白刃妙契玄同兄呼弟應自是以來東西奔命我職化權兄持正令三二十年家聲始振奈何委而棄之獨乘化以歸乎盡宗風既寒祖燈將燼願兄既去而復來為法道同扶於末運毋厭難度之衆生堅坐不起於那伽大定扶桑國衆僧祭代余家海東兮扶桑望中國兮水天渺茫惟師道化之無方兮殊異域咸仰其光故余慕真燈之一見兮向鯨濤萬頃寄命于風檣天與不死獲拜猊床沾法雨之霡霂息外走之癡狂既而世故之臬兀倚師如勇將之幢夫何法運之不昌乃不憗遺於法王使遠人有身而無託胡不先師而殞亡矢詞熏香有涕其滂于以嗟旅途之寂寞于以慟藂社之淒涼先師將殯之夕率衆法眷歌此章再祭三十年間師子絃希聲震動乎大千餘音一夜變為哭天地草木同悽然秋空蕭蕭下黃葉巖泉瑟瑟聲嗚咽我之哀兮無奈何寒𤠔呌落千峰月山蒼蒼兮水泱泱堂堂面目何曾藏酸心酸淚忍不得看水看山成斷腸天台南嶽師莫住夜摩覩史師莫留茫茫苦海風浪惡衆生日夜懷慈舟祭如山首座君大江之西素稱法窟而匡山番水之間英材尤盛數十年來諸大老飛烟過雨後進者無所矜式雲頽波蕩藂社蕭然維公鍾秀峙之氣負頴脫之資透網東湖問津西浙造衲翁之堂奧承幻住之爐鎚者於茲有年矣其憂道也屢空不辭其語人也寸長不隱蓋公有志於遠大而人亦以遠大望於公也天巧其逢一肺疾見攻而竟爾不起群飛刺天鸞鵠墯羽蔓草蔽野芝蘭不春可不為之傷乎傷哉祭陸提舉世波淘湧公其中流之砥柱乎寒士風雨公其廣廈之棟梁乎里閈雪霜公其梓桑之喬木乎僧園斤斧公其佛法之堅城乎已乎已乎梁摧柱折木壞城毀不可得而見乎天地黤黕山川愁余聞而未識者亦將感歎而號呼況平生托其護而受其施者乎祭杲山首座生死如幻其誰不知知幻即離死何足悲惟其有所感於人者人不得不悲而哀之嗟余杲山鐵石之姿竪脊梁危坐一室五十年寒暑不移富豪擲多金以施而掉頭不納凜然薄俗之風規宰臣虗大剎以招而掩耳不聽巋然末法之刑儀求如兄兮當代曾幾忽失兄兮高蹤莫追世衰道喪朴散醇醨吾不為兄悲兮悲誰吾不為兄哀兮哀誰祭遼東深不真代我關之西兄遼之東馬牛之風不及舟車之迹不通由南來兮見知識參同堂兮入同室以燕趙齊魯雲南薊北之士為一鄉兮相友相扶誼如肉骨古銅兮一盂怪藤兮一策破衲兮一衣并一身而為四物兄之於世淡然棄之固無足惜惟存者之無聊乃相向而失色客路兮土曠人稀鄉音兮海斷天隔道岸懸絶兮業流灣環少壯幾時兮死生瞬息念無常不與人期非獨為吾兄而慘塞祭某官修短不齊一歸乎盡縱天地之大亦不免也惟其人而有以異於人者雖盡不盡修短奚足議哉如公之年未及知命聲名昭于時恩澤布于下視富貴為倘來處生死如窹𥧌窮神致化與道為徒斯其可以盡乎而又袍笏有傳才俊滿眼此天之所以報公亦不薄矣然則公之短非短也公之亡非亡也惟我林谷辱知己多猶恨遇公之晚而失公之速雖曰失公公未嘗失又將見繼繼承承於公之子孫也祭鳳德輝代下丹鳳於千仞兮覽德之輝巢鷦鷯於深林兮一枝相依惟君慕盤隱之李願兮非徒愛其泉甘而土肥蓋嘗學逃禪於蘇晉兮退藏就空寂而發揮遂開小徑以連松路兮時復扣竹房於翠微誡諸郎以繼其志兮且助揚於化機方檀陰之日厚兮胡遽此而相違噫吁嘻鷦林之失護兮鷹隼飛鳳縹眇而逝兮何當歸望雲翼之不可附兮徒惆悵於荒庭古竹之寒暉祭明誠處士公將為處士兮為閭里之輝光公將不為處士兮為國之禎祥樂天知命於誠之明兮妙大用而無方窮理盡性於明之誠兮應萬變而有常謂其生之榮兮富既壽而且康謂其死無憾兮森芝蘭玉樹以流芳謂其不亡兮迷影像於荒唐謂其果亡兮體遍在而不藏俎白雲於天目之顛兮逗明月於莫湖之傍誰謂公之不吾享兮吾其見公於天光野色之蒼茫祭大慶長老代鐵錫響空雲雷奔走萬壑千巖作師子吼師之應公選慰輿情而來吾大慶也妬慢委心勢權屈膝禪笠滿門子籌盈室師之折貴宦走學徒而盛吾大慶也廣堂翬翬兩廡翼翼像設莊嚴錯落金碧師之傾己橐掃劫灰而成吾大慶也推枕方丈裹藥行李西向秦溪片帆秋水師之抱微痾懷舊隱而去吾大慶也登林度㵎載瞻載思忽報以訃林號㵎悲此則大慶夙夜望師而師之永訣於大慶者也烏呼法眷祭毒海代遺囑撒骨有偈云太湖三萬六千頃中有浮圖絶正偏今日遺骸歸去也碧天連水水連天昔幻住翁高蹈天目室無寄籌門不措足指我所師為兄法屬誼重股肱情逾骨肉二十年中上下游從肺肝相示甘苦是同癸亥之哭眼枯淚空雨蟻零亂爾西我東世紛掣肘幻廬莫守堂堂西峰不忍擡首九華之山兄遁其間扶服千里抱病以還因循二年有懷隔絶一旦書來囑以遺骨太湖三萬六千頃我之恨兮不能洗碧天連水水連天我之淚兮多於水兩序祭某人住持代藂林之有職司猶郡邑之有吏曹也職司之待住持猶吏曹之待牧守也或怨或怒或感或慕視上之賢否為何如耳師自吳而來越吳士攀轅感慨而激烈師自越以還吳越人遮道戀慕而嗟呼師化事之將畢入三昧於無聲天地為之黯慘𤠔鶴為之哀鳴師平昔行深而化密非吾徒可得而窺測以去來之跡而觀之其道德不言而可知虗空為口雷霆為舌不足以頌師之盛業海水為墨須彌為不足以絶余之去思江湖祭悟庵菩薩代宗綱墜矣魔說熾然嗥狐狸於象藪舞鰍鱔於龍囦吳包楚笠水際山顛佳士耻齊竽之濫吹諸方喜陳榻之高懸惟師秉天目之鈯斧乃大開宿覺以延賢其分衛也以之為丹陽負米之具其思濟也以之為華亭載月之船既息我勞復安我禪何禪栖之未穩倐化迹之云遷悲夫盛衰有數聚散隨緣今吾率雲水而奠別主賓如驛舍之離筵雲焉水焉聽吾所遇而休焉祭母代坤厚載肓不可度思母氏劬勞恩或過之立身揚名事葬以禮子之報之盡分乃已繄我有母克全母儀秉是懿德生于宋衰際時孔艱海桑烟雨綢繆拮据不遑寧處以慈以仁以儉以真創業樹家睦親善鄰子女成立生植蕃息匪承母恩曷有今日我以懦庸弗振于宗顯揚有愧甘旨靡供母壽遽終子分未盡殞可贖兮敢愛其命母覺真機佛乘是依西有樂國相期以歸我不敢死忍茲哀苦誓將遵修以盡孝慕慕豈終身報圖永古孰知我心皇天后土祭鳳凰山主代吾哀世相兮輪雲海桑吾哀藂社兮斧斤雪霜吾哀吾徒假衣服以裨販劫奪兮猶捕蟬忘之螳蜋寄幻身於夢宅曾誰悟其無常既無常之未悟況復悟其死而不亡唯兄悟無常於夢幻早游心于圓覺之場惟兄痛末法之流斃佩西傳密印而不顯其光開一方之化境見二子之聯芳其不亡者在是縱萬死兮何傷山兮蒼蒼如飛鳳凰法身常住遍界莫藏吾猶為兄撫龕而痛哀者哀眷誼之荒涼祭了心居士心可了耶視之不見而探之莫窮心不可了耶堂堂獨露而法法混融心非了而了非心耶猶迷者向西而覔東心即了而了即心耶惟悟者密契而冥同如眼對眼如鏡照鏡如水投水如空合空故居士得了心之三昧乃不為世網之羅籠其御下也慈其事上也恭其奉己也儉其待人也豐給僧之餉嚴佛之宮雖世出世間熾然其作用視之若遊戲之神通始余以數千里外之遊衲憩禪藤於吳松江上之青峰聽江湖議在家而聞道靡不羡潤齊之呂公又聞呂公之得賢配疑老龐夫婦再世而相逢比余因識潤齊而遂識居士致禮問法殷勤盡見其心胸茲焉已矣復見無從現女人身以化俗耶人固罔知其來處捨是身而復現他身耶人亦罔究其行蹤今余所以祭了心而吊潤齊者庶幾見方外之流風祭照庵山主代西山照庵余弟余兄以道以義託交死生死生之變太虗流電所託忽空孰忍聞見作哭西山餘哀尚存今哭照庵黯然銷魂照庵之照如日杲杲六戶洞開群幽頓曉照庵之庵法界包含十方圓現萬象同參照庵之歿猶動而息風止波停性海澄寂生既無纍死奚足憐余所憐者道與義焉祭史氏安人惟史與夏名家世姻夏而三世路義宅仁由安人之善贊佐故令德昭昭而日新敬以睦族惠以恤鄰有子有孫如鳳如麟由安人之善教育故美譽洋洋而在人前歲慶古稀之壽壽旦遇生年之戊辰人皆謂期之有兆歲寒見松柏之方春胡乃至是而遽往恍兮若御風而出塵由安人早厭其塵纍故超然向覺海而問津視去來之變化如拳掌之屈伸既了生而達死是將返妄而歸真惟其平生推誠以待物曾不間乎踈親故今者踈親不間相與悽惋而沾巾祭海道萬戶某相公公如天人世家高昌為秦國公之賢嗣生而見堆笏之滿床材俊而敏氣正而剛盛德日積令聞日章試歷監于大郡於前烈而有光志勳業於昭代如杜如房留精神於內典如裴如張廊廟期之為柱石佛法倚之為金湯謬余一衲栖遁空荒嘗沾餘潤林壑清涼撫民謠於石刻蔭濃緑於甘棠記頃者謁公於漕府公語余浮海之相羊鼓一檛而雷吼風萬舶而龍驤玩海市於紫雲之氣斥鯨鰲於黑水之洋指點張皇呌呼嗟訝至今聞者神思飛揚何大星之遽隕駭愁視於蒼黃悲哉公將悟身世之漚花兮厭利祿之粃糠駕玄鶴於仙列兮驂赤虯於帝傍追之不可及兮哀之徒傷茗鍊雪於甘泠兮些招魂於渺茫公其有知而來享兮見交情生死之未忘
