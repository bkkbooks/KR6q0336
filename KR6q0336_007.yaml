body:
  text: 小師善遇編跋跋護法論杲日麗乎中天通天下等受其照惟翳膜在眼者不及見既不見故生疑既生疑故謗且毀矣明眼者笑而憐之憐其自謗自毀於日何加損焉世之人迷妄覆心未由醒悟反致疑謗於佛法者蓋類此也昔無盡相國張公作是書今漢陽耕野劉居士復刊以傳謂之護法論所謂獲法者非護佛法也護世人疑謗之心也所謂論者非論也滅翳之神藥刮膜之金錍也能服膺是説者雖生盲亦當瞭然跋梵行品身無所取法無所住梵行其可得耶一切佛法疾得現前梵行果不可得耶了知境界如幻如夢梵行果有耶知一切法即心自性梵行果無耶當時法慧菩薩遭正念一問捩轉鼻梁正念天子被法慈一答塞斷喉吻二三千年與奪未決邇者華亭祚上人求吾友良毒海書梵行一品而誦之倘能向未展卷前揭開頂門正眼照破得失有無非但成就慧身不由他悟亦且使古人鼻裏喉裏各各出得一口氣跋賢上人送行詩軸離文字之學一變而為語言再變而為音韻又變而至於詩極矣蜀中賢上人南詢將歸詩以贐者凡三十五人成大軸噫蜀至浙萬里出而求者此歟得而歸者此耶雖然余又聞圓悟見東山時聞舉小艷詩半絶有省以半絶較是軸何啻百倍然則賢所聞過於圓悟者遠矣又豈容槩作詩會跋雪巖和尚主丈歌曾大父巖翁和尚居大仰時嘗將主丈子鞭龍撻象又嘗為主丈子作歌紀其功烈沒後三十年松雪居士見而書之今遠山首座得而傳之歌則任書任傳主丈子却是吾家舊物不許諸人動著跋幻住和尚法語三延祐己未秋幻住師迫於瀋王之命引起一路葛藤余與愚谷俱在聽列越五年師沒聽者如失栖之鳥隨風西東今又十三年存者無幾矣忽愚谷訪余九峯間相見如隔世閲是軸如夢語故述一偈以寓所感云幻師開口示心肝流落藂林作語看我亦當時曾錯會至今聞著鼻頭酸從古以來被箇禪字惱殺天下宗師走殺天下學者未透者被禪礙已透者被禪縛近年禪社不古宗師學者相逢未嘗蹉口道著及觀幻住老人之偈有云門前剩得一堆禪此語是褒耶是貶耶謙禪人既寶之且請自道一句看老幻住三則沒人情話一如塗毒鼓一如吹毛劒一如養由基箭鼓聲中掩耳劒刃上翻身箭鋒頭囓鏃總是衲僧餘事就中別有一機却難回避且道是那一機樹頭飛起楊州鶴跋錢舜舉食葉蠶圖蠶以繭化亦以繭纍方其食葉之際思纍乎思化乎大地一葉也黑頭皆蠶也曰纍曰化非余所知且不知其以何為繭也一食一眠當自猛省跋莊子畫像讚軸翹翹招招飄飄蕭蕭子昂筆下有莊子展兩手兮遊逍遙于于喁喁刁刁調調諸公言下有莊子集衆妙兮成牛腰噫吁嘻當時若會展手意風一息兮萬籟聲消跋文殊問疾圖通身是病通身是藥老倒維摩自無發落被人逼得口生膠却賴文殊添注腳誰知不二門語默皆成錯展開圖畫笑相看傀儡一棚無線索跋補陀頌軸聞所聞盡覺所覺空空所空滅寂滅現前這箇是圓通大士全體出現處懌堂喜維那親到補陀親見大士面目未審這箇那箇同耶別耶同也好別也好同別俱非了了春光如夢過無蹤滿地落花人未掃跋普説二但有言説都無實義承言者喪滯句者迷觀佛祖訓誡若此言句於人奚益哉余因若愚長老率衆勸請普説不容推避如蟲禦木偶爾成文何嘗有實言實句實義者哉今若愚摺紙為梵夾復命寫出又有所不容推避者既談於口復書於手雖非要譽亦孔之醜如上許多間言長語蓋一時迫於初機所請不得已而應之耳希雲既親見親聞自當相與掩醜何乃置此於行囊中是欲故揚之耶前途或遇作家奪𢌿炎火痛罵一上政是切心為我者也希雲却不得面熱跋墨書華嚴經華藏世界海微塵數佛剎盡在普賢大士一毛孔中出現如今諸佛剎海乃至天人衆會宮殿床座雲臺寶網一切受用莊嚴等事却在夏居士一毫頭上出現所現底既在目前能現底還在甚處於此著得隻眼方許諸人與居士相見亦許居士與普賢相見跋海粟學士吟卷盡道先師曾和海粟梅詩一百首海粟梅詩自吟未了未了先和有甚頭腦先師無此語莫謗先師好跋高昌公子按樂圖聲不在絃亦不在指絃指相因聲生如子惟吾端卿深得妙理指絃與聲畫以相示畫聲維何非商非徵聲而非聲其聲無已能以眼聞滿眼皆是不是知音徒勞側耳疏淨慈瀨翁住靈隱方外交疏惠遠送修靜過虎溪神交方外妙喜招子韶來徑塢機契室中悠悠古人實勞我思濟濟多士復見此老某人通身手眼貼骨爪牙斥宗教似是之非得佛心不傳之妙一筆萬言雄辨仲靈覺範愕爾于前五年三跨大方寶掌永明瞪乎其後利器別於盤錯先鞭範以馳驅登見山堂誦東澗詩修乃祖盛時之舊好掬冷泉水洗許由耳振先民絶世之高風三轉法輪一貫吾道育王先藏主住常州文明諸山疏祖師説禪多見舉常州有宗唱復古一變自橫川來子孫能大其家宰相當授之位某人登鳳臺而擇木蔑視鳥窠布毛摟龍藏以得珠光奪鄮峰舍利翔千仞兮久矣覽三渦而下之得來既高用處自別橫按玉櫑具震威在一喝之先竪起金剛幢決勝於千里之外願觀盛作以壯諸鄰蘊首座住大慈賢首教寺江湖疏僧省有賢相輕重若持諸衡教苑無棄材大小各稱其位如證雜華而頓爾富貴若決縣水而沛然流通某人早入報恩之門慣看賓客晚分光福之座轉教學徒當仁不讓於師應世莫尊乎道毋守小節試興大慈竪赤幟以摧邪招白龍而聽法彈冠結綬肯隨流俗以論交戴笠乘車且願相逢而下揖普照智講主住崇壽天台教寺山門疏天風吹去寶花聚新雨尤奇海月飛上珊瑚枝大光普照此楊林之有待若祗樹之重榮某人道重雲間宗非山外權實之智不二如珠走盤空假之觀即中猶鏡照像當躡禮尊者鵾鵬化迹毋懷辨都師龍象故家彼座此座不動而升遊戲去來無礙小乘大乘隨宜而説兼但對帶何妨坐道場佛法現前滿我願衆望亦足薦嚴潛首座住練塘淨慧諸山疏古人著草鞋住院進退常綽綽然此道如竿木隨身用舍活鱍鱍地公論既大行矣吾黨忍安眠哉某人瀑布挂長川東海赤梢躍出柴片落平地南山白額驚翻與其壓班於崑阜之陽曷若出世於練湖之上據方丈室墻壁瓦礫總是禪機登四顧亭草木藂林盡作獅吼去其積弊慰我同寅寶光隆講主住寶幢江湖疏説經猶海納萬派華嚴宜擅圓宗登地如城有四門寶幢最為捷徑行由位顯道在人弘某人所得既親其傳亦別金獅章廣陳法喻風雷動口角之玄談銅龜塔倒蘸虗空星斗露筆端之文彩幸膺公選合就喬遷前路匪遙毋戀覺城東際狂瀾既倒當思砥柱中流華亭縣勸濟飢民疏官與民為牧任其牧者以時牧之人無食曰飢視其飢則猶己飢也蓋今夏久淹於泛濫故凶年不免於死亡傾薄俸惠而不周勸大家濟之必衆犬馬皆能有養可憐其父子弟兄螻蟻尚且知恩況與爾鄰里鄉黨念彼體膚之餓為誰倉廩之充受田百畝聚粟一家無貧者安有富者獻米五千分錢十萬豈今人不及古人憫窮無告當惻然見義不為無勇也松江盤龍塘重建馬橋疏龍塘有若蛟龍窟渡舟屢厄於風濤馬橋曾過駟馬車題柱久沉於泥滓此兩縣官民共由之道亦四方商旅所出之途諸公運思濟之心揮多金如土塊小子效作興之力求大木成輿梁行將見長虹臥波誰復問驚潮拍岸東望烏溪西望鶴谷三餐而返猶果然南通鯨海北通燕都萬里之行從此始浴院化柴疏浴鼓雷轟熱鍋下更須添火化機風動施場裏普請搬柴有能似雲門拋一片來方許會雪竇飽藂林話水光中照破妄緣影子徹骨清涼肉團上摸著無位真人通身慶快天目山化僧堂疏作堂為我居僧天下記永安之故事立地要人成佛山中紹臨濟之正宗就懸崖掃去劫灰向閙市推開施藏聽香嚴擲瓦礫總是家珍看趙州拽木頭便成鋪席托鉢待魚鯨互吼下床與龍象交參過禪板來過莆團來著著得知落處見燈籠笑見露柱笑重重打破疑團此話既行何事不辦子庭柏首座別浙西朋舊歸四明多寶寺疏過錢唐三十年敢道泊船水淺望太白五百里終憐隔岸山多也曾將庭前柏樹描寫示人長自謂紙上葛藤卷舒在我腳債之償既盡鄉情之感難忘陳蒲鞋眼空天下衲僧誰能及者馬簸箕氣鼓溪邊婆子我則不然謝行贐於諸公賦歸來兮多寶小廬山翻蓋佛殿疏小廬山有大奇特禪淨土同此熏修大雄殿非小因緣佛聖人得他受用歲久漏透時當掀翻遇騎鶴客解纏腰之錢吾事濟矣比牧牛兒捨蓋頭之笠厥功懋哉白鶴觀金書道德經建玄帝殿疏白鶴橫江東來此地卜神仙之宅青牛度關西去今吾傳道德之經謀將募金以代墨卿藉是搆殿以祠玄帝諸賢一諾二美俱成瑤壇展卷燦星華鸞鳳交飛而光搖紫府皂纛拂簷垂斗柄龜蛇合兆而氣轉洪鈞簡在帝心介爾景福榜真如菴悟心居士看藏經榜經律論會歸一藏海由深廣而水乃混融諦緣度分授三乘花自短長而春無高下結集見五時之規範流通為萬代之舟梁君看信手拈來無非至寶誰謂從門入者不是家珍在總持曰妙曰玄其功德難思難議説説是悟心之方便塵塵顯即相之真如要從言外知歸試向目前薦取文彩全彰而一字不立信吾宗無法與人神光獨露而萬象交參盡大地同時成佛費府六七薦母誦華嚴經榜浮幢王華藏海十方諸佛剎剎交光阿蘭若菩提場一切衆生時時成道金剛座普擎於大地寶網珠含攝於自心念吾母之捐軀今晨六七知遊魂之託質何許三千宣七處九會稱性之談演四分五周列科之義伊蒲饌香浮甘靈雜華林春動慈風當淨其意如虗空遠離妄想願回大心入法界啓悟真機秉善財童子之利根獲摩耶夫人之深證理即事事即理而事理無礙正現依依現正而依正同源末參入普賢行願門融會五十三人之見解正念往彌陀安養剎橫超十萬億土之途程覩無量光受當來記法華經會榜如來教網將收照眉毫於萬八千土弟子信根既熟翻口欵於四十二年為明大事因緣故現本光祥瑞表人人之性具彰佛佛之道同妙豈容言談九旬而莫及法非易解融八教以同歸蓮標攝果在因華譬施因為果由是三周圓演從而七喻備陳若醍醐之注心乳酪二酥忘其味矣猶髻珠之入手金銀七寶奚足珍焉雖開本迹之二門終顯權實之一致高山幽谷日當亭午而等被照明敗種焦芽歲遇有秋而咸蒙刈穫念斯要不堪久默在今時合共弘傳誦者聽者結願流通開之示之隨機悟入是滅度非滅度塵塵現寶塔全身即見聞離見聞法法顯靈山一會梁武懺會無遮榜一路涅槃門本無身心受生死十方法界性皆以愛欲成輪回由一念之自差歷萬苦而莫息今則示諸懺悔止黑風而業海波平濟爾飢虗沾甘露而寒林春動切忌等間蹉過勢須勇猛提撕撲落虗空撒手懸崕上立踏翻窠窟分身異類中行師子林天如和尚語録小師善遇編書問上答義海禪友自獅巖大木既群栖既舉隨所飄而西東不復集矣余亦追蹤船子至華亭延緣既久新識日多惟十年前山中故人相尋者絶少忽小廬山安友石來始見若不相識詢其名乃喜且驚復出足下書又增驚喜問某人某人則皆為古人矣遂又為之歎且悲也歲月幾何少者長老者亡吾與公年相若而幸未死則又拓落阻絶一見良難翻思天目雲門草屋間拾枯松挑野菜煮泉坐石笑傲人世夜則青燈對床深入禪定悠然道聚之樂今如夢如響不可得而追矣審足下為鄉井留涉世緣而不染此所謂佛法世法打成一片礙無礙境逈然超越豈小力量者所能及耶又審令徒遠歸則受業之簷可息肩矣但未知義海何時能扣吾門使吾喜且驚乎世緣雖曰不礙終以撥置為高古者云出得荊棘林還你是好手敢恃道術相忘臨書三囑又余向謂九峰地僻可以避喧絶緣奈何住久緣熟至有以鐵枷見招者良費推托故自新年以來掩關謝俗不與諸人交接雖兩厪足下扣扄而不敢延納始則渴望而不至至則隔壁而不面交際深情諒不在覿面相看處也幻住先師聲光不能盡掩遠達聖主之知諡以普應國師之號賜廣録刊板入藏五月初同參弟兄率諸道俗排闥而入以編集校勘見屬故又不容不順情一出出則聞義海寓姑蘇草菴鋭然進道又聞禪學之徒與外教殊宗之士交相稱慶曰三千九百丈天目又聳出雲霄一頭地矣獨未審義海進道之志與天目俱聳否邪會晤有期故先以此奉問答劉鶴翁別愈久相望愈切消息愈疏惟其愈疏而愈不可疏者道與義也今度書來承為法出世之勸有謂歸鄉院子無大小云云此鶴翁交友之義也里閈相期之情也非余志也蓋往歲笑隱和尚住中竺時嘗因青原龍須二寺闕皆以賤名舉於行院且周旋丁寧薦之甚力時余在蘇有所聞急買舟併日至杭以苦情告笑隱如困乏之家告免惡役告再三而後獲免笑隱怒連呼高僧以見譏鄉曲或笑其騃或以嫌小疑是豈真知余哉鶴翁真知余者而亦未能絶此疑邪始余割親友之愛飄然數千里者志在佛祖之道不在名位也苟志名位則原須之類何處不有又奚以數千里外為哉幻住師既寂之後余水鄉山鄉隨所遇而休焉惟諸方有虗席見待者亦嘗屢聘而屢却之蓋以道德未備為己憂不敢以名位纍其志然名位不可却亦不可求繫乎一定之報緣惟當求其所可求行其所當行者其出處隱顯之迹聽乎緣之所定何如耳足下天資純粹友義深密或謂近年世故奪其靜福余曰不然天地間林林總總從古逮今孰能無事而達人襟度廓若太虗具正眼於漚花露電之隙不撥一塵深造聖賢堂奧回觀世故總是遊戲妙用余所以相知相望於鶴翁者此也答無際藏主飄泊年深與公會別時處音聲顏面皆在夢寐倣佛間矣比聞憩錫靈隱相距匪遙甚欲趣見而未由承示古鑑師叔語録謀以板行之意此固學徒當為然亦不易或校正或敘引倘非其人不可以託蓋見未明者無足以取徵無名位者不足以借重眷系之在卑者則又不當為凡此三者吾身備之況數年以來杜門守靜文字應酬一皆禁絶果何所知何所見而敢當此責哉今靈隱和尚一代匠目公幸入其室宜以扣之去取必得其當併求數語於卷端則異時傳之諸方可塞疑議之口石刻之文亦當求之於當代士大夫庶幾有光于前而取信於後云與中菴長老比一見歡如平生以同參故語言無所忌憚不知見信見怪為何如邪別時承問楞嚴謂於先師或問處有疑今就所疑處略加勾提指其捷要矣先師嘗有云教乃即文字之禪禪乃離文字之教惟教與禪名二而體一也吾謂足下先須向一門超出掉臂橫行無絲髮滯礙乃至塵勞起處海印發光然後即文字離文字皆有超然獨脫分以足下俊邁之資決不肯輕易湊泊近來世道多艱住院者困於院住菴者困於菴惟足下主一大方未嘗經意而百順滿前此皆宿福所鍾不可不自慶也然福為進道之資其分有盡可恬然坐享以待其盡乎今夏既一衆相依凡所謂策進勇往攻苦食淡者皆當以身先之期必至於獨脫超然不疑之地而後已庶幾佛祖慧命之燈未燼而愈明相傳而益廣始可驗無所忌憚之言不為無益於同參也答雲岡長老客華亭五六年聞佳譽匪一朝夕恨不及造見然亦豈待造門而後為見哉十月十二吳江會形山知客得所惠書審報國營搆一新以住持事舉及區區知感知愧此特雲岡誤於采聽而不加察故錯舉至是耳方藂社荒蓼之秋厚自奉者何限求其傾己橐開選佛場思與十方禪衲共者誠不易得非宿秉願力樹精進幢不足以致此寺之成既不易主之者尤不易蓋欲行古法於新寺以為悠久成規苟非其人不惟敗事亦有以負創始之盛心豈易事耶某佛法未夢見世法更踈離群索居日趨僻鄙既無力量以處衆又安能以身率衆哉以故決不敢拜命之辱望即改舉毋復遲疑異時方丈得人當圖走慶并致不恭之謝云與海巖長老夏五圓侍者遠來適余有他行不得從容延奉為欠事先幻師沒又十二年矣承其蔭享其賜者何往無之能不忘所自思致其道德聲光於無窮世者遠有照堂近有海巖數公而已廣録據鄙見勘校似無大誤未審別遇老成重與細論否松江僻遠往來者稀絶音耗又數月刊板成者不知幾何惜不得親預點對賴足下臨事好謀意度周密所作必精敏無遺憾矣刊畢先望印寄一部更正刀誤然後廣行乍寒順保不悉答頑石和尚四方宗唱不古憧憧禪笠惟報國是趨歲作一造化境樹林水石宛然有古道顏色因竊自慶曰熱油鐺下火種尚存吾宗未至寂寥也又竊自慰曰天龍手眼不差推吾法兄一來則雲岡父子向之怒我堅却者今當知所感於我矣風雨留丈函三日留有供行有贐禮意有不能忘者別後擬尺札致謝或謂飛錫在杭故未遣形山來乃承示教則致謝之機又落第二徒增愧感而已寺記之喻非敢與聞矧雲岡以願力建法幢其豐功茂績耀當世而垂永久者何在刻之有無哉然往者嘗聞面命今書又謂礱石以待似不容以非才辭旦夕當紀實以呈以聽可不答形山首座大雨雪雹之夜得高人在山山房夜無寒色至今禪榻青燈恍焉如對忘其別已半月餘也文既不獲辭且承雲岡之命併用拙字今率爾撰寫以納千佛閣等來狀謂雲岡己資為之今不欲顯言之者蓋有二意焉一者全寺之功皆歸雲岡若獨指一閣則其功有限矣二者既言己資恐後來難塞浮議之吻況文中有一節云計雲岡所得無幾而所用若此之廣而無窮豈有他術哉蓋廉而有謀才稱厥智又能刻己以附益之耳此數語包含己資盡在其中天下後世作者見之朗然方丈現在閣之東文不言東而言後者為他日張本也字有筆力不到處更煩布置蓋近者文成之時適有徑山書記數客至雨窗下逼我落筆天時人事之乖不無老草失意處也足下才識深遠用事精密應笑鄙言之瑣瑣然敬其事者必不厭其瑣瑣也與道林書記近承過我而不少留經載間絶之懷令祖遷化之故皆未能委悉致問至今悵然竊思如菴大法師握性具宗綱居崇極之位化聲始盛而忽寂學者缺望然末後光明不以耀方外而以示子孫者非特見故山緣重亦以見繼述之重不苟託也有子如此有孫如此橫翔捷出踵武可期如菴之死為不死矣余於法師締交未深而於足下諸公辱愛非淺喪筵慰拜當在人先屬有不出之戒心迹相左嘗擬寄祭奠微儀又自思其不虔故屢遣屢止此特世情往反虗禮義暉假螢爝之助哉惟高識遠見必能察其至敬至望之心也無念爾祖聿修厥德為子誦之跂余望之又書來知尚留故山殊慰所望昔玄沙不出飛鳶嶺汾陽足迹半天下出處雖不同而道聲德華喧耀千載一也蓋出處在乎時緣道德在乎己躬方之內外豈足議哉如賤子荷一笠皇皇數千里栖栖大方之門者有年今而草屋半間涔視湖海者又有年矣其敢與時緣力爭哉藂社蕭條舊交搖落眼前相知相尚惟足下耳相距半舍許朝往暮還忽然平地上踢破腳指頭笑不成哭不是道德時緣一時裂下却罵老汾陽舍邇求遠此吾所謂慰所望者與禾山崇首座余居浙十八九年諸法眷無一人至者及前歲旨侍者來余適深閉禪扄杜絶人事故未能一見而故家故業消息皆罔聞知今壽侍者會間能言汝之動靜歷職兩序處衆以和無敗事無犯分人不非議而且稱道之此可喜也永新諸老不知余心乃欲舉禾山之鼓以纍我汝豈不知余者何乃亦在扛鼓之列使余解打鼓汝能安坐而靜聽乎即請放下話頭為余歷告諸山毋煩重舉世故無窮人生有限今彼此四五十歲浮光幻影變在目前汝既是山中勤奮已有一間間房燒香煮茶靜中觀幻當自得一種真趣復當別有好消息來也與石崖菴主長夏絶往來不能一字奉問七月聞杭有火至湧金門或謂火止柳洲寺八月旦雲居僧至始言積慶亦被延燎吾謂公肺肝俱痛無可奈何然天地間萬物變幻者理之常也數之定也石崖達士以道眼洞觀理數亦足以不動其心然或猶有可喜者焉物不壞則無以見其成器不斃則無以召其新蓋此精藍當必更新於石崖之手也且公之志慮足以應不測之變才智足以有為而有成又或先幻師之冥祐諸檀之外資不幸中有大幸皆未可料自今而始壁不固者墻之基之未平未滿者平而滿之屋不在多在乎濟用池南可以植竹屋後可以蒔蔬大小伸縮隨意展施規模景物咸勝於舊此非可喜而可慶者歟余往還湖山間十有五年相識雖多其憂患相關惟公而已今火中既不能相救火後又不能相助憂患相關之謂何有哉諒相知有素必能深鑑其情而不責其世禮也答種桃翁曩歸省不數日再出今又十年故山松柏屢形遠夢癸酉春三月虗菴來獲領教帖捧玩不忍釋手時翁年七十有五詢虗菴所見言貌則曰聲撼風霆氣沮金石因竊自謂吾宗典刑後進之矜式老夫憖遺之意未已也承問參禪指訣此乃大丈夫末梢一段要緊事自有天地以來擾擾勞生茫茫業識成住壞空相尋乎無窮士大夫能痛快領悟得其指歸者白樂天蘇東坡楊無為諸賢是已吾叔翁能盡掃群疑篤信斯旨則先鞭角勇豈讓楊蘇輩哉所云指訣者禪非世間之學故無指亦無訣也先師亦云參禪無祕訣只要生死切若生死之念痛切則三昧自然現前生死不切雖有百千指訣皆成戲具前輩尊宿無奈士大夫之不切何於是説機緣説譬喻説警策説疑情説下手做工夫皆一期方便之語不得已而然者今已別幅條陳倘一過目而深思之猛省之據其要而痛策之指訣在其中矣種桃翁序記等喻分卑未敢著語異時或可暫歸當逐一侍教小弟中行懦孤不自振尚賴推猶子之愛扶植之護成之此某三千里外未能絶俗之心也西望拳拳答天目逆流和尚昔幻翁為大雄山人作活埋記指世尊掩室飲光入定為喻而深有發明時余目擊操觚頗味其旨幾欲以身試之而無其所如負宿願今年春始得塞墐戶牖依圓覺上期之限以酬之適六環飛下天目率山中龍象過余而不及會誦分明只在尋常處如隔千峰與萬峰之句而去未幾斷崖和尚示寂訃音遠至余亦靡所聞中夏出靜始知則奔赴祭葬之禮皆已後時矣因自咎掩室固佳揑怪亦不少既絶客又闕禮不亦世相之罵門乎遂疑佛祖處之必自別又疑幻翁記之或未詳由是疑團不決顏甲不解者凡兩月忽起宗侍者持所賜書與崖翁遺囑之惠偕來書不以罵而以贊以羡從而疑愧俱解謹西向熏香頓首祇承外仍約秋涼一造峰頂先拜法雲之塔致掩室安居之謝然後次第展拜一以謝方丈一以謝雲深老人答大拙首座自舞馬之變至巖上吾焦腑如被焚者數月又念東岡幻廬金膝跪跽之地萋萋荒草誠可寒心歲晚泰侍者來聞山中諸老日就拮據又聞大拙棄屣西來為東岡汛掃吾然後幡然自慶曰幻廬有人矣獅巖興可待矣余小隱九峰間雖無參謁之勞而應接亦不少何當從君於頭陀松下誦白雲酌流水以終殘年為快也又記鶴灘大浸未退時有客隔水呼船過余萬竹間傳周千之所惠佳什及大拙高和良佩啓發厥後嘗奉一書為謝今記之隔年事也策翁至始知未達因思癸亥春過小廬山阻大雪三日未及會千之及其入山又交臂相失至一書亦未果達世事相違每如此可笑也今正覺招隱之疏復辱千之過量題品所謂西江十八灘不供猛吸南溟九萬里猶屈壯圖去就之間盛衰攸寄者何從得此語哉區區之離天目忽十年承足下與策翁屢舉葉落歸根之話實獲我心然平生所至雖喫舀溪水不識舀溪杓乃正覺以杓柄見招非其招也倘諸公無固必容我兩峰之間巖上巖下曳一主丈白眼看青天此則不敢辭也然去就亦自有時姑俟之答弟行遠壬申七月十二日得辛未冬觀山所遣之書報吾宗死者獨多為可傷然少者老老者死理之必然夫誰能免其遭時之難易逆順涉世之苦樂修短是亦現業所招或宿業所感孰能致力於其間哉惟吾所謂可傷者虗生浪死耳且如先人一生世網中勞形役心殆無虗日何嘗有一刻一息之頃念及來業來報邊事吾忝學禪不能使父母發明生死大事成就道業此為可愧然竊觀二老恐非禪學機器猶發藥不對病則反病於藥矣故甲子秋之歸嘗以繫念法門為當機對證之良方也爾後日遷月化其操舍勤怠及臨終得力與否皆非吾所能知今幸老母尚壽而歲將七十餘景幾何此又不容不再告者繫念之法不拘行住坐臥不必出聲損氣惟務至誠默想默念念念相繼心無間斷敢許現生肉眼便能見佛或見光明或承摩頂等事又豈定在臨終時哉此是一種捷徑法門至簡至要極靈極驗故先德有云不信佛言何言可信不生淨土何土可生倘使得生淨土見佛聞法不患大事之不明生死之不了道業之不成矣其或不然則虗生浪死苦趣其能免邪請觀諸已死者平生所積無一物可將平生所為無一事可靠平生所養子孫無一人可以相代長夜茫茫遊魂靡託其可傷者不在茲乎煩吾弟具以前説詳告慈母切不可以雜務關其懷抱須旦夕曲施巧便令得專心致慮倚靠者一著子如照夜之炬如過海之舟不可須臾離也誠能如此預備行纏功無虗棄則汝事親之孝莫大於是矣又茫茫水國中宗遠劉君忽至相見恍不相識十五年之別三千里外來彼此老朽可憐也收吾弟書報老母安健此為第一喜汝能盡歡菽水又一喜也越十日實塔主亦自仰山來又收前歲所答之書二書所報及宗遠話間鄉中境況蕭索槩可見矣今夏浙西有水蘇湖杭秀之田皆在淹沒而松江為獨甚松江二縣惟華亭素稱富饒福善之每歲官糧自該八十餘萬石今乃一槩入水鄉村不可居者散而之四方城中地稍卑者例遭沉浸官率有力之家繞城作壩晝夜車戽市民始得安居余之隱所在城北距城二里許居址林園雖高而繞圍沃壤悉變為湖帆櫓往來宛有西湖孤山風致但以波濤舂撞四望可畏故亦徙而避之入城寓居者凡數月宗遠曾時尚在寓所九月半水勢稍平復還舊隱自余來華亭今十載嘗見己巳大旱庚午大水辛未飢疫民度苦劫以來疲困凋殘六七年尚未蘇醒不幸今戊寅之水其毒尤酷漳人之鬨兩浙間軍馬經過處雞犬不得寧賦徭縱橫民亦良苦來歲豐凶安危俱未可卜是蓋同業所感為之奈何茲因來書以鄉中境況相告故復舉浙中境況以相酬令知鑊湯無冷處然亦有同劫不同受者惟當守分隨緣修身俟命而已耳此外却有一種上緊説話乃是舊時公案未見證據不容不再檢舉者吾母於禪門直指之道既不能湊泊舊嘗勸其精進念佛特未見其成功倘不見其成功唐勞何益當痛念人生七十古來稀今已七十五六造物相待儘自不薄又當照破世間總是一場夢事苦也是夢樂也是夢富也是夢貧也是夢莫被夢境所惑起心造業誤賺平生試觀宗黨親鄰死却多少他也勞勞擾擾波波挈挈一生做夢成得甚麼邊事前夢未了後夢又來莫教打箇筋斗夢向三途苦趣中去者傷生受不可説也當此之時親父親母救你不得的子的孫替你不得舉眼看來有誰可靠惟有樂之佛能救度汝能攝受汝能保護汝能成就汝切須趂此眼光腳健全身倚靠求哀乞憐夙夕懇禱不可斯須放捨你若靠他不穩未免等間蹉過後悔難追當念殘生如草上露水上漚風中燭石中火變滅無常匪朝即夕不可不上緊也此事非特吾母可行凡諸見者聞者皆當相勸諫同使發心亦是一種大方便事宗遠屢勸吾歸吾於鄉念無他惟省母未忘省母無他惟欲勸其努力進修耳倘吾弟深鑑吾心輔行吾言使不忘進修之勸信有樂之生則母子弟兄之會可期矣鄉井之歸奚足念哉答雲西曹道録乃者嘗復書有主丈敲門之約既約復爽公其謂我何哉尚賴脫略知見索我於世禮之外可也去年令弟居竹翁惠顧小隱松陰待茶談及所書法華因舉一二語配吾禪以當酬酢翁怡然有領話之色出門揖別復相期曰勿迫未聞底蘊留以為後會余自是每語人曰深省哉是翁也天必假之以年以為士大夫方外標準不謂竟爾長往為可痛惜掩壙命下且曰遺命也因歎且感曰向之揖死生之別邪今之命後會之期邪是不可辭已答元實孫教授枯坐莆床松籟四壁尚想高人過我清論之餘音也想未既復辱書佳蔬雙缶併至沙鍋菜根得此旨蓄自憐枯淡舌頭又被人瞞却了也呵呵與訓書記五髻峰頭一夏多嵐雨而又藜糲荒寥淹屈相守非平昔交際之深情相忘道術孰能甘此哉出山之後旦暮望湖山城市草樹煙雲冥濛萬朵不知公在何許煙樹間所至想皆適意曾不念峰頭孤寂者乎不動軒主人似念余之孤寂纍日招呼延遇繾綣忽自舉其語曰碁盤石斫破你腦門鉢盂池浸爛你腳板連舉數返余亦隨口應酬作佛法會時前堂啓公在側橫點首而哂之退而語余曰莫作佛法會却老子將分半院與公共住意在言外也乃竊思之余腳板有債未償老頭皮亦未肯輕易斷送彼既言外我當機先焉能鬱鬱久於此以坐待其殘毀乎徒遇來前先此微露數日後必相見于城餘儲既見傾倒答悟心居士三載兩得解后足知留意吾道雖置身於世務稠林中而有逈然脫略之志是亦大丈夫之志也然參禪一事無口傳之方亦非手授之法惟在當人領取話頭於動靜間忙自作轉變自究自參以求自證自悟耳來喻謂雜念紛飛不成片段此亦無足怪者居士既握一家之權諸緣滿眼百慮關心安得便無雜念又況積劫以來被塵勞煩惱重重纏縛所以世緣太熟佛法太生今日要將生處放教熟熟處放教生是須憤發一種不顧身命底志氣向世緣世念最熟處一刀兩斷連根剗除世念既空則佛法正念自成片段矣降此以往若必欲別求方便却望於治家辦事之外待人接物之餘深夜未睡之時清晨初起之際將俗務家權盡情撥退單單提起本參話頭抖擻精神使之綿綿密密無絲毫間斷話頭既無間斷雜念自然不生雜念不生即成片段要於片段之中覔一毫動相靜相俱不可得久之忽然觸發和箇片段盡底掀翻便是了悟時也古人云參禪無期限但以悟心為期既悟其心則千經萬論總是間家具矣今居士既稱悟心當因悟心之名以求悟心之實也
