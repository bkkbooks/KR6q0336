觀神機秋鷹失兔草莾動斷道夜雪行人稀丹還金鼎會龍虎海國破浪孤篷歸太初一黑蕩摩裏萬化白戰搏空起何曾一路無死生觀者紛紛少知此吾有劉君甘君狂且豪奕未過子兮材情高一展經綸試國手翻視楸枰復何有西來訪古崑崙丘劒夜舞呼蒼虬登白鶴兮問王屋汗漫長歌紫芝曲嗚呼顯卿兮安得聞此歌共笑人間殘局多和送梁壽川之任南康醫教君不見眼前病癖無全人又不見杏林種雨年年新豈如梁君小試醫國手飄飄捧檄行青春行行東向廬江路星渚風煙彭蠡樹雙池看瀑九江晴五老聞鐘亂山暮我憐民物瘡痍深養生未必非其心元陽扶植起枯朽一草已足酬千金莫辭印綬非君意虎溪未許陶公醉會看採藥上蓬萊長裾曳破燕山翠真州送別悅希雲長淮岸岸飄風沙沙根吹出青蘆芽我行送君君送我笑語在眼心天涯三界如夢宅四大如漚花東來西去問歸路不知何處真吾家欲別不別重相携別思已逐寒雲飛飛雲一去不可得千村萬落明斜暉回頭望吳山滿目青依依亦如送我望我去立盡風煙未忍歸年時度雪西峯顛蒲團永夜青燈前坐談生死念如水鐵石未比肝腸堅人事有遷謝散聚終隨緣山川可棄友可別初心未可輕相捐藜羮糲飯山人祿望重身榮未為福詞章滿世金滿床業纍轉深心轉俗一息微如𮈔寧肯長相續髑髏只有抔土緣莫把殘生妄馳逐乾坤旅舍暫時住腳跟不受純鋼鑄我持天目黃精苗歸種鄉山最深處苔石晝眠雲松爐夜煨芋他年有約未相忘相尋試舉同參句送止照歸古洪曲江莫雲飛上錢王臺亂峰蘸碧湖光開六橋秋色看政好之子不肯重裴回百年萬事煙雨過鄉井一念終難灰浩歌歸去送歸去夢斷楚水何時來鑾江鎮上雙江洲大船解荒洲頭挂帆蔽空捶鼓發白浪卷雪風蕭颼故山三日忽到眼恍忽天上飛驊騮向來歸興有如此今日送子心悠悠抖擻天目蒲花團摩挲鐵脊氷霜寒豪來意氣隘湖海歸思浩蕩如奔湍樟陰樓殿曲江曲聽鐘聽雨吟燈殘此時會有會心處傾倒客路情懷看獅王一去挽不回秋滿巖谷天風哀龍囦象藪亦多士濟濟熟視宗綱頽誰能共掃松下屋黃精黃獨連門栽霜林月上芋香起指點深撥寒爐灰世緣味美如飲醇飲之不覺酣且沉斃囊一換即非我知有幾許間光陰男兒自負鐵肝膽萬變未肯忘初心天涯相送復相贈苦口一語如千金入仙洞山入山隱隱如聞雷山雞角角隨人飛松風洗我市喧耳松露灑我青蘿衣平生結習重幽賞會景會物情依依誰能歌紫芝我當歌采薇招呼雲外青鸞歸松陵晚渡圖夕陽兮在舂歲將晏兮江空平沙古樹兮蕭蕭朔風高人曳禪策兮招短篷賦歸來兮青山碧雲之故宮畫者觀者咸謂之松陵晚渡吾獨念楚山萬里峭拔而舂容初若揚瀾在蠡見廬阜雲屏之五老又若洞庭南岸望道林嶽麓之羣峰嗚呼吾豈無青山碧雲之故宮浩歌歸去兮吾誰同上海舟中即事烏溪出閘催雙櫓急趂回潮下黃浦午前期到上洋城生怕潮來近亭午夜潮已落岸痕高風卷浪花翻雪滷渡頭趂渡人如雞水行泥行亦良苦西岸衝波遠入村東岸湧沙作林圃岸上居民無定蹤頗怪潮行無定所吾年五十遊上洋今歲重來五十五豈無玉雪美少年向來一揖成千古亦有鴟張萬石家勢去一朝無寸土噫吁嘻人生幻化若浮雲陵谷變遷何足數遊宜興張公洞洞門自山頂直下秉火橫入行稍遠乃有隙光投光而出即山下平地矣蓬萊滄洲何必遠在海桃源武夷何必深在山張公古洞仙一國只在人世非人間頂門梯空直下幾千尺恍疑犯死投龍關陰崖石髓不知何代凍作玉磊磈瑤芝瓊筍地爭孱顏上如帝網之交羅兮寶幢珠蓋氷雪老下若鯨鰲之怒鬪兮銀濤鼓舞潮牙翻參差鬼物列萬怪泥田藥竈鉛花斑山童秉火急指點尋幽探賾心轉頑路窮稍稍隙光發忽脫混沌歸塵寰岩呼谷應寒籟起鳳簫玉珮鳴我思身無生無意換仙骨亦無養生事底用丹九還了知心外無別法遇緣乘興聊躋攀安得勞生離世網暫息一念觀循環又安得掃空八萬劫解脫仙與佛入生入死隨吾間示友人三首塵網苦多纍暫間如脫羈胡為塵外迹而乃東西馳聚談每倉卒既遠翻多思眼前失真宰身外何求知百骸如僕馬勢合聊相隨氣運忽遷謝一散無重期來日不可待去日不可追靜緣當自保世故方無涯逝水不復返黃葉無重榮萬物有終極浮生欲何成愛緣一染指智慮常縱橫寧知昨日事轉眼多變更聖人示欹器稍滿還復傾及時不自惜時去空傷情蕭蕭墻頭樹靡靡墻下草繁茂曾幾何已復見枯稿人生無根源身世雜醜好自從墮地來萬念日紛擾運化潛消磨容𩬆不知老如何百年間樂意常自少君看古來人心事誰獨了登西林沉難自居偶思散遐矚主丈登西林斷崕倚修竹崖上藂花開飛禽自相逐崕下清川流水光泛嘉木四月風雨多平野一時緑長嘯白日低煙雲起空谷俯視萬化間勞生亦何足夜坐聞蛩山人坐樹陰樹轉月當午江市夜猶喧笙歌雜砧杵寒蛩亦何情唧唧如共語前聲稍悲悽後聲轉哀苦人心汝莫知汝語人莫取萬類各有私悲歡豈同趣茫茫元化中同一風氣使何如悟天真隨分樂生死遊茅山雲林清遠之館華陽有客似重來新見雲林別館開寒日半巖松鶴起腥風萬壑雨龍回琴床流露滋瑤草丹鼎飛春上玉梅居者未知清且遠人間咫尺望蓬萊次韻送古潛縣宰解印遄歸意若何山人長憶舊相過詞鋒稍見禪機孰案牘不如吟卷多花雨聽鶯春滿酒柳風立馬月搖波賞心樂事皆勳業留與溪翁溪女歌漕運萬戶某脫險于海因和韻唁之語未開辰已改顏向來海運歷多艱連檣影落蛟涎窟孤枕魂飛鬼骨山出匣劒龍驚怒吼傳家珠虎幸生還黃金任積高於斗不博休官一日間徑山送瓖上人歸吳門吳門長想是吾州城北城南半舊遊佛塔分標林野寺客帆飛繞市河樓送君忽覺襟期動老我難忘腳債酬七十二峰看橘柚買舟重約太湖秋送時無擇維那歸閩百計歸難禁生緣樂未窮聽鐘榔葉雨欹枕荔花風吝久閩音化交深楚俗通片帆明日遠雲斷海天空重登秋月樓病力蘇新雨登樓看夕陽岸移江市遠洲接柘園長村晚煙催暝水陰雲送涼客中情味熟隨地得相忘送鄉僧昱曉林四首海雨吹花雪作堆那時敲我竹門開自憐水國三千里也有鄉僧問路來風沙風葉攪征衣今日江頭送汝歸西望故鄉何處是楚天漠漠片雲飛鄉夢鄉愁我已疏十年不見故鄉書兒時聚首人如王老大不知今有無鄉人問我幾時還向道如今又入山一箇蒲團半間屋吳松江上九峯間登茅山天市壇四首天市危闌倚碧空兩京山水見冥蒙東來十日風霜路只在寒嵐一抹中白雲剪作瑤壇雪寒旭蒸開玉洞花山北山南看更好炊煙朵朵是仙家一片松林又一宮開門面面看茅峰意行恍惚廬山路歸飯僧分上下鐘郭仙清夜扣舷時萬籟秋笙月一池千載誰傳靈鳳曲羽童吟作步虗詞一峯雲外菴和韻四景碧虹分兩半山橋橋下春雷卷怒濤老衲定回推戶看隔溪開盡野櫻桃竹屋茶香滿澗煙緑杉深處響流泉目前有法誰能説落日微風一樹蟬平田水語稻花香半解蘿衣受晚涼景物雙清秋政好亂山雲外又斜陽衲被蒙頭宿火紅雪寒愁聽上方鐘開門忽怪山為海萬疊銀濤露一峯湖村菴即事三首日度斜塘水氣昏石橋高柳對柴門霜風攪樹葉如雨忽見一帆來遠村竹根吠犬隔溪西湖鴈聲高木葉飛近聽始知雙櫓響一燈浮水夜船歸開渠築岸護低田坐聽鄰翁説去年賣却犁鋤買漁網兒童蕩槳到床前訪仙洞山舟次大溪口窈窕仙家何處尋夕陽明滅亂雲深大溪橫斷青山合一路風帆入樹林贈弟仁遠入京并引始余別家時仁遠從弟年才十七今將四十矣鬚髯戟張言論有遠志以湘南教官滿考乘風為上國遊艤舟維揚迂道來徑山相尋梅雨中禪榻共燈數夕既行贈偈四章以紀別思以戒其速歸虬鬚鐵面岸綸巾膽氣粗豪語逼人二十三年不相見却疑年少是前身雨嶂煙巒翠欲流天開圖畫萬山頭凌霄閣上憑闌意留與他年説舊遊白雲峯在夕陽邊目送吳雲入楚天汝到燕山却回首三千里外又三千錦袍花映鳳池明玉珮光搖紫府青富貴著人如醉夢倚門慈母眼長醒曉行吳松江朔風吹面雪花深船渡氷河似棘林却憶蒙頭茅屋下地爐一暖直千金水轉沙塗又一灣迎船孤塔出煙嵐長江一道橫風起兩岸爭飛上下帆師子林即景十六首鳥啼花笑屋西東柏子煙青芋火紅人道我居城市裏我疑身在萬山中萬竿緑玉繞禪房頭角森森筍稚長坐起自携藤七尺穿林絡繹似巡堂素壁光搖眼倍明隔簾風樹弄新晴樹根蛙鼓鳴殘雨恍惚南山水樂聲指柏軒中六七僧坐忘忽怪異香生推窗日色暖如火薝蔔花開雪一棚相君來扣少林宗官從盈門隘不通散入鳳亭竹深處石床分坐繞飛虹亭名栖鳳橋名小飛虹半簷落日晒寒衣一鉢香羮野蕨肥春雨春煙二三子水西原上種松歸鴉鵲爭巢似憤兵怒鳴死鬬亂縱橫可憐踏壞桫欏樹滿地落花無路行道人肩水灌畦蔬托鉢船歸粟有餘飽飯禪和無一事繞池分食餧遊魚臥雲室冷睡魔醒殘漏聲聲促五更一夢又如過一世東方日出是來生西鄰母鶴唳無休鶴意吾知為主憂養得鶴成騎鶴去楊州未必勝蘇州竈兒深夜誦蓮華月度墻西檜影斜經罷轆轤聲忽動汲泉自試雨前茶林下禪關盡日開放人來看臥龍梅山僮莫厭門庭閙不是愛間人不來斜梅勢壓石闌干花似垂頭照影看白晝雲陰天欲雪半池星斗逼人寒雪深三尺閉柴荊歲晚無心打葛藤立雪堂前人不見秀雲峯似白頭僧有客來求警策歌歌成斂念入禪那茶童催我下樓去樓下新來客更多語默無心道自隆目前誰解顯吾宗長長短短象牙竹怪怪奇奇師子峰
