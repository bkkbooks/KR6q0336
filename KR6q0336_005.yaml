body:
  text: 小師善遇編佛事宗上座鎖龕台州人燈籠沿壁上天台且道明甚麼宗旨宗上座死却活句活却死句佛祖牢關鎖你不住讓後堂火説法兜率宮讓他第一座翻身涅槃岸奪得最初機離四句絶百非烈焰堆中更發揮能上座火拖箇死尸來鼻孔不對口能所兩俱亡蝦跳不出斗擲火云如今跳出了也水底火發燒虗空藂林盡作師子吼報恩定長老中路轉骨嗣高峯和尚道吾遷塔就石霜知子莫若父報恩移骨歸天目家富小兒驕雖然一種恩情爭奈兩家機軸撫骨云若不是定動衲僧狹路相逢放伊不過依維那火以火打圓相云雲峰破桶篐依稀似者箇以火打破云一擊百雜碎且道是甚麼性火真空性空真火淨首座火清淨妙法身本來無出沒以火指龕云者箇聻不是心不是佛不是物假名無位真人喚作藂林表率劫火洞然燒他不得嚴都寺火天童家法不嚴都寺兩箇燈盞南山知事得人直是一生擔板要見嚴都寺擔板處麼死柴頭上火通紅現出摩醯三隻眼大上座入塔盡大地是箇大上座盡大地是箇死髑髏盡大地是箇無縫塔且道門從那裏入喝一喝讚首座火眉間挂劒可毀不可讚斬却貓兒可讚不可毀忽然讚毀雙行畢竟是何道理火燒南海波斯觜瑞監寺火輝天鑑地一著子盞底漏油盛不起眉毛眨上火星飛礫破涅槃與生死舉火云諸人還見麼我見燈明佛本光瑞如此聰上座湯隔食病死去聰黜明苦口良藥衲僧有病在膏肓鎖斷咽喉吞不落聰上座汝今藥病兩忘一任吞却吐却文監寺起龕不立文字不涉程途政與麼時如何是文監寺出門句子一不得有二不得無倒跨楊岐三腳驢龍上座火死水不藏龍汝還會也未汝若會試入火光三昧雲壑石萬戶起骨生則封侯䇿戰功死當廟食顯神聰撫骨云更從者裏翻身去佛國塵塵有路通某人英勇無敵沉靜有謀武略文韜自任緑林之馮異忠肝義膽每懷赤壁之周瑜朋友推其賢士卒感其惠奉王命剪除猺撞奮不顧身握兵權威震蠻荒聞者喪氣奏凱始傳於天上歸途忽厭於人間清湘院前打翻筋斗去吳松江上迎得骨函歸天地為之改容山川為之墮淚功既成矣死何憾焉合國稱為大丈夫三十四年從教似夢傳家賴有奇男子百千萬世可以流芳到者裏猛著精神別通消息裂開煩惱網擊破死生關幻形幻影有去有來似浮雲之出壑真性真明不遷不變如皎月之當空即此是自己根源即此是故家田地即此是安身立命處即此是成佛作祖時是則固是且道即今起骨還有祥瑞也無有昨夜天風攪雪花為公灑掃西歸路居竹曹公掩壙脫得生死要知落處落處既分明從空放下去放下後如何天開地闢見全身玉鳳夜栖無影樹某人梅渚參軍之子守齋教授之孫遠則武惠王以來歷代傳青史近則文恭公而下滿門無白丁人皆羡其盛哉公不以為榮也小試教庠之任厭吳江楓冷而拂袖便歸繼承省檄之招愛蒸溪竹居而掉頭弗起素行富貴富貴不淫無意功名功名自至左干戈右爼豆固未忘曹氏家聲朝詩酒暮琴書且願效晉人風度亦嘗刲股和羮以療大父之病亦嘗解衣推食以供寒士之需其待朋友也切切偲偲其待宗黨也磊磊落落儒學子弟仰之為文章巨公集賢縉紳號之以清逸處士平生萬事已足末後一機更高頂門露金剛眼睛著著見古人關棙筆底現法華寶藏頭頭顯自己家珍文字語言一無所礙涅槃生死兩不相妨從前只道出來出來速出來苦哉三界火宅到此方知歸去歸去好歸去儼然一會靈山既曰知歸爭奈有箇將不去底既將不去合與覆藏既曰覆藏有何證據撒土云化城寶所無分別寸土元來是寸金自讚小師善遇請初參慧力海印叟學得面南看北斗及來天目見幻翁笑破燈籠半邊口高懸鉢袋三十年下視萬峯如培塿諸方拖拽不肯動也不教人隨我走如今面目露堂堂試問諸人相似否雷厲風飛見得親滿林盡作師子吼此話既行又何待三十年後無上人請焦敗種草惡毒根苗佛也不要做呵佛祖如呵冤賊院也不要住避院子如避差徭見人修行却會冷笑受人供養不呌難消如今畫影圖形諸方皆認得向後簷枷帶鎖那箇肯相饒既知有罪只得依條預將口欵供成了準備閻羅王取招大拙能長老請臨濟喝得口破德山棒得手酸打草驚蛇大巧大拙證龜作鱉至易至難師子林下漢都沒許多般三世諸佛一口吞却兩眼照人肝膽寒江西護侍者請西江一吸無涓滴天目踏翻無影迹全身坐斷師子林魔來佛來俱莫測描不得畫不得大用現前無軌則若言此是則天如頂上眼睛添一隻卓峯立書記請菩提蘭若樹此樹為樹王我來樹下坐因樹成道場冬取暖夏取涼禪道佛法非所長撩天鼻孔有覺觸枝枝葉葉旃檀香道友隋志義請樹為寶蓋石為床獨占虗空作法堂祖父家傳親切句不曾漏泄到諸方貫之曾教授請號東白道是天如早成差誤道非天如又難遮護大圓鏡裏轉頭看萬象光中全體露或問一以貫之又問一歸何處向道東方既白時金雞飛上珊瑚樹徒弟某人請拂子好打蠅主丈好打狗一步不向人前一語不隨人後行百丈未行之正令誰是同風顯達磨未顯之全機豈容開口者漢頗知之汝曹還會否山河大地法王身草木藂林師子吼雷燈珠三禪人請師子巖前喫攧來姑蘇城裏坐如呆通身轉智都忘却觸著無明吼似雷不打諸方爛葛藤不將名字挂傳燈菩提樹下盤陀石白髮蒼顏箇老僧似天如不似天如似與不似無親踈鼻頭有竅眼有珠為佛為魔都是渠西川如山真講主請談經口似懸河答話機如掣電諸方皆有作為箇漢獨無靈變長松偃蹇翠垂雲怪石坡陀青潑澱間拈麈尾坐如山百億毛頭師子現范氏淨心居士請趙州勘破臺山婆沒誵訛處有誵訛圓悟激發范縣君話頭少處路頭多淨心畫我供養我且道趙州圓悟意旨如何這裏下得一轉語許你燒香供養他飯店蘇居士請老子一生無背面逆行順化皆方便三家村裏持鉢歸十字街頭開飯店是聖是凡人莫辨泉南蔡國祥居士請瞎驢趂隊出廬陵天目山頭中毒深滅却臨濟正法眼變他百丈古藂林蝦蟆口吐一輪月師子毛生萬兩金此話即今瞞不得泉南佛國有知音雲南尊講主請像在林屋之間閙市山林異方人物煨鐺煮銚箇間窩塞戶填門皆上客問梅閣裏著馬祖勘辨參徒指柏軒中容趙州放開鋪席老胡多意氣大坐立雪堂呆漢少機鋒安居臥雲室從來無法與人自也不願做佛扶持向上宗乘賴有許多知識無端再現身外身兩主如何同住得送他無佛處稱尊贈以一把龜毛拂高麗國古道長老請名達行者漢拍盲無見解到處不曾輕納敗平生獨恨老中峯屈我低頭禮三拜觸著無明劈面揮家傳陷虎機猶在目視雲漢三十年黃金未肯和沙賣如今坐在闔閭城盡底抖翻禪布袋不問南來與北來逢人便請還禪債説甚麼千聖不傳説甚麼漆桶不快堂堂古道大家行傳語諸方休揑怪臨濟寺的首座請有問如何是佛向道頭上插筆從古機緣千七百今代又添者一則者一則的中的八面俱收群機自息奪人奪境喝如雷臨濟未是白拈賊高昌國無敵長老請名勝幢生廬陵不知米價飢把心肝樹頭挂登天目遍體汗流鶻臭布衫都脫卸唳鶴灘頭蘸筆鋒義海掃空間話師子林裏開禪窩七佛呼來同結夏不將正眼視諸方一任諸方爭怒罵以無所爭為勝幢是名無敵於天下鎮州秦上人請擔板漢沒思算既不諳古佛家風又未了先師公案棄却鎮州蘿蔔頭收取秦時𨍏轢鑽只據一偏不容再勘讚他做靈利衲僧疑信相半罵他做儱侗禪和是否難判明知自體本天真假名字在人呼喚忽然喚作三腳驢也胡亂讚佛祖出山佛入山又出山久靜還思動衆生成道多時佛法一毫無用阿呵呵如今冷地思量枉受六年飢凍空魚籃觀音錦鱗賣盡手頭輕撈摝江湖尚有情回首長沙沙上路腥風吹作夜潮聲獨坐觀音鸚鵡淨瓶無著處善財龍女不相隨寥寥獨坐間如我政是衆生界盡時達磨二西來沒行市跨水復逢羊直指少方便剜肉要醫瘡答梁武廓然無聖灸瘢上重添艾炷許神光汝得吾髓喪車後高挂藥囊盡道熊耳峰埋沒他不得誰知這老漢鄉念未能忘賴有後人爭氣家醜不使外揚滅却正法眼藏一任山高水長師子林中立雪堂裏佛也不著因甚著你不重你面壁八九年不重你西來十萬里只重你心直口直不順帝王情眼高氣高不失宗師體坐斷天下人舌頭一花五葉香風起布袋縮一腳主丈橫拖布囊斜倚當來下生都道是你十字街頭等箇人伸腳元在縮腳裏寒山放苕帚看卷子轉掃轉多須放下自舒自卷看教親通身是箇無師智不比誦苕忘帚人拾得携簡拾滓隨時拾得隨時用裏許空空實不空本是願王無盡藏向人只説菜滓筒寒拾同軸曾共豐干枕虎眠又對趙州學牛鬪喚作文殊與普賢衲僧頷下雙眉皺朝陽破處補教完工夫做成片紅日上三竿為君通一線對月要了末後句點畫甚分明莫因天上月打失雙眼睛鬼扶過海羅漢肩背相挨航一葦觀於海者難為水龍王鬪富我鬪貧不費一錢能使鬼僧繇畫寶公鷹巢大士面兜搜變現千差畫不侔近世宗師好顏色却無梁武詔僧繇應菴禪師用虎口奪食之機恣行五逆展蛇頭揩癢之手觸撥諸方海湧峰前干戈卸却金輪峰頂妖怪潛藏視妙喜甘露門兩強不下通楊岐正法脈五世其昌碧桃帶雨春風濕吹作優曇遍界香高峰和尚黃金眼睛生鐵面三尺竹篦如掣電坐斷高峯立死關為人都道無方便有方便千聞不如一見中峰和尚這老漢無榜樣主張大幻法門滅却現成公案祖意教意絲毫不許搏量山居水居影響那容近傍以絶言之言而演説喧轟白晝之雷霆住無位之位而獨尊奔走諸方之龍象際遇聖天子稱為普應國師引得大地人隨處燒香供養斷崖和尚最初一機撞破縵天網末後一著踏翻載月船大地山河雪消去西天目頂浪滔天天台智者大師辨無礙請堯眉舜目禹背湯肩談性具於百界千如水是波波是水顯相常於一心三觀拳為掌掌為拳示聖賢同體之身不妨描貌肆佛祖無礙之辨亦可宣傳若論其親見一會靈山儼然未散吾無得而稱焉師子林天如和尚語録小師善遇編詩懶雲窩異哉雲兮變化不可測而浩蕩不可羈其靜似懶其動非懶動靜若有神所司我觀臥雲於三千九百丈之天目兮東西二浙一白如海莫得其端倪又觀行雲於四萬八千丈之天台兮捲海而起勢若萬馬爭奔馳或聚或散山顛水湄遊仙翔鸞千怪萬奇方其舒而行也天地為窩量猶隘及其卷而藏也離婁莫覩其毫絲西瑛公子作雲窩懶雲二字文其楣眼空湖海臥丘壑習懶擬與雲相期我訪懶雲主歷觀懶雲詩不知西瑛為懶雲耶懶雲為西瑛耶但覺秋陽射窗戶四壁光陸離重為告曰瑛兮雲兮至人不泥乎迹而能與物推移風雷吼百谷蛟龍舞天池亦將乘其勢以濟其時卷舒動靜吾以無心而應之懶與非懶吾何知篳篥引西瑛懶雲窩距余禪室半里許時相過從吹篳篥以為供復於余言有所需乃賦長歌以贈西瑛為我吹篳篥發我十年夢相憶錢唐月夜鳳凰山曾聽酸齋吹鐵笛初吹一曲江風生餘響入樹秋嗚咽再吹一曲江潮驚愁雲忽低霜月黑坐中聽者六七人半是江湖未歸客歡者狂歌繞樹行悲者埀頭泪沾膝我時奪却酸齋笛斂襟共坐松根石脫略悲歡萬念消悟聲無性聞無迹西瑛篳篥且莫吹篳篥從古稱悲栗悲歡茫茫塞天地人情所感無今昔山僧尚賴雙耳頑請為西瑛吐𮌎臆聲聞相觸妄情生聞盡聲亡情自釋盡聞莫謂聞無聲機動籟鳴無間隔亡聲莫謂聲無聞去來歷歷明喧寂吹者之妙余莫知聞者之悟公莫測公歸宴坐懶雲窩心空自有真消息補之梅