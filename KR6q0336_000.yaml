front:
  text: 師子林天如和尚語録敘世尊以正法眼藏付摩訶迦葉廣令傳授是為教外別傳之宗也二十八傳至菩提達磨向少林面壁安心其道始行于東土五傳至嶺南五傳至河北又六傳至湖南慈明圓公而益盛派衍枝分同一法印亦如貝玉金珠千奇萬異一一自內府流出者也慈明直下十傳至雪岩欽公將破沙盆一擊百雜碎痛棒熱喝用無疏親又二傳至普應國師本公坐斷天目山法性波瀾雷霆一世師往矣弟子之襲其風以弘其教者何往無之求其正宗一脈的的相承隨變隨機著著善應者惟師子林天如和尚是也余嘗核所聞於四方禪徒而希慕正音亦已久矣適可庭師來自林下以所携語録見示余疾讀數則不覺終卷雖老眼昏花亦勇然精采百倍若摩尼在室六窗明耀醍醐灌頂五內清涼其足以昭回季運力障狂瀾丕振國師之化為百世光明幢者盡在是矣若其所謂如優曇花如鐵蒺藜如熱油鐺如吹毛劒又在觀是録者自具隻眼余耄矣他日南歸猶當扶䇿一造林間以慰傾渴至正九年歲在己丑四月八日翰林學士資善大夫知制誥同修國史長沙楊宗瑞拜序天如禪師語録序昔中峰和尚倡道於杭之天目山學者雲集既委世三十年能任其付授之重守其責望之言薶光鏟采久而愈章傑然而獨立者吾廬陵天如則禪師也禪師既承密印諸大方爭聘之遂隱于吳門師子林一室臥雲泊然無意於當世然四方之欲求其道者惟禪師是歸故其言不待結集而盛行於時其徒善遇稍録為七卷天台宗沙門炬師以其可以啓悟來學乃刻之以傳噫正法眼藏唯微笑者得之教外無可別傳人心何勞直指曰別曰傳曰直指者蓋使其自得之也吾觀禪師之言如鳥飛空如月印水縱橫開合淺深俱應而超然無迹之可尋學者能因言以忘言不滯乎迹而得其指歸然後知其傑然而獨立者亦豈從人而得哉余嘗以事道出吳中仰禪師之高風而未遑往見宜春嗣詎師因遊五臺山槖其書於薊丘以示余乃得序其蕳且以自慶夫法喜之遇云至正九年夏五月辛卯朔應奉翰林文字文林郎同知制誥兼國史院編修官臨川危素序天如禪師別録序天如禪師世居廬陵之永新為名族豫家湘之茶陵去師所居僅二十餘里且纍以婚媾相往來故早得聞師名又辱與師之弟行遠遊故嘗得師所為詩文讀之當是時豫方弱冠所以知者如是而止不知師之道果何如也及蕩遊淮浙間往往聞師名日盛知師之道益充業益廣其所霑被者益衆於是始以未及一見為恨近來吳下席未暖即造見師子林中當是時師已棄絶筆墨不談文字不與人事相接無由得見師之發揮傾寫乃從其徒得師疇昔應酬詩文書翰別録一編翻閲數過不忍去手蓋是編特其緒餘耳微辭奧義固不在是然師之於人率隨機開示在在呈露苟能由是而求之亦可以少窺師之為道矣況師所著楞嚴經會解與其精要語録皆已刊布讀者隨其所見而有得焉則師之為道即此而在又何精粗本末之間哉豫既早得聞師名晚乃得一見今又得是編而竊窺之故述而為之序至正九年歲在己丑十有二月朔承務郎前江浙等處儒學副提弟子李祁謹序師子林別録序少林不立文字之學謂之直指得其指者雖三藏之文亦糟粕耳況夫世之所謂文與詩乎然其學至三祖乃有信心之銘至永嘉又有證道之歌此非自悖其宗旨耶識者曰不悖也蓋有以助顯其直指之道者也降是以往宗師提唱激揚不能無語矣從而源遠流枝則曲學旁通之士相望以起其材思穎發而為文為詩者詩則詩矣文則文矣豈識者之所取哉今師子林天如和尚得法於普應國師中峰本公乃大鳴其道以正少林之宗而隨機泛應靡所不有焉其徒集語録之外以詩文為別録凡六卷余竊窺其立言寄意皆足以發明直指之道夫豈世之所謂詩與文哉今天子即位之初嘗有旨賜國師語録并其詩文刊板入藏並行于世而觀者頗有所疑焉故余因序天如禪師之別録得攄鄙見使疑者知有助顯之説云至正己丑夏翰林待制奉議大夫兼國史院編修官無學野人遠者圖拜手敘師子林天如和尚語録目録第一卷示衆普説第二卷普説升座小參第三卷法語第四卷偈頌第五卷佛事佛祖讚讚詩第六卷序説記銘第七卷跋疏榜書問第八卷書問祭文第九卷宗乘要義目録終
