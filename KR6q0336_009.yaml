body:
  text: 小師善遇編師之語録向已刊行矣此集乃刊後續編其間開示宗乘者十有六段答淨土修法之問者二十六章今並録以傳意在廣被機宜各隨所取於是離為二卷而別目之一曰宗乘要義一曰淨土或問而又總名之曰剩語集焉剩語者非舊刊未盡之謂也乃欲覽者得其旨於語言之外也宗乘要義師因衆請開示五家宗旨升座僧問禪門一派分為五宗其間還有優劣也無師云五五二十五進云臨濟宗下遍地是兒孫畢竟他有何長處師云細魚咬斷鸕腳白鷺驚飛上樹梢僧云涅槃心易曉差別智難明五宗異同請師開示師云退身三步僧作禮師乃云覿面相呈一著子語默難依聲色不到非離非在無缺無餘雖曰頭頭上明物物上顯爭奈取捨不得背觸俱非如大火聚烈𦦨亘天不許正眼著著即燎却面門如吹毛劒寒光逼人誰敢絲毫動著動著即喪身失命惟有沒量大人一味天真自在無思無為不識寰中有天子不治不亂不聞塞外有將軍天自清地自寧烏自飛兔自走葉落花開神歌鬼舞盡十方剎海微塵共一箇太平風月無端被黃面老漢撞出頭來剛道為物垂慈指出許多名相喚作心喚作法喚作佛喚作一切衆生一波動萬波隨將本來一段好風光盡情抖亂了也者老漢明知是錯左不得右不得無可奈何弄到拈花微笑達磨西來展轉拖泥帶水將錯就錯去也且達磨所傳單單只是以心印心之一法耳後來流布既廣支為五宗而宗各有旨究其指歸則不離乎一法所以古德云萬派千流皆渤澥七金五嶽總須彌若以正眼看來一法猶是假名五宗復何本據大槩是師家垂手處不得已放開一路曲順機宜既涉乎語言作用則未免各立門庭不別而別矣前輩尊宿多曾辨來謂臨濟宗棒喝交馳雷奔電激奪人奪境照用並行或於一喝之中自具三玄三要二主二賓妙在打破羅籠摟空窠窟被人喚作白拈賊殺人不眨眼者此也溈仰宗父慈子孝上令下從暗合機輪混融境致大約忘機得體舉緣明用如撼茶樹推木枕插鍬立舉鍬行之類是也曹洞宗就語接人隨機應物示以偏正五位功勳五位五臣五位王子五位辨明體用掃蕩情塵使其物我雙忘人法俱泯而已法眼宗聞聲悟道見色明心句裏藏鋒言中有響往往隨順器根調停化法亦猶相體裁衣對病施藥者耳雲門宗格外縱擒言前定奪稱提三句關鍵拈掇一字機鋒截斷衆流聖凡無路人咸謂其孤危聳峻難乎湊泊非上根利器不足以窺其倣佛故曰臨濟痛快溈仰謹嚴曹洞細密法眼詳明而雲門高古也或者謂五家宗派盛衰不齊蓋由師家機用死活之不等耳後人因此一語遂將五宗言句逐一揀擇謂某深某淺某異某同某死某活自以為能具擇法眼而不知其錯中之錯矣誤賺江湖求劒客刻舟痕上亂針錐豈不見牛之鼻繩馬之口索繫驢之橛搭象之鈎此皆世間調伏之具不得已隨其所宜而用之驢牛象馬倘馴良繩索橛鈎皆棄物却來棄物上分揀死活同異豈不謬哉殊不知宗師家一言一句多是看孔著楔何嘗有意於死活曰死曰活盡在學人分上學人見處用處死則俱死活則俱活不達此理者偏重活句譬如慣弄活蛇有何奇特死蛇弄得活方是作家多少人向活句下活了要死死不得反不如死句下死了却有箇活時縱是死句下活得活句下死得乃至有句無句死活自由也只在他人腳根下盤旋未是超宗種草不見道機前有路擬向即乖句下無私動成窠臼你若解向者裏和座推翻不留朕迹自家別有一路生機敢保五家宗師鼻孔被汝一串穿却且如臨濟示衆云一句中具三玄一玄中具三要又道第一句中薦得堪與佛祖為師第二句中薦得堪與人天為師第三句中薦得自救不了及乎僧問如何是第一句却道三要印開朱點窄未容擬議主賓分平生捋虎鬚底膽志白拈賊底手腳一時俱露也會得者箇便會溈山問仰山即今事且置古來事作麼生仰山叉手近前溈曰猶是即今事古來事作麼生仰退後立溈曰汝屈我我屈汝仰山便禮拜父子一唱一酬伎倆已盡會得者箇便會洞山與泰首座冬節喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處泰云過在動用中洞喚侍者掇退果卓彼此一場敗闕會得者箇便會法眼問修山主毫厘有差天地懸隔汝作麼生會修云毫厘有差天地懸隔法眼曰恁麼會又爭得修云和尚如何眼曰毫厘有差天地懸隔修便禮拜將謂有多少誵訛會得者箇便會雲門示衆云函蓋乾坤句目機銖兩而不涉萬緣汝作麼生承當衆無對自代云一鏃破三關盡道雲門氣宇如王必有逸格底聲調元來也是打鼓弄琵琶如上五家拈弄底皆略舉其一端用有萬殊體無二致恁麼見得便見一切異同之法一切死活之機到你透脫分上事同一家覔一絲毫差別了不可得具此見者名為透關眼具此眼者灼見五宗別而不別盡大地人惑汝不得也既是五家關鍵被汝逐一透了更須會取老僧拈弄底始得遂以拂子柄打箇圓相於中畫一畫隨時道箇露字就喝一喝却云者箇是五家同時機用不先不後輥作一團就中依舊有同有異有深有淺有死有活有痛快有謹嚴有細密有詳明有高古你作麼生分揀分揀不出擇法眼還在甚處當知具擇法眼不如具透關眼具透關眼不如具超宗眼能具超宗眼目方見從上來不別而別別而不別如許多曲曲直直總是劒為不平離寶匣豈得已哉諸禪德從前別與不別會與不會底普請拈過一邊即今有箇覿面相呈一著子要汝諸人直下了取古者道本無迷悟人只要今日了不了目前萬般差別你若目前了得方信萬般差別即是覿面相呈一著子覿面相呈一著子即是空劫以前事空劫以前事即是沒量大人沒量大人即是你你到者箇田地方是千了百當底時節方自見釋迦與達磨無地可容身更說甚麼雲門臨濟擊拂子云吽吽直饒你甚麼千了百當爭奈金剛王未歸寶匣在擲拂子下座釋迦如來降誕之日緇白禪友集會請普說師拈主丈示衆云頂門上有一竅露堂堂無所覆藏腳根下有一機活鱍鱍無所滯礙遂卓一下云十方諸佛皆從這裏降生又卓一下云一大藏教盡從這裏演出橫拈倒用總自由放去收來無不可大衆諸佛世出了也諸佛既出世主丈子合入涅槃主丈子既世出諸佛却當滅度還委悉麼只如教中道身口意清淨名為佛出世芭蕉和尚云你有主丈子我與你主丈子山僧云美食不中飽人餐身口意不淨名為佛滅度芭蕉云你無主丈子我奪你主丈子山僧云待他瞌睡送箇枕頭教中恁麼道芭蕉恁麼道山僧又恁麼道還諦當也無如其未委且請主丈子靠向一壁聽山僧平實商量諸禪德佛出世佛滅度身口意清淨則且置其不清淨者何謂耶記得祖師道一切善惡都莫思量自然得入清淨心體雜華經云一切衆生具有如來智慧德相但以妄想執著而不證得即此善惡思量妄想執著名為不清淨也妄想者何即汝諸人日用之中內無主宰恣縱虗妄浮心胡思亂想是也或想五欲因緣或想自他受用或思善或思惡或又隨聲逐色左攀右緣以其情緒多端亂起亂滅如塵如沙如烟如霧把你身口意根重重汙染求一須臾清淨不可得也所以云心想如𤠔猴無有暫停時一切業障海皆從妄想生因其妄想無暫停是故身口意不淨因其身口意不淨是故妄造諸惡業因其妄造諸惡業是故流轉諸惡趣因其流轉諸惡趣是故生死如輪回泝流窮源悉由一念妄想而起於是吾宗門下貴向根源起處一截截斷自然海宴河清如昔者黃梅會中明上座為追衣鉢至大庾嶺頭偶於提不起處狂心折伏老盧遂語之曰不思善不思惡政恁麼時如何是明上座本來面目明於言下豁焉開悟便見十方清淨無佛無衆生亦無身口意更討甚麼涅槃生死始自信出世不出世總是假名字本無佛涅槃亦無涅槃佛後來學者既不能似此披襟領荷宗師家乃別轉一機以棒喝用事學者又不能痛快承當於是復轉一機示之以無義味話喻若渾侖鐵餕餡要領須一咬百雜碎又如橫握金剛王觸目不容存一法學者於此不得其妙或執藥成病或強生枝節或久久沒奈何撇向間田地上不復拈起於是又轉一機方與說箇生死無常喚作警策所謂無常殺鬼念念不停無常老病不與人期無常若也黃昏至終不留君到一更當信黃泉無老少當知定數不能逃當思日月似攛梭當念死生在呼吸如遭水火所逼如被冤賊所追如久困於獄囚如墮千尺井底念念求救念念求出又謂當勤精進如救頭然譬如頭上被火燒然則其速救之心不待勸而自發亦不暇思量擬議乃至饑不暇食渴不暇飲雖有大賓至門不暇迎接縱遇君主顧問不暇應酬直饒刀鋸在前鼎鑊在後魔鬼在傍悉不暇顧頃刻不容其少停呼吸不容其自安矣取喻至此豈非痛切之警策者乎然此等警策已是下梢一著大似頑牛鈍馬助之鞭策而已鞭策而又不行宗師伎倆盡矣今夫有志之士誓欲直截根源親見本來面目與諸佛把臂並行也須是你自家做箇轉變始得早刻諸禪侶共集師子林請為普說開示方便當知方便盡在汝邊老僧開示處別無方便縱有方便也是我底在汝分上總用不著莫道我說底用不著縱使你將芭蕉主丈子橫挑一大藏教及十方諸佛一肩擔荷繞須彌山走百千匝歸來依舊水連天碧豈不見黃蘗示衆云這些關捩子甚是容易自是你不肯去下死志做工夫只管道難了又難好教你知那得樹上自生底木杓你也須自去做箇轉變始得又云塵勞永脫事非常緊把繩頭做一場不是一番寒徹骨爭得梅花撲鼻香黃蘗此語可謂十分切當而今看來也是過後死語不足以活人山僧別用一機為他翻欵諸人試聽取良久云要得梅花香撲鼻還他徹骨一番寒喝一喝下座中峰和尚忌日泉南菩薩戒弟子蔡普明設齊倡率四衆請為普說師云祖意教意宗通說通接竹點月持索捕風何似山形主丈子獰似虎活如龍三十年前曾在天目山裏吸乾大海水撞倒須彌峰然後打箇𨁝跳藏在無陰陽地中天上天下覔無蹤吽吽誰道覔無蹤即今覿面相逢驀呈主丈云莫便是這箇麼依稀相似倣佛不同衆中若有傍不甘底不妨奪取拗作兩橛免向人前賣脫空若無其人放過一著留與夜行迷路者橫挑日月作燈籠卓主丈召衆云今日八月十四是普應國師中峰和尚涅槃之辰衆中多有是他弟子曾得他開發來底惟其後一輩人未見未聞未得知其來歷底試聽略舉這老和尚錢塘人氏年二十四登天目山依高峰和尚出家究明生死大事大事既明宿慧頓發遂將所得法轉化一切人是為臨濟派下第十八代傳法宗師也觀其二三十年作師子吼橫說竪說言滿天下者本無他意只為諸人自己腳根下有箇生死大事不曾明了不惜口業勸汝了却如今涅槃已來又將三十年矣而我師子林年年此日為設高座張其遺像會諸人瞻禮一番者亦無他意蓋欲諸人舊曾見他底再見如故重發道心今之新見新聞底亦使同發道心了却生死事汝若不會此意不發道心是你蹉過善知識是你不知生死事大也道你不知已是屈你生死事那箇不知有生決定有死死後決定隨業受報何況眼前常見他人死了燒了古教云我見他人死我心熱如火不是熱他人看看又到我似此等說話那箇不得知知則固知只是不肯修行道你不肯修行也是屈你現前諸大德多是久歷江湖飽參知識下手做工夫來底只是未到千了百當田地過在甚麼處過在不勇猛不精進不堅固不久長暫時發肯心未幾又退了所以道佛法無多子久長難得人學道如初作佛有餘始終不變真大丈夫如今能有幾人始終不變往往十箇五雙都是退道心底考其退道心底因緣蓋亦各有所纍而然也所纍者何有三種纍第一無問僧俗男女各各為身口所纍其次有眷屬者為眷屬所纍有家火者為家火所纍這三種纍纍殺天下人盡天下人遭這三種纍忙了一世閙了一世苦了一世乾弄了一世空過了一世何況又因這三種纍起了無量貪嗔癡造了無量大小惡業由此業報墮落三塗八難苦海之中生死輪回受了無量苦惱不得解脫雖遭無量苦惱只是始終不醒其不醒者因其不悟故也不悟者何不悟其身體眷屬家火皆不是你底如今向道身體不是你底你尚未信山僧索性為你從頭說破你最初來母腹中投胎之時單單只是一箇識神何曾有身體來此箇身體乃是父母赤白和合結成底一塊頑肉本無知覺不知痛不知癢不知冷不知熱不知饑不知飽不知苦不知樂因你一箇識神著在這一塊頑肉之中從此知痛癢知冷熱知饑飽知苦樂及乎出胎之後索性認著喚作我身向道身非我有決不肯信由是佛祖憐之又苦口向你道此非汝身此是精血結成底臭皮袋不屬你管不由你差排以至生老病死皆不由你處分何以知其然耶且如你最初投胎之後住母胎中七日一變次第生長曰五臟六腑百骸九竅四肢六根筋骨皮肉漸漸成形乃至出胎皆是業風所吹業力所使你是不知不覺何曾由你差排既生之後長養至三四十歲他便髮白齒搖面黃肌瘦漸漸變來漸漸老來老相現前從而病到病既到死便來如此等變壞一一不由你你本不願如此爭奈管他不下論你從生至死向這臭皮袋上用了多少恩愛情義種種保養他種種護惜他種種醫治安排他他却忘恩負義如此得人憎何況更有得人憎處只如盛夏炎蒸之月有一壯健好漢忽於黃昏之際得箇急證死了死到二更半夜時分便覺臭穢逼人近傍不得急急用棺材盛却蓋却等不到鐘鳴天曉急急扛出燒了縱是至親至愛底眷屬也不容停留矣以此觀之昨日晚間猶是一箇健漢今日早起便做一撮骨灰知他一箇識神又向何處去了如此急變並不由你既是你身體合當由你管既不由你管如何妄認他是你身徒爾遭他所纍退却道心你之眷屬亦然彼此拖箇臭皮袋彼此不自由彼此管不下無常到來彼此替代不得平日眼前彼此被一種恩情纏繞喚作眷屬眼光一閉之後彼此不相識了如何妄認他為眷屬遭他所纍退却道心你之家火亦然眼光腳健之時計較經營慳吝守護將謂百千萬年得他受用誰知一氣不來一毫也將不去如何妄認是你家火遭他所纍退却道心討得許多生受其誰使之然耶今日諸人既聞此話便合回光照破痛自醒悟於此三種纍上莫認著莫戀著莫貪著安其定分任運過時却須撥轉念頭向生死事上奮發勇猛精進討箇分曉近時衆中愚昧者多往往以狹劣心生斷滅見將謂離此三種之外則空無所依所以目前𢬵捨不下豈不思悉達太子生在王宮身具三十二相以尊貴種族為眷屬以富有天下為家火較之諸人多少來去而悉達太子都無戀著一旦棄恩割愛斷髮毀形遁入雪山深處勞其筋骨餓其體膚苦行六年以求佛道道成之後果報隨之遂於華嚴會中百寶莊嚴座上現起尊特自他受用無盡功德藏身者是其報身也四十一位位位各有無量微塵數法身大士圍繞參隨者是其眷屬也重重無盡互互無礙無邊華藏海世界者是其報土也以果推因因其早有醒悟發大勇猛棄却三種業纍勒苦修行故能感此三種殊勝果報使其在王宮之時貪戀目前𢬵捨不下安得有如是殊勝莊嚴之果報哉此事人人有分人人可為𢬵得便做得不少一絲毫怕落空者當於此而深省焉則上座因先師忌辰衆請普說辭不獲已借先師座為衆舉揚自愧匪才既不能拈頌古今機緣提持向上綱要却乃嘮嘮忉忉說出許多淺陋庸腐之語玷辱先師取笑作者雖然若是作者應不見笑一曲村田樂悲歡各自聞復舉楊岐會和尚為慈明追忌因緣乃云大小楊岐與兩堂首座互相揑怪不達時宜大似飯飽弄匙筯師子林則不然野菜黃虀家常茶飯一則為先師應箇時節一則使諸人知箇時節且道知箇甚麼時節無口蝦䗫飛上天波旬起舞亦堪憐神光獨耀誰曾見夜近中秋月政圓衆建法華勝會滿散請普說師召衆云諸法實相義已為汝等說這箇是日月燈明如來瞞汝諸人處諸人還知麼且據目前所見天地日月草木叢林昆蟲鳥獸萬象森羅此等是諸法那箇是實相實相者離言說相離思惟相離名字相離能所相既離諸相其義作麼生說雖云古佛隨機舌頭無骨點檢將來貪前失後帶纍釋家老子盡力為他翻欵出來道箇諸法寂滅相不可以言宣既不可以言宣七軸雄文道箇甚麼前佛後佛互相抑揚互有短長分踈不過我這裏政要摟翻如來藏勘破如來禪且看拂子有何伎倆呈拂云即此是實相擊拂云即此是言宣甚麼會得許你將一莖草作丈六金身將丈六金身作一莖草逆順自由縱橫自在既有如是見解當知草芥人畜天地山河法法皆名實相谷響溪聲雞啼犬吠頭頭總是言宣此所謂相而無相無相而相言而無言無言而言之第一義諦也諸佛於此成道轉法輪諸天於此散花興供養釋迦分身於此來集多寶佛塔於此出興權實於此開顯本跡於此發明群兒於此登寶車窮子於此獲寶藏高原於此得水醉客於此得珠無量損生菩薩諸大聲聞弟子小善人天畜生龍女邪見妙莊嚴王惡逆提婆達多下及天龍八部人與非人但聞法華一偈一句一念隨喜者各各於此授記去也大衆如上所舉如來禪瞞汝不得了也只如梁武帝問達磨祖師如何是聖諦第一義祖云廓然無聖帝曰對朕者誰祖云不識且道此意如何能大師曰心迷法華轉心悟轉法華此意又如何要不被祖師禪瞞也須勘破一回始得忙哥剌宣差相公請普說師云道無言說法無形狀有說是謗無言是誑敢問諸禪流作麼生定當舉拂子示衆云曲順來機事無一向今辰乃是菩薩戒弟子忙哥剌室利宣差相公為亡父翰林承旨學士朵兒赤相公諱日營齊延集諸山師德特命山僧舉揚法要冀其父親於冥冥之中因一言半句見徹生死根源得箇解脫自在安身立命處此其請普說之來意也以世法論之生事以禮死葬以禮以時思之以時祭之孝子奉親之常情如是而已今某官必欲乃父相公洞悟自心優入聖賢之域則又超出常情者遠矣愚者或議曰人既死矣能聽法者誰歟蓋不知死則死矣有不死者存其承旨相公之昭昭靈靈能鑒能覺者何嘗有幽明之隔死生之間哉以至理推之生本不生死亦非死生死去來本無自性亦無實法特由循業發現而有虗妄之相耳所以教中道因緣和合虗妄有生因緣別離虗妄名滅原其受生之初因父母己三緣會遇謂之交遘發生吸引同業從而地水火風四大和合於是乎有身當此之際其昭昭靈靈能鑒能覺者存乎其間矣既有身相乃有六根就其身而推之外則髮毛爪齒內則肝膽腸胃內外中間三十六物本無見聞亦無知覺因我六根與彼六塵相為對待從而眼色和合虗妄有見耳聲和合虗妄有聞鼻香和合虗妄有嗅舌味和合虗妄有嘗身觸和合虗妄有覺意法和合虗妄有知此見聞嘗嗅覺知謂之六識而本無自性乃因昭昭靈靈鑒覺之物發現於根塵之中而妄有之也從此便有種種分別種種憶想種種染著種種攀緣內則隨情變遷外則逐境流轉情識交感展轉發生起種種虗妄之惑造種種虗妄之業其三界二十五有之中苦樂升沉生死輪回之報由是而無窮矣其四大幻身則念念遷謝少而老老而病病而死死亦四大分散而已其昭昭靈靈者何嘗有死哉古佛云身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住是故有志之士才聞此話便能於六根六塵六識之中照破虗妄和合生死了知情境惑業如幻如夢如影如響亦如變化既能如此照破則不復隨他顛倒而有返妄歸真之分矣雖得如此又未免認著箇昭昭靈靈喚作自己保之守之如護命根絲毫𢬵捨不得乃不知三界二十五有之窠窟生死輪回之根本實存乎此故祖師呵之云學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人須是猛𢬵性命撒手懸崖直下抖翻窠窟剿絶根本待其一念不生前後際斷方許認得本地風光見得本來面目既見自己本來面目即見諸佛諸祖本來面目既見佛祖本來面目即見一切衆生本來面目與自己非一非二無別無異共亦不雜離亦不分譬如千燈光照一室其光遍滿無壞無雜既到者箇境界猶疑聖見未忘聖見未忘未為究竟更須打箇𨁝跳抹過上頭關踏著佛祖行不到處始是究竟不疑之地若到究竟不疑之地生也生你不得死也死你不得苦也苦你不得樂也樂你不得順也順你不得逆也逆你不得也無佛也無祖也無一切衆生無凡無聖無淨無穢無真無俗一切皆無是謂萬法一如無動無變之大自在也體雖不變用乃隨緣譬如虗空體非群相而不拒彼諸相發揮由是不變隨緣故能為佛為祖為一切衆生情無情等乃至為生死為涅槃為凡為聖為淨為穢雖熾然有為而全體寂滅是謂緣起無生無著無礙之大自在也既到者裏方信祖師道釋迦彌勒猶是他奴又豈過分事哉喝一喝且莫錯會好山僧年老成魔隨人顛倒引出繞地葛藤𮞏相纏縛罪犯彌天若遇著箇無面目漢便好掀倒禪床痛捶一頓亦使諸人知道強中更有強中手佛法何曾滯一邊衆中還有這箇人麼如無則山僧向灸瘢上重添艾炷一與承旨相公據欵結案許其脫死超生得大受用一與現前大衆撩頭撮尾截斷葛藤根解却彼此纏縛驀拈主丈云生如寄死如歸未契吾宗向上機離四句絶百非猶防語默涉離微大力量人元不動從教兔走與烏飛生來死去渾間事大似著衣還脫衣卓主丈下座高麗猊長老請開示戒法普說師云央掘魔羅千指鬘聲聞位裏證涅槃提婆達多五逆罪法華會中得授記波離結犯淫殺雖曰有條攀條問著維摩大士疑情日出霜消這一隊嘍囉漢美則美矣總不如千佛數內廣額兒放下屠刀喝一喝云未在未在豈不見瞎驢擔板滅却臨濟正法眼開遮持犯沒相干是佛是魔俱一剗靈利漢這裏會去無縛無脫貪嗔癡無路入來戒定慧無處安著方許你事事無礙得大自在手把猪頭口誦淨戒你若纖毫未盡如隔鐵圍擬心動念戒體即虧戒器不完妄希勝妙不墮闡提即落魔道貪觀天上月失却掌中橈波羅夷罪不相饒諸禪德戒為六度之先鋒萬行之基址諸佛成道之本菩薩現行之法佛說無量法門百千妙義要其指歸無非戒定慧故曰攝心為戒因戒生定因定發慧是則名為三無漏學三學之中戒是當頭第一件事然我菩薩大戒却非今佛創說乃從上諸佛之本戒佛佛傳誦而已蓋諸佛昔在菩薩位中因行此戒位滿成佛及成佛時最初即誦此戒令諸菩薩知所修學非若聲聞等戒因事漸制者也是故盧舍那世尊方坐蓮華臺即誦菩薩戒傳與千百億釋迦千百億釋迦各坐菩提樹半月半月自誦此戒令諸菩薩各各傳誦至于一切有情皆許稟受如經云國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者上而諸大菩薩下而穢惡卑賤之流聖凡大小一網俱收可謂廣大之法門也或謂菩薩十重戒中首陳殺盜淫妄夫殺盜淫妄乃大小諸乘通稟之戒也如在家下愚所稟八關齊戒近事佛法所稟優婆塞戒出家初學所稟沙彌十戒聲聞羅漢所稟萹聚等戒一一皆以殺盜淫妄為根本所稟之戒既同則何自而分小大耶殊不知戒無大小小大在機蓋由其發心立願之不同遂有大小諸乘之異也且如菩薩發心稟戒乃以三聚為宗佛果為趣三聚者第一攝律儀戒發廣大心誓斷一切惡第二攝善法戒發廣大心誓修一切善第三饒益有情戒發廣大心誓度一切衆生故其所稟十重等戒非惟斷惡且務修善凡所斷惡修善皆以度生為先務也其所發四弘誓願雖自己煩惱未斷法門未學佛道未成亦必以度生為第一誓願也故經云自未得度先度人者菩薩發心發是心者乃於一切時一切處慈悲一切衆生憐愍一切衆生愛念一切衆生敬重一切衆生救護一切衆生勸發一切衆生誘導一切衆生教化一切衆生攝受一切衆生乃至成就度脫一切衆生直欲令其登無上覺而後已也其所發心非惟廣大且復以久遠自誓誓曰從今身至佛身盡未來際世世常行菩薩道也以其能發如此遠大之心是謂菩薩心也依此心而發行是名菩薩行也用此心而持戒是為最上大乘菩薩戒也況謂恆沙戒品圓三聚而統收萬行因門惟一念而具足今夫以三聚為宗者有理有事事防三業使惡止而善行理御一心令惑亡而智立惡止善行則業障可破惑亡智立則惑障永離業障破則福圓惑障離則慧滿此乃離二障成二嚴而得為究竟之宗趣也細而論之由宗三聚增長三學成就三賢十聖等位究竟令得三德三身無礙佛果也三德三身者一律儀離過以顯斷德法身二攝修萬善以成智德報身三饒益有情以成恩德化身也教中有云初修大乘行菩薩戒者雖未成佛而先獲五種功德八種殊勝其所利益不可思議故雖淫男淫女奴婢畜生等卑汙薄賤之器或發大心求受菩薩戒者此心足以契諸佛之本懷足以合菩薩之本願是以一念之間即感十方諸佛之所加被一切菩薩之所攝持八部天龍之所守護諸類鬼神之所敬仰以其一發大心稍沾戒益究竟必得成佛果故其或宿業不亡或因犯戒有過設墮地獄受罪輕微亦由上感加被之恩下承敬仰之力重罪既可減輕而惡道亦可速出也以喻言之如田野之家寒賤之子忽爾因緣際遇稍沾國王寵顧之恩一旦便有氣勢而彼久歷仕途官長吏卒皆當刮目相待不敢慢而侮之偶有過犯拘繫在官則其重罪減輕而禁囚速出者勢之必然也以是而知發心稟戒多種不同而其感果亦乃逈異此豈聲聞人天等戒可同年而語哉故凡出家在家曰男曰女無問貴賤賢愚皆當聽受菩薩大戒縱使在纏在難障重迷深不能如法受持者亦可許其隨量稟承或隨喜聽誦結般若緣下菩提種其菩提大心種子納在八識田中從生至生不壞不失驀忽觸境遇緣終有發現時也所以道坐受立破猶勝不受戒者寧可受而有犯不可不受而無犯有犯名菩薩有戒可犯故無犯名外道無戒可犯故薝葡花雖萎猶勝一切花破戒諸比丘猶勝於外道蓋以外道邪見不受佛戒永沉惡道無有出期破戒比丘大心未失縱生惡趣皆為惡趣中王一念回光即得解脫是故古德云破戒受罪終登解脫之場不受不破永墮泥犁之苦瓔珞經云若一切衆生不受菩薩戒者不名有情識者畜生無異不名為人常離三寶海名為邪見名為外道智論云譬如無足欲行無翅欲飛無船欲渡是不可得若無淨戒欲求妙果亦復如是若人棄捨此戒雖山居苦行食果服藥與禽獸無異遺教經云汝等比丘於我滅後當尊重珍敬波羅提木叉如暗遇明如貧得寶當知此則是汝等大師若我住世無異此也吾佛世尊於此戒法痛切勸喻者既如此殷勤付囑者又如此可謂切要矣嗟乎世尊滅度已來二千三百餘年矣如今政是五濁惡世末法之秋衆生根器輕浮無正知見況值賢聖隱伏邪法增熾賢聖既已隱伏則菩薩大戒誰是諸佛慧命法門正脉却乃無人演說正法既無人說邪師得以縱橫說邪法行邪道示邪見傳邪解惑亂愚蒙相魔魅縱有聰利根機邪正不能自辨亦不免隨邪入邪毀謗正法雖曰邪師過謬非衆生咎爭奈一盲引衆盲相牽入火坑此為大可哀痛者也近代天目山高峰中峰和尚父子相承乃是達磨正宗臨濟正派單提向上直指人心然每遇學者登門必先使其立誓受戒此乃知時別宜隨機應變發明佛佛相傳之意力救今時墮邪之病而大開甘露門者也則上座忝紹遺風不敢廢墜今此現前一衆皆具正信正解宿於佛法有大因緣故能來我師子林中如渴思飲如饑思食特發菩提大心聽受菩薩大戒此非小可事也當生希有心當作難遭想當知成佛作祖決定有分既知有分不可遷延當念念護持謹潔無犯時時策勵勇猛精修假使熱鐵輪於我頂上旋終不以此苦退失菩提心亦如度海須到岸登山須到頂也其有久參夙學單提向上一著者既知三聚為所宗亦應知妙在用處政當斷惡修善饒益衆生之時莫作斷修饒益之想亦莫作善惡衆生之想要於善惡衆生境上無著無礙於斷修饒益事上無取無捨不著有為不住無為雖知諸法本空而不作空想雖泛應群機而栖心無寄是名無止無作無持無犯理事一如之自性戒也誠能如此奉戒則可與單提向上一著照用雙行而互相策發去也亦猶良馬之遇康莊復加鞭策勇往無前忽爾踏著故家田地方自信不歷僧祇獲法身一超直入如來地先聖之言不汝欺也到與麼時更須知有末後句在且如何是末後句夜叉打落珊瑚枝海底泥牛銜月走杭州淨慈禪寺結夏節秉拂問答畢乃云有法可說是名謗法無法可說亦名謗法不見一法是大過患若見一法亦是過患恁麼也不得不恁麼也不得恁麼不恁麼總不得三世諸佛歷代祖師到者裏結舌有分只如道法非見聞覺知不離見聞覺知竪拂云還見麼擊拂云還聞麼既聞了既見了畢竟是有法耶是無法耶喝一喝這裏是甚麼境界說有說無衲僧家向銀山鐵壁裏突出金剛眼睛徹見佛祖肝腸無絲毫滲漏和他命根一拶拶斷然後全主全賓全殺全活趂動南山白額吞却無毛大蟲不妨鼻孔裏聽聲眉毛上吐氣恁麼也得不恁麼也得恁麼不恁麼總得是謂我為法王於法自在說甚安居禁足尅期取證大好無繩自縛去也者箇猶是作用邊事若曰真正舉揚且待上方主丈子出來露箇消息卓主丈云驚群須是英靈漢敵勝還他師子兒喜見禪庵浴佛日滿散藏經升座周遍十方是箇大光明藏衆生成道多時森羅萬象常轉微妙法輪諸佛義手有分所以道始從鹿野苑終至跋提河平地無風輥白波於是二中間未嘗談一字有一字也無著處恁麼舉揚猶是壓良為賤有首無尾底說話者裏却不然要向權實雙行體用兼濟處請主丈子出來別道一句以主丈劃一劃云釋迦如來四十九年三百餘會以一圓音隨機演唱或漸或頓或顯或密曰半曰滿曰偏曰圓略而集之五千餘卷廣而計之恆河沙數雖云數等恆沙却在一微塵裏今乃有一智慧之人破此微塵出大經卷有耳皆聞有眼皆見所見者何見三世諸佛如是出世如是成道如是說法如是度人又見一切衆生讀者誦者受者持者如饑得食如裸得衣如渡得船如病得藥當此時節各發菩提心乘此因緣同達佛性義正所謂欲達佛性義當觀時節因緣時節既至其理自彰是則固是且道即今收經散席是何時節因緣優鉢花開劫外春釋迦老子再出世也以何為驗九天香雨飛甘露李心齊學士建梵剎設僧齊印施金剛經圓滿請升座師云一毫端現寶王剎微塵裏轉大法輪黃面漢眼空四海氣蓋諸方放兩拋三瞞憨賣峭祖師巴鼻則不然一毫端現金剛圈盡大地人透不過微塵裏轉鐵餕餡盡大地人吞不下據實論來也是敲空作響爭知道十方剎土無盡虗空悉在一毫端現三世諸佛十二類生盡在微塵裏轉敢問微塵一毫是箇甚麼低聲低聲心齊居士總不論這箇却向土木場中現寶王剎荊棘林裏轉大法輪又向印板文上脫出一字一句皆是金剛圈香積厨內運來一粒一團無非鐵餕餡汝等諸人透也透了吞也吞了且心齊事無虗設用有恆心畢竟如何贊歎拍禪床云過去心不可得現在心不可得未來心不可得示衆大道只在目前要且目前難覩欲識大道真體不離色聲言語古人恁麼舉揚雖則盡情分付爭奈承言者喪滯句者迷謂言非道重重鐵壁銀山謂道是言忽忽電光石火進步既乖退步尤錯不進不退自沉自埋所以向上全提當機直指不存一法不受一塵無萬行可修無三界可出無衆生可度無諸佛可成即之如大火輪不容湊泊嬰之如吹毛劒孰敢承當大徹大悟對境還迷有見有聞觸塗成滯聲色之前領略已落二機語言之後摶量早遲八刻與麼則四十九年演說百千三昧流通天雨四花地搖六動檢點將來總是色聲言語畢竟以何為道若也坐斷要津別通消息點出人天眼目洞照佛祖心肝如香象之渡河截流而過類金毛之出窟反擲自由頭頭上明是體即是用物物上顯見色便見心與麼則山光水影悉露真機馬呌驢鳴咸宣至理舉手所指縱目所觀聲色語言無往而非道也然後轉山河為自己與衆生覿體混融轉自己歸山河與諸佛隨緣應現大衆即今諸佛衆生山河自己同時變作拂子去也急著眼看遂擲下拂子示衆山河及大地全露法王身草木與叢林盡作師子吼舉足下足入門出門這邊那邊築著磕著好箇現成境界若到衲僧面前一點也用不著所以道語若迅雷不容掩耳機如掣電豈許停思八臂那叱搆不來千眼大悲覷不破捏得虗空粉碎依然逼塞乾坤萬里不掛片雲青天政好喫棒千差坐斷諸佛乞命無由一線放開衆生成佛有分這裏領略得去方許慶快平生其或未然為汝別下注腳咄示衆法無定相隨念變遷佛無定形隨機應化有時三世諸佛說法萬象森羅側耳聞有時萬象森羅說法三世諸佛立地聽有時都不恁麼單單一箇無位真人占斷十方世界要教萬象森羅無容身之地三世諸佛無開口之分這箇境界即今現在目前山僧路見不平為他剗却拈主丈云看看無位真人墮地來也擲主丈下座浴佛日示衆梅雨弄晴梅風吹濕悉達太子生也示拂云現在拂子頭上目顧四方周行七步惱亂天下人盡從今日起吽吽莫道世無雲門無人敢欺你惡水驀頭澆杓柄在老僧手裏結夏示衆護生須是殺罪犯彌天殺盡始安居狼藉不少惟有生苕帚功不浪施掃斷葛藤露布任諸人坐臥縱橫十二箇時辰使教顛倒走與麼則剋期取證有何消息薰風自南來殿閣生微涼解夏示衆以主丈擊禪床云圓覺伽藍一擊百雜碎也四月十五結本無結七月十五解亦非解西天人驗蠟人冰自成多事東土人驗鐵彈子慣弄虗頭我者裏一味朴實你有主丈子與你主丈子你無主丈子奪你主丈子僧請決擇禪病師云我有箇祕方極其簡易只教你放身捨命大死一回若得大死一回一切病根自絶然後打箇𨁝跳依舊做箇活人那時却許你將此已驗之方遍醫天下禪病去也僧擬議師乃喝云貪生怕死漢者裏無你立分出去師子林菩提正宗寺記依石本録出翰林學士承旨光祿大夫知制誥兼修國史廬陵歐陽玄撰奉訓大夫兵部員外郎臨川危素書宣文閣授經郎儒林郎兼經筵譯文官金華王餘慶篆姑蘇城中有林曰師子有寺曰菩提正宗天如禪師惟則之門人為其師創造者也林有竹萬箇竹下多怪石有狀如狻猊者故名師子林且師得法普應國師中峰本公中峰倡道天目山之師子岩又以識其授受之原也寺名菩提正宗者帝師法旨與以是額也其地本前代貴家別業至正二年壬午師之門人相率出資買地結屋以居其師而擇勝于斯焉因地之隆阜者命之曰山因山有石而崛起者命之曰峰曰含暉曰吐月曰立玉曰昂霄者皆峰也其中最高狀如狻猊是所謂師子峰其膺有文以識其名也立玉峰之前有舊屋遺墌容石磴可坐六七人即其地作栖鳳亭昂霄峰之前因地窪下濬為㵎作石梁跨之曰小飛虹他石或跂或蹲狀狻猊者不一林之名亦以其多也寺左右前後竹與石居地太半故作屋不多然而崇佛之祠止僧之舍延賓之館香積之厨出納之所悉如藂林規制外門扁曰菩提蘭若安禪之室曰臥雲傳法之堂曰立雪庭舊有柏者曰騰蛟今曰指柏之軒有梅者曰臥龍今曰問梅之閣竹間結茅曰禪窩即方丈也上肖七佛下施禪坐間列八鏡光相互攝期以普利見聞者也大槩林之占勝其位置雖出於天成其經營實由乎智巧究其所以然亦師之願力所成就也師每說法參問多至數百隨其悟解開導誘掖有所質疑剖析至當莫不虗往實歸至於安衆必擇法器不泛然以容檀施與資視師意嚮亦不強委師取共具財足即止諸行省平章若河南之圖魯江浙之道童江西之買住行宣政院使若嶽叔木肅政使者若普達實立稽顙問道執弟子禮彌恭旁觀異之師法施平等官資崇庳若罔知也寺成之十三年宜春比丘嗣談以臨川比丘克立所撰事狀來京師謁余為記余聞師之名起敬日久既托其事狀述寺之勝槩而記之其師子名義則必有以復於其師與友也古有師子音佛有師子武佛言佛之威德能制諸魔也又言師子乳一滴可迸驢乳百斛言佛法之真實能破諸妄也又若文殊之學得於智普賢之學得於行智之勇猛精進莫師子若故文殊之好樂在師子行之謹審靜重莫象若故普賢之好樂在象後之肖二菩薩者以之莫詰所從也今天目之所謂岩姑蘇之所謂林其取義必居一于是矣豈獨以山石肖貌言之乎雖然物有禁格而後有伏降有比擬而後有真贋孰若物我兩忘形勢俱泯以師子還師子以石還石以林還林然後佛自還佛法自還法菩薩自還菩薩哉論至於是師必有以警䇿其徒矣余聞師所說法不設崖險不輕揄揚不自陳衒悟解緣由以啓學人捷出蹊徑其為學平實縝密鞭辟近裏一時諸方之乍見乍聞而張磔旁午未證未得而棒喝生風者聞師所言皆噤故自中峰以來臨濟一宗化機局段為之一變焉師舊多論建有楞嚴會解若干卷有語録別録剩語若干卷行于世近乃一掃空言不尚文字於談之請立之狀余之記能無綺于茲乎師俗姓談氏吉之永新人江浙諸名山屢請主席堅卻不受遁跡松江之九峰間十有二年道價日振帝師與以佛心普濟文慧大辨禪師之號兼與金襴僧伽梨衣至正十四年甲午五月癸未廬陵歐陽玄記
