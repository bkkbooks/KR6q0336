body:
  text: 小師善遇編慧慶禪寺請普說師云格外一機一大藏經收不得向上一著千七百人說不到作家門下擒縱自如佛來祖來結舌有分眾中莫有超佛越祖底麼出來露箇消息看問答畢乃云適來禪客問正法眼藏涅槃妙心山僧向他道咲殺狸奴白牯疑殺天下衲僧知他還曾會也無諸禪德正法眼藏涅槃妙心三世諸佛不知有狸奴白牯却知有且道知有底是不知有底是知與不知且莫問有之一字向何處安著既無著處喚甚麼作正法眼藏涅槃妙心又喚甚麼作三世諸佛狸奴白牯多少英靈漢向這裏捕不見摸索不著擬議不來挨拶不入若不胡麻𤺊繳便是渾侖吞棗後來臨濟大師見僧入門便喝德山見僧入門便棒這一棒一喝將正法眼藏涅槃妙心當場指出覿面提撕只圖易見易曉爭奈棒喝之間有縱有奪有照有用有生有殺有主有賓有時主賓各立有時賓主交參有時主賓互換有時賓主兩忘只因省事成多事土上加泥又一重帶累雲門老子眼不耐見出來道雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾此等語言又將涅槃妙心正法眼藏七花八裂分明註解了也雖然註解分明爭奈依前難會若無實法會雲門罪犯彌天若不作實法會雲門搥胸呌屈只為分明極飜令所得遲殊不知佛祖一機一境一言一句本無誵訛亦無奇特又無深奧且無隱藏總是諸人日用常行底事所謂三世諸佛狸奴白牯者元來共一箇鼻孔出氣這箇鼻孔在諸人分上現成元有底眼雖不見伸手也曾摸著何甞有毫髮差殊你若自有主宰不被人瞞管取三世諸佛借你鼻孔出氣放去也由你收來也由你左之右之無不由你你若自無主宰未免一箇鼻孔反被他人穿却一動一靜總不自由故於佛祖機緣觸處皆成障礙山僧恁麼舉揚眾中還有不被障礙者麼試更從頭舉看呈拂子云雲門扇子即此便是喝一喝云臨濟之喝現在這裏卓主丈云德山之棒亦在這裏扇子棒喝一時見了聞了會了畢竟正法眼藏是何聲響涅槃妙心是何面孔江北江南問王老一狐疑了一狐疑不如劃斷葛藤別通一路去也以主丈劃一劃云諸禪德佛祖出世總不為他事單單只為汝諸人各各自己脚跟下有一段生死大事不曾了當曲垂方便令汝了却何謂生死事大生不知來處謂之生大死不知去處謂之死大如是生死不是等閑戲論譬如箇縵天網子盡大地人被他籠從古以來無有一人不被生死吞却且莫說從古只說汝有生以來回思十年二十年前親戚朋友道伴相知死却多多少少曰身曰名與草木俱腐知他大夜茫茫向何處安身立命良可惜哉且莫說他人只說你自己現前四大色身妄認為我從朝至暮眼睛轆轆地口子吧吧地通身活鱍鱍地種種資養他種種愛護他他却念念遷謝新新不住如火成灰漸漸消殞不知不覺臘月三十日撞在面前當此之時點檢平生所作所為一點也用不著徒爾塵勞袞袞業識茫茫嘍嘍囉囉波波挈挈成得箇甚麼邊事只樂得手忙脚亂與落湯螃蠏相似悔也悔不得了做也做不得了嗚呼哀哉嗚呼痛哉縱饒你官高一品富有萬鍾功蓋乾坤名喧朝野三寸氣斷一火洞然收得一撮冷灰埋向一堆黃土日暮狐狸眠塚上夜深兒女咲燈前平生英雄豪傑果安在哉所以古人道活計隨分做生死如推磨一口氣不來總是他人箇誠哉是言也又或一死之後三日五日形色變壞臭穢逼人雖有骨肉至親亦不肯正眼著平生恩愛情義又安在哉故我祖師道一息不來便同灰壤前路茫茫未知何往只恁麼死了燒了早是可憐何況更有前路茫茫隨業受報正是要緊事在何謂隨業受報汝平生所作無不是業纔有業便有報報之隨業如影隨形此身既死一箇識神或墯刀山劒樹爐炭鑊湯諸地獄中受無量苦又或撞入驢胎馬腹餓鬼道中展轉輪迴受苦無量是故先師有云茶傾三奠復三奠一箇髑髏燒不乾業識又鑽皮袋去鐵人聞也骨毛寒這箇是受報底境界那箇是生死業根業根者在汝即今一念間也汝無始以來因貪瞋癡無明煩惱妄想狂心觸境遇緣隨聲逐色使得你七顛八倒無業不造即此便是生死業根者也思量生死事銕漢也灰心由是佛祖運大慈悲興大哀憫廣立言教教你參禪學道或教你提箇話頭或教你念佛脩淨土令汝掃除妄想狂心認取主人翁識取本來面目趂此眼光脚徤做箇洒洒落落清淨解脫之士臨命終時得他受用生死無礙去來自由這箇謂之了生脫死底大丈夫也由是觀之諸佛諸祖於人有大恩德者也禪道佛法於人有大靈驗者也嗟乎近來人心懈怠祖道荒涼雖有參禪問道之士而年久歲深不獲靈驗者其故何哉略而論之有三種病第一㝡初不遇真正善知識與之開發指示所以根脚不穩密趣向不端正做處有偏枯見處有差錯謂之打頭不遇作家到底飜成骨董第二不能痛將生死事大為念既無勇猛精進之工夫又無久遠不退之志氣一暴十寒悠悠漾漾不覺打在無事甲中三二十年如釘樁搖艣如水浸石頭相似永無醒動底時節第三或於世間虗名浮利上照不破放不下或於世間妄緣惡習上坐不斷擺不脫每於境風扇動世波搖撼處不覺和身輥向業海中東飄西泊去了安得復有靈驗哉故曰參禪無秘訣只要生死切若是真正道流痛念生死者豈肯恁麼中道而廢必須打翻舊窠窟抖擻舊精神提起舊話頭奮發舊志願入頭不得處政要入頭劄脚不得時政要劄脚當信祖師道毫𨤲繫念三塗業因瞥爾情生萬劫羈鎻參須真參悟須實悟閻羅大王不怕多語又當信祖師道雜念紛飛如何下手一箇話頭如銕掃帚是也掃非也掃轉掃轉多轉多轉掃掃不得𢬵命掃忽然掃破太虗空萬別千差一路通諸禪德努力今生須了却莫教永劫受餘殃這箇是要緊話也又有出家在家諸佛子念佛脩淨土者自疑念佛與參禪不同蓋不知參禪念佛不同而同也參禪為了生死念佛亦為了生死參禪者直指人心見性成佛念佛者達惟心淨土見本性彌陀既曰本性彌陀惟心淨土豈有不同者哉經云譬如大城外有四門隨方來者非止一路蓋以入門雖異到城則同參禪念佛者亦各隨其根器所宜而已豈有異哉然而念佛之中亦有靈驗不靈驗者何以故但以口念而心不念者不靈驗也口與心聲聲相應心與佛步步不離者有靈驗也如今有一種人手掐數珠口稱佛號一箇妄想狂心東走西走這箇是口念而心不念者徒費精神於事何益莫若以心憶佛以心念佛雖然口不出聲却是真念佛也豈不見經中道十方如來憐念眾生如母憶子眾生墯在生死海中如兒子流落他鄉外國佛如慈母常憶念之雖不開口向人說其憶念而其憶念之心自然切切無間斷也子若憶念其母與母心同則母子相見有日矣故又云若眾生心憶佛念佛現前當來必定見佛現前者現世也當來者來世也果能如是憶佛念佛敢保現世必定見佛也既曰現前見佛則與參禪悟道何所異哉幻住和尚有云參禪只為明生死念佛惟圖了死生但向一邊挨得入兩條門路不多爭門路雖不多爭却不許互相兼帶參禪者單單只是參禪念佛者單單只是念佛若是話分兩頭彼此都無成就古人有箇喻子云譬如脚踏兩邊船這邊那邊都不著兩邊不著尚無妨照顧和身都陷却記取記取勉之勉之比丘惟則學無所成自救不了茲蒙慧慶方丈若愚禪師及絕照講主可庭藏主諸公請為四眾普說既不容辭勉強奉命今此現前新學般若諸佛子當信如上所說皆是棒打石人頭嚗曝論實事然所說者不過痛喻生死事大及參禪念佛兩種法門而已念佛者只是靠取阿彌陀佛四字話頭別無他說若是初心參禪者恐未有下手處未有趣向處然此亦無他說只是汝諸人各各有箇本來面目不曾認得這箇本來面目直下與諸佛同體你十二時中語默動靜行住坐臥莫不承他恩力但於此密密體認即此便是下手處即此便是趣向處也便須直下承當切忌等閑蹉過發大勇猛起大精進要在箭鋒相拄機筈相投古人云一不做二不休一拳拳倒黃鶴樓一踢踢飜鸚鵡洲有意氣時添意氣不風流處也風流果有古人如是作略則德山與臨濟與你是同參釋迦與彌陀阿曾有兩箇併將千七百則諸祖機緣與正法眼藏涅槃妙心穿作一串颺在一邊然後獨步大方普告諸人道丈夫自有通霄路不向如來行處行當此之時則上座望風展拜有分其或未然莫恠壓良為賤再下一箇註脚世事茫茫沒了期自家活計猛提撕落湯螃蠏人人見投火飛蛾箇箇知病到始憐身是苦死來惟有業相隨浮光幻影須臾過火急脩行也是遲如人上山各自努力普達實立副使脫銕睦爾副使買奴海牙同知忙哥剌宣差馮總管等率眾官士大夫來師子林設齋請普說師云參禪是向上一著要緊大事此事曰僧曰俗人人有分況是本來具足全體現成爭奈世間人往往當面蹉過不曾去理會莫道不曾理會問也不曾問著正眼看來誠可憐憫今日諸公既發此問畢竟於此事上有大因緣然此事纔擬說著便是生死岸頭境界便是痛心苦口之語望諸公洗心滌慮聽之思之何謂參禪是向上要緊大事蓋為要明心見性了生脫死生死未明謂之大事祖師道參禪只為了生死生死不了成徒勞王右軍亦曰死生亦大矣豈不痛哉只為生死事大故以參禪為向上大事也何謂生死公等彼此有身在世此身既不是諸佛如來金剛不壞之身又不是純鋼打就生銕鑄成底堅固之身乃是四大假合虗脆浮幻之身如水上泡如草頭露看看髮白齒搖皮枯面皺老病無常朝不保暮既有生必有死既有死還復生但不知這回生死落在甚麼道中此為可痛者也佛說三界如火宅六道如苦輪汝等從無量劫以至于今向三界火宅中東走西走不知求出路在六道苦輪裏東輥西輥無有暫停時若欲息苦輪出火宅須是了生死若欲了生死須是見佛性若欲見佛性須是大悟一回若欲大悟須是參禪是知無量法門參禪為第一要緊也何謂無量法門開而言之有八萬四千種總而論之則有三宗曰教宗禪宗律宗也律者戒法也有在家白衣人戒法有出家比丘等戒法有小乘戒法有大乘戒法廣至三千威儀八萬細行皆是檢束身心防非止惡故名律宗也教者廣說大小頓漸脩證法門或說布施等六波羅蜜或說廣種福田或說廣脩德本等是教宗也若論禪宗却無許多事謂之不立文字教外別傳直指人心見性成佛所以參禪者先將平生所學所記所見所聞所知所解盡情颺在一壁又將平生名聞利養之事恩愛貪欲之心盡情拈向一邊坐斷千差掃空萬慮單提正念勇往直前譬如百萬軍中單刀直入不顧危亡得失人我是非猛𢬵性命拶透佛祖牢關不歷階梯高登佛祖堂奧是謂禪宗也昔西天有一異見王甞問波羅提尊者如何是佛尊者云見性是佛王云性在甚麼處尊者云性在作用處王曰作用凡有幾處出現尊者云八處出現王曰何謂八處尊者云在胎曰身處世曰人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔徧現則廣周沙界收攝則藏在一塵悟者謂之佛性迷者謂者精魂王聞是言當下有省蓋悟者謂之佛性則見聞知覺所作所為無非妙用既得妙用即出生死迷者謂之精魂則見聞知覺所作所為無非業識既成業識即墯生死何謂之迷迷者不見佛性既不見佛性則雖有妙用而不得其用非惟不得其用亦且不知其妙只如眼耳鼻口謂之七竅鼻有兩竅何不聞聲耳有兩孔何不聞香這些妙用早是不能窮究何況通身無主宰隨處有聱訛聞聲隨聲走見色隨色走既隨色聲妄走便被妄境纏縛從此雜念紛飛妄想顛倒如是等業識塵勞名為染習如是染習乃生死輪迴之根本也嗚呼同一佛性同一妙用毫𨤲有差天地懸隔然而迷悟無根妙在轉處是以古者英俊丈夫向這裏回光返照泝流窮源有撥著便轉聞著便悟者有多積工夫久久而後悟者又有窮年竟歲從少至老而未能悟者此無他由染習之有輕重耳染習輕者其悟速染習重者其悟遲也試舉一二證之如昔者范冲左丞問旻禪師曰某甲不幸墯身於金紫行中去此事稍遠旻即呼左丞之名左丞隨應旻曰何遠之有范公躍然而喜再乞指示旻拊膝一下范擬議旻曰此事見則便見擬議即差范公遂豁然開悟此非染習輕而悟之速者乎又如唐之于頔相公問紫玉山通禪師曰如何是佛通即呼于頔之名于公隨應師曰即此便是更莫別求于公雖喜其言而未得開悟由是展轉咨參晝夜不捨亦多時矣後來藥山和尚聞而歎曰可惜于家漢活埋在紫玉山中于頔聞之徑造藥山求決依上問曰如何是佛藥山亦呼于頔頔亦隨應山曰是什麼于公始得大悟以于頔較范冲便見有遲速之異矣省悟既有遲速悟處亦有淺深如張無盡居士徧參諸大老復參東林照覺和尚自謂脫略而禪宗機緣無不透徹時為江西運使按部至洪之分寧諸山迎謁之留坐逐一詢問惟兜率悅禪師居末位問至兜率諸山代曰兜率悅和上也無盡乃欣然曰吾在京師時甞聞兜率頗善文章悅公正色厲聲曰某學單傳之道說甚文章我若對相公說文章恰如相公對我說禪無盡驚異之及諸山退即命駕趨訪兜率夜話間悅問曰聞相公在東林時古今機緣無不透徹是否公曰然惟德山托鉢香嚴上樹二處有疑悅怒曰我將謂是箇人物元來如此若是此二處有疑則從前悟得底皆未是也且請出去遂閉却方丈門無盡在客軒一夜睡不著至五皷忽有省即趍方丈扣門悅曰做甚麼公曰捉得賊也悅曰捉得賊贓在甚麼處公無語悅曰未在且去公疑團愈熱在客軒中行坐俱不安方轉身欲上床忽爾脫然復走上方丈時悅公預知其來備香燭開門接見乃曰且喜相公大事了畢相視一咲而已方信禪師兩眼對兩眼不待開口而知方信宗門下悟處有淺深也如上所舉數人悟之遲速悟之淺深雖由染習之輕重然亦繫乎根器之有利鈍不同耳根器者論其宿種也宿於善種有所熏脩則根器聰利而速於悟也宿於善種無所熏脩則根器昏鈍而遲於悟也山僧往年在天目山中峰和尚侍傍見五六官客夜坐談道中有一人忽歎息曰出家兒十指不點水百事不干懷三條椽下七尺單前晝三夜三單提獨弄尚且十年二十年不得了悟我輩在仕塗中為國宣勞為民牧守十二時中無一餉靜定而欲了辦此事其可得哉和尚曰此說不然做官高低論根脚悟道遲速論根器譬如鄉里小兒要做官人從小習文書學吏業向司縣間做小吏起弄到老死搆不得九品八品如眾相公出身便是五品四品亦有白身便是三品者較之小吏相去多少學道亦然何可以僧俗之異而自分難易邪當時在座聞者皆悅服以為至理之言也今我副使諸公身歷憲臺法柄在手聲光赫赫震耀海內同來會中亦有據要路而握政綱者有入帥閫而持軍麾者有居幕府而司案牘者有任教官而為文章伯者皆是宿生曾向吾門履踐故其正念炳然不為富貴功名之所掩乃復相率過我師子林咨決禪宗向上一著此豈偶然者哉然我者裏別無指授之方但請各各參取箇無字話頭却不妨向出司按部蒞政牧民演武脩文處時時提掇密密捕忽然破話頭眼空天下肯復讓范冲于頔輩為了事漢哉古人云為治不在多言顧力行何如耳山僧今日已是言語大多言多去道轉遠若是解聽者只消向直截根源處會取且如何是直截根源處良久喝一喝下座前州路馬跡山錢君祥請普說山河大地全露法王身草木藂林盡作師子吼與麼則十方諸佛相好光明逼塞虗空滿眼滿耳三乘教藏無量法門晝夜六時熾然常說歌臺酒榭無非清淨講堂劒樹刀山總是寶花王座一處現身千處萬處一切處同時出現一處說法千處萬處一切處同時演說或於一身現多身或於多身現一身或以一法為萬法或以萬法為一法如帝網珠互相攝入如大圓鏡影像交參其中地位菩薩緣覺聲聞一切眾生情無情等各各同時成佛了也這箇雖是平實商量現成道理未明言外意疑殺天下人若據衲僧巴鼻向上提持坐斷千差路頭佛來也請居門外所以道不與萬法為侶不與諸塵作對十方空索索全體露堂堂貪瞋癡從那裏得來戒定慧向何處安著恁麼見得便見無煩惱可除無菩提可證無眾生可度無諸佛可成到這裏更擬為人說法更擬教人參禪何異𦘕蛇添足取咲傍觀帶累老瞿曇面皮厚三寸其或未然山僧今日拖泥帶水瞞汝諸人去也大眾諸佛與眾生本來同一體只因迷與悟凡聖有差殊同體者同此心也迷而為凡者迷此心也悟而為聖者悟此心也故曰迷之則生死始悟之則輪迴息嗟乎眾生與佛本來同體良由一悟一迷霄壤懸隔故我達磨大師不遠十萬里迢迢西來別立宗旨謂之參禪者要在直指其同體之心使其開悟而已耳自宗旨流東以來宗門弟子與國王大臣長者居士於此廓然領悟得大總持了生脫死者不可勝數矣間有士大夫疑而不信者此無他迷妄太深而信心未發耳殊不思佛說生老病死昭昭只在目前汝諸人試自點檢看從少至老從生至死與塵勞業識輥作一團打成一片畢竟如何結果畢竟有何了期那箇是迴頭一著那箇是轉身一步忽爾三寸氣消眼光落地百骸既散萬事俱休一箇遊魂隨業受報豈不是虗生浪死甘受輪迴者哉何不返觀前輩士大夫盡向宗門下悟明心地拶透禪關大有機緣大有榜樣試舉一二言之退食公堂自凭几不動不搖心似水霹𮦷一聲透頂門驚起從前自家底此乃趙清獻公拶透禪關之語也公事之餘喜坐禪未曾將脇倒床眠雖然現出宰官相長老之名四海傳此乃馮給事學道用工之語也又如張子韶侍郎久參徑山大慧和尚每到徑山或留一月兩月參隨雖久未得發明一日與大慧從容論道論及儒家致知格物大慧咲之曰汝但知格物未知物格子韶爭之大慧曰吾之所謂物格者有妙理存焉非儒者之所能知也子韶疑之遂力請開示大慧曰此難言也請以喻明之唐玄宗時有一官人亡其名曾為蜀中閬州太守頗有德政及罷任閬人懷之塑其像立廟以祀之其人後與安祿山謀叛兵陷京師玄宗西奔入蜀至閬州廟見其像怒之劒斬其頭當此之時其人在長安軍中無故頭自墯地此乃物格之妙也却不容擬議卜度但請就本參事上參究待其開悟此理自明子韶愈疑之從此極力提撕忽有省乃作偈曰子韶格物妙喜物格欲識一貫兩箇伍伯大慧然之此乃是張侍郎發明己事之機緣也其他如裴公美白樂天柳子厚張無盡楊大年楊無為富鄭公范文正公王荊公等皆是儒宗聖賢弟子文章事業表表在人盡在宗門中明心見性去也所以古人道佛法若無靈驗聖賢那肯歸依誠哉是言也今者毗陵馬跡山君祥錢公宿熏善種生具信根既能於親隣州里間排難解紛施恩布惠遠邇靡不悅服之矣近年以來又能徧歷名山多見善知識能行他人之所不能行能捨他人之所不能捨非宿熏善種者能如是乎今復廣開法會率現前一眾求開示參禪法門其亦無媿於古人矣夫參禪學道本無他術只消痛念生死事發大勇猛心將自己胸中妄想妄念惡知惡覺盡底掀翻一刀兩段直得淨躶躶赤洒洒孤逈逈峭巍巍地然後將祖師一箇公案猛提提起教他常光現前壁立千仞行也如是坐也如是著衣喫飯也如是迎賓送客也如是今日也如是明日也如是如是如是捱到結角羅紋處行到水窮山盡時㘞地一聲豁然開悟即此是發明大事時也發明之後更須就作家爐鞴本分鉗鎚煅煉一回無絲毫滲漏方許得解粘去縛既得解粘去縛自然了生脫死既得了生脫死自然轉凡成聖既得轉凡成聖如人到家家權在手堂上一呼堂下百諾風行草偃水到渠成打開自己無盡寶藏取之無禁用之不竭始信山河大地當陽全露法王身草木藂林同時盡作師子吼橫說竪說無所說而不通逆行順行無所行而不到卷舒自在與奪自由乃至顯大神通示大妙用向一手端吐出大海水將一芥子納却須彌山總是尋常初非分外直下與諸佛祖同一證悟同一解脫同一受用同一自在種種相好種種莊嚴種種福德種種智慧一一具足一一現成一一無差一一平等去也山僧如是舉揚大似預扇喜風貪前失後𦘕餅不充饑說藥不療病也莫若且就脚跟下提取所參話認取主人公切不得隨境流轉向外馳求汝若一念回光主人公相去不遠汝若捨己外求轉不相應如今多說不知少說聽取一偈一念回光路不多外邊尋討轉蹉跎太湖三萬六千頃月在天心不在波上海縣費府請就真如菴滿散藏經升座僧問始從鹿野苑終至䟦提河於是二中間未甞談一字還端的也無師云將謂闍梨忘却進云恁麼則世尊不說說迦葉不聞聞也師云一大藏經聻進云仁者見之謂之仁智者見之謂之智師云闍梨見之謂之甚麼僧擬對師便喝僧云某甲有語在師云又道不說說不聞聞僧禮拜師乃召大眾云世尊不說說迦葉不聞聞好箇現成一大藏教徧滿恒沙界內散布百草頭邊夜暗晝明雲門雨施風起水涌鵲噪鴉鳴乃至墻壁瓦礫等二六時中熾然演說無間無斷無雜無壞各各有名有相有文有句或以一句演出千句萬句而不見其為多或以萬句千句演入一句而不見其為少所謂法無礙義無礙辭無礙樂說無礙總在裏許政不待世尊說說迦葉聞聞而情與無情隨類流通去也忽有箇無面目漢出來道不是不是平等真法界無佛無眾生本無法可說亦無說法者若言有佛可成是名謗佛有法可說是名謗法豈不見道實際理地不受一塵一切佛世界猶如虗空花若作有法會名為邪見人山僧到這裏直是分踈不下道有也不得道無也不得道非有非無也不得直饒千佛出頭有口只堪掛壁呈主丈云低聲低聲釋迦老子來也現在主丈頭上判斷此事要知有法可說麼以主丈卓左邊云向這裏薦取要知無法可說麼卓右邊云向這裏薦取要知非有非無法麼卓中間云向這裏薦取薦則便薦不許停思如其不然却請主丈子劃斷兩頭別通一路劃一劃云諸大德心外無別法法外無別心此心若迷則說有說無千差萬別此心若悟則說無說有事同一家不妨從理起事因事顯理有體亦有用論實不論虗只如陶氏悟心居七曩從佛法中來出世便有靈變近年以來甞發一念直欲現寶王剎轉大法輪於是打開自己寶藏運出自己家珍建造真如蘭若示現一會靈山作種種莊嚴興種種供養乃復命僧將釋迦老子四十九年三百餘會所說之法從一字一句一卷一函以至一大藏盡底掀翻其中曰權曰實曰頓曰漸曰偏曰圓曰半曰滿曰信曰解曰脩曰證曰因果地位等無不宣揚如將這老子無量劫來所聚無量珍寶八字打開布施諸人去也是故地前地上諸菩薩二乘有學無學人承此法施各隨所脩行門向有餘無餘涅槃隨分證入諸大天龍夜叉八部盡法界內幽顯聖凡承此法施增長大威德守護正法輪今我現前一眾或受持讀誦或隨喜見聞或供給走使奉事執役之人承此法施同發菩提心同入智慧海次則悟心居士父族陶氏母族童氏夫族費氏如是三族之中一切過化宗親旁及鄉黨鄰里與夫河沙佛子承此法施脫離生死苦輪超入如來境界然後居士得大總持得大受用業障報障煩惱障於此消除戒根定根智慧根於此增長正法眼藏於此發明涅槃妙心於此開悟從㝡初發念以來所趍所向所願所求於此皆得具足圓滿了也山僧今日高登此座舉揚㝡初一念功德證明末後一段風光敢保從今以去至于生死岸頭彈指圓成八萬門一超直入如來地分身徧界廣度眾生如是等事皆得具足圓滿無疑矣何以見得水須朝海去雲定覓山歸復舉西堂百丈南泉隨侍馬祖翫月因緣乃云馬祖道經入藏禪歸海大似一箇鐵渾侖覓他縫罅不可得從人將謂經自是經禪自是禪往往錯會不少山僧今日也未免將錯就錯錯註解去只如古德有云入息不居陰界出息不涉塵勞常轉如是經百千萬億卷且道如是之經即今歸在何處當知此經不在別處却在居士提話頭做工夫處話頭工夫也不在別處却在居士日用中著衣喫飯折旋俯仰行住坐臥應事接物處若向如是等處見得徹去方見馬大師舌頭落處山僧既是漏逗說到這裏索性為他搭箇冬瓜印子以手拍禪床云日用工夫絕覆藏悟心言下好承當經禪藏海俱拈却湧出心花照十方松江呂子潤宅會諸山師德建七日華嚴勝會薦度徐氏了心居士逐日請師升座提唱華嚴大意第一日陞座僧問無邊剎境自他不隔毫端既有自他因甚不隔師云懷州牛喫禾益州馬腹脹問十世古今終始不離當念既有終始因甚不離師云天下覓醫人灸猪左膊上進云此會翻宣教典毋勞說禪且望禪師直談教義師云山僧何曾有兩箇舌頭問一真法界十種玄門還有自他終始也無師喝云那得許多骨董來進云既無許多骨董畢竟華嚴所說何義師云說華嚴問離却法界玄門華嚴經還在甚處師云現在諸人手裏進云與麼則見者聞者存者亡者皆得信受奉行去也師云贈汝三文買草鞋僧禮拜師乃云禪客問禪囑山僧直談教義山僧只有一箇舌頭禪客却有兩片耳朵如今曲順人情舉些現成說話大眾一真法界無邊世界以俱收十種玄門無量法門而總攝即事即理即性即相即俗即真即因即果即主即伴即聖即凡即正即依即多即一如帝網珠重重顯現如香水海處處含容非神通使然乃法爾如是迷之者觸途成滯悟之者當處全彰這箇是華嚴圓頓稱性之談也華嚴者吾世尊七處九會所談之經也七處九會者㝡初菩提場第二普光明殿第三忉利天第四夜摩天第五兜率天第六他化天第七第八重會普光明殿第九逝多林也第一會說如來依報正報第二會說十信第三會說十住第四會說十行第五會說十回向第六會說十地第七會說等覺妙覺如上七會並是次第而說謂之行布法門第八及第九兩會普慧雲興二百問普賢瓶瀉二千酬凡說一法則一切法總在裏許謂之圓融法門行布如桃花李花先花後果圓融如蓮花花果同時圓融又有二義一因該果海二果徹因源因該果海者舉十信時十住十行十回向十地等覺妙覺都在裏許果徹因源者舉等覺妙覺時十地十回向十行十住十信亦都在裏許所以道行布則教相差別圓融則性相無礙相是即性之相故行布不礙圓融性是即相之性故圓融不礙行布圓融不礙行布故則一為無量行布不礙圓融故則無量為一無量為一則融通隱隱一為無量則涉入重重如是九會之經共成八十卷也然此八十卷經分作四分謂之信解行證也㝡初有十一卷為眾生開發信門其次有四十一卷為眾生開發解門又其次有七卷為眾生開發行門又其次有二十一卷為眾生開發證門一部大經不出信解行證之四分四分所詮之義不出五周六相十玄門四法界也由信而解由解而行由行而證斯一經本末之大旨也一經大旨既已昭然然則前所謂迷之者觸途成滯此義何耶此即當時二乘在座有耳不聞圓頓教有眼不見舍那身者是也悟之者當處全彰此又何義耶此即現前諸山大德為徐氏了心居士指示十種玄門顯揚一真法界者是也豈不見道華藏世界所有塵一一塵中見法界諸人還見麼拂子左擊云十種玄門開了也右擊云一真法界現了也恁麼見得便見盡虗空徧法界無盡光明功德藏身現在這裏佛剎微塵數菩薩海會亦在者裏佛剎微塵數諸善知識天龍八部亦在者裏佛剎微塵數寶座寶床寶網寶帳寶樹寶蓮寶華鬘纓絡亦在者裏佛剎微塵數香𦦨雲花𦦨雲燈𦦨雲摩尼雲師子幢雲亦在者裏問也在者裏答也在者裏圓融也在者裏行布也在這裏信也在者裏解也在者裏行也在者裏證也在者裏彌勒彈指開樓閣門也在者裏文殊伸手摩善財頂也在者裏乃至五周六相十玄門四法界都在者裏此豈不是當處全彰者哉我今更為諸人向親切簡要處總而收之擊拂云世尊七處我者裏只一處世尊九會我者裏只一會世尊說經八十卷我者裏只一句諸人且道是那一句遂高聲云了心復卓主丈云了則了矣畢竟諸人向何處與居士相見聽取一偈了心心了了無心當處全彰義轉深瀝凟變為華藏海覺華開徧雜花林第二日升座毗盧華藏莊嚴海徧在一切處大方廣佛華嚴經徧該一切法華藏海既徧一切處且道牛欄馬廐酒肆婬坊劒樹刀山鑊湯爐炭等穢惡境界又向何處安著既無安著處便將爐炭鑊湯刀山劒樹喚作華藏海得麼便將婬坊酒肆馬廐牛欄喚作華藏海得麼若不喚作華藏海則不可謂之徧在一切處也華嚴經既該一切法且道神號鬼哭水響風聲犬吠鷄啼驢鳴馬呌等穢惡聲音又向何處分別既無分別處便將馬呌驢鳴鷄啼犬吠喚作華嚴經得麼便將風聲水響鬼哭神號喚作華嚴經得麼若不喚作華嚴經則不可謂之徧該一切法也靈利丈夫英俊上士向者裏指點不出分踈不過山僧今日為諸人指點去也無量無數浮幢香水海無量無數世界輪圍山無量無數解脫菩提場無量無數摩尼寶光聚無量無數宮殿樓閣雲無量無數蓮華師子座無量無數變化莊嚴身無量無數國城善知識竪拂云即今在拂子頭上同時顯露了也教主遮那金口所說普賢願王菩薩所說文殊大智菩薩所說七處九會諸菩薩當會所說四十一位法身大士一切大心眾生天龍阿脩羅等眾會所說地神說水神說火神說風神說山神林神樹神道場神等所說乃至雲臺說寶網說塵說剎說熾然說卓主丈云即今向主丈脚底同時舉揚了也且道主丈拂子因甚如此奇特若知他奇特處便知他變現融通處若知他變現融通處便知他徧在一切處徧該一切法也恁麼知得方知神號鬼哭水響風聲犬吠鷄啼驢鳴馬呌等無一法不是華嚴經也牛欄馬廐酒肆婬坊劒樹刀山鑊湯爐炭等無一處不是華藏海也此心未了則名相萬殊此心既了則體用一致了心三昧能如是不是了心人不知復卓主丈下座第三日升座知識五十三員在你眉毛眼睫上大經八十一卷在你鼻孔口唇邊你若要向眉毛眼睫上求則千里萬里蹉過了也你若要向鼻孔口唇邊討則千差萬差打失了也豈不見道有大經卷在一塵中有一智人破此微塵出大經卷若見得者箇大經那八十一卷都成閑故紙又不見道真善知識不離自家道在己求不從他覓若見得者箇知識那五十三員總是路傍人你若未能恁麼承當却又不許等閑放過八十一卷有始有終政好從頭讀去五十三員有前有後不妨逐位參來所以經中道善知識者長諸善根譬如雪山長諸藥草善知識者是功德處譬如大海出生眾寶善知識者不染世法譬如蓮華不著於水善知識者不受諸惡譬如大海不宿死屍善知識者照明法界譬如盛日照四天下善知識者長菩薩身譬如父母養育兒子又云見善知識心不散亂見善知識破障礙山見善知識入大悲海救護眾生見善知識得智慧光普照法界見善知識普能覩見十方佛海見善知識得見諸佛轉於法輪又云由親近善知識能勇猛勤脩一切智道由親近善知識能速疾出生諸大願海由親近善知識能代一切眾生受無量苦由親近善知識能於一微塵中說法聲徧法界由親近善知識於念念中行菩薩行究竟安住一切智地由親近善知識而能徧往十方國土善哉善哉善知識者乃有如是之利益哉雖然如是要見善知識須有大因緣有因緣者千里相逢無因緣者當面蹉過優鉢曇花容易見大善知識最難逢此語豈欺人哉唯此徐氏居士宿有大因緣多見善知識且如山僧固無長處居士也曾納香問道求語筞進來如今四大幻身雖曰已死而其求語問道之心昭昭靈靈明明了了兩眼對兩眼何曾有死生適來所謂真善知識不離自家既見外邊知識來參取自家知識去居士還會麼茫茫烟水百餘城誰肯隨人背後行脚未跨門相見了到家元不涉途程第四日升座若人欲了知三世一切佛應觀法界性一切惟心造世出世間聖凡境界只此一偈包括無餘所言法界者有四聖法界有六凡法界四聖六凡合成十法界也四聖者諸佛菩薩緣覺聲聞也六凡者天人脩羅畜生餓鬼地獄也如是十法界本無自體本無自性亦無自種亦無自根皆惟一心之所造也所言心者如太虗空本來清淨本來廓徹無方無所無狀無形不滅不生不動不變不知何故而言法界惟心造哉原夫此心雖曰不變而亦隨緣以其隨緣故曰能造隨緣者或因一念瞥生或因外境相觸內外感觸故曰因緣纔有因緣便成法界且以譬喻明之心如水也法界如波也當其水體本靜未有感觸之時湛湛澄澄不搖不動及其偶遭風觸則千波萬浪隨其所觸而生焉故曰水能造波波因水而有也心能造法界法界因心而有也然則一乘任運萬德莊嚴者諸佛之法界也圓脩六度總攝萬行者菩薩之法界也見局因緣證偏空理者緣覺之法界也功成四諦歸小涅槃者聲聞之法界也廣脩戒善作有漏因者天道之法界也愛染不息雜諸善緣者人道之法界也純執勝心常懷瞋鬪者脩羅之法界也愛見為根慳貪為業者餓鬼之法界也欲貪不息癡想橫生者畜生之法界也造十習因受六交報者地獄之法界也若以廣而論之則二十重華藏世界海依此心而變造也無邊香水海依此心而流注也大小鐵圍山依此心而安住也日月星辰依此心而運行也諸寶行樹依此心而生長也諸大蓮花依此心而開敷也一切眾生之所迷迷此心也三乘賢聖之所悟悟此心也一大藏教之所開導開導此心也歷代宗師之所指示指示此心也三觀者觀此心也單傳者傳此心也累劫而脩脩此心也歷位而證證此心也良由此心隨緣變造故有種種之法界也若能一心不生了悟了證則種種法界隨其所了而空也是故十習既斷六交不生地獄之心了也欲貪既斷癡想不生畜生之心了也愛見既斷慳貪不生餓鬼之心了也勝心既斷瞋鬪不生脩羅之心了也愛染既斷正念現前人道之心了也捨有漏因脩無漏業天道之心了也不執四諦不守真空聲聞之心了也不局因緣回心入大緣覺之心了也六度功成頓超地位菩薩之心了也圓滿菩提歸無所得諸佛之心了也今我了心居士平生參究此心誓求了悟其於六凡法界之中必已了悟而無所疑矣且道四聖法界之中所了之心落在甚麼界喝一喝下座第五日升座若人欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙何謂佛境界耶空有迭彰理事無礙一多相即小大互容夫是之謂佛境界也由是觀之一塵一毛皆佛境界一沙一滴皆佛境界一四天下一大千世界乃至佛剎微塵數華藏海皆佛境界也爭奈汝諸人舉手所指縱目所觀高而蓋者謂之天下而載者謂之地運而行者謂之日月列而布者謂之星辰靜而住者謂之山動而流者謂之水有情者謂之人無情者謂之物森羅者謂之萬象却將真佛境界當面諱却豈不大可憐哉此無他只是汝諸人意根下不曾清淨故有種種妄想既有妄想乃有分別既有分別乃拘名相既為名相所拘於是見天只是天見地只是地見山水只是山水見人物只是人物矣又於名相之中妄生種種取著或取著山或取著水或取著人或取著物又於取著之中妄生種種障礙或被色礙或被聲礙或被山水人物萬象森羅之所障礙既是所向皆礙要見佛境界驢年更驢年雖然如是汝若端的要見也不難但將種種妄想種種取著種種障礙和盤掇轉直教意根下清淨如虗空向頂門上豁開正眼洞照世間然後天也是佛境界地也是佛境界日月星辰也是佛境界山川人物也是佛境界一塵一毛一沙一滴乃至佛剎微塵數世界海無往而非佛境界也當此之時和箇妄想取著障礙直下皆是佛境界也如是境界也非有也非空也非理也非事也非一也非多也非小也非大也非迷也非悟也非脩也非證喚作佛境界也得不喚作佛境界也得如是微妙不可說如是圓融不可說如是自在不可說如是無礙不可說如是證悟不可說如是解脫不可說如是功德不可說如是利益不可說是名不可說又不可說之佛境界也恁麼則徐氏某人平生所聞是佛境界平生所見是佛境界平生所樂是佛境界平生所參是佛境界且道於佛境界還曾親到也無若也未到更聽從頭說破若人欲識佛境界頭上安頭當淨其意如虗空誰曾染汙遠離妄想及諸取撥波求水令心所向皆無礙滿目青山驀拈主丈云說破了也不得錯會卓一卓下座第六日升座世尊昔在摩竭陀國阿蘭若法菩提場中初成正覺智入三世悉皆平等其身充滿一切世間其音普順十方國土譬如虗空具含眾像於諸境界無所分別此是大開一口吞盡十方世界了也又復歎曰奇哉我今普見一切眾生具有如來智慧德相但以妄想執著而不證得此又將菩提場中所證所得底盡情分付諸人了也汝諸人現在菩提場中人人頭戴虗空箇箇脚踏實地而不成正覺者何耶妄想執著未除也菩提大心未發也迷則菩提為妄想悟則妄想為菩提梵語菩提此翻曰覺欲成正覺者須發菩提心故經云菩提心者猶如種子能生一切諸佛法故菩提心者猶如大地能持一切諸世間故菩提心者猶如淨水能洗一切煩惱垢故菩提心者猶如大風普於世間無所礙故菩提心者猶如大車普能運載諸菩薩故菩提心者猶如大道普令得入大智城故菩提心者猶如舍宅安隱一切諸眾生故菩提心者猶如園林於中游戲受法樂故菩提心者猶如慈父訓導一切諸菩薩故菩提心者猶如慈母生長一切諸菩薩故菩提心者猶如蓮華不染一切世間法故菩提心者猶如良藥能治一切煩惱病故菩提心者如如意珠周給一切諸貧乏故菩提心者如如意樹能雨一切莊嚴具故菩提心者如大施會能滿一切眾生心故菩提心者如佛支提一切世間應供養故善哉菩提心乃有如是之功德也既發菩提心當脩菩薩行行若不脩心成虗發豈不見善財童子每參知識必曰我已先發阿耨多羅三藐三菩提心而我未知云何學菩薩行脩菩薩道我聞聖者善能誘誨願為我說此乃善財發心脩行之樣子也由是而知雖有多聞若不脩行與不聞等如人說食終不能飽故經云如人說美饍自餓而不食於法不脩行多聞亦如是如人善方藥自疾不能救於法不脩行多聞亦如是如人數他寶自無半錢分於法不脩行多聞亦如是如聾奏音樂悅彼不自聞於法不脩行多聞亦如是如盲繪眾像示彼不自見於法不脩行多聞亦如是譬如海船師而於海中死於法不脩行多聞亦如是惟我某人則不然一生所發都是菩提心一生所脩都是菩薩行妄想執著念念遠離智慧德相時時體究其於當來世中蒙佛授記坐道場成正覺決定少他一分不得且道有何憑據擲主丈下座第七日滿散華嚴會升座僧問一法若有毗盧墯在凡夫萬法若無普賢失其境界畢竟如何和會師云你在那裏見他𤺊鬪來進云爭奈前話何師便喝僧云某甲到者裏有耳如聾有眼如盲師云更要和會箇甚麼僧良久云某甲會也師云你作麼生會僧云性空即是佛不可得思量師又喝云三十年後思量者一喝在乃云遮那淨法身藏在一毛孔裏普賢行願海散在百草頭邊雖在一毛孔分明拄地撑天雖在百草頭畢竟掃蹤滅跡低聲低聲遮那與普賢來也諸人要見一毛孔麼卓主丈云橫亘十方竪窮三際諸人要見百草頭麼擊拂子云石火電光不容眨眼有時一毛孔重重吞却百草頭有時百草頭各各現出諸毛孔有時一毛孔即是百草頭有時百草頭即是一毛孔直得遮那普賢輥作一片使無邊開士大地眾生討頭不著挨身不入用力不到劄脚不牢既無定體亦無定名有時喚作一真法界有時喚作大光明藏有時喚作法菩提場有時喚作妙莊嚴域有時喚作六相義有時喚作十玄門有時喚作一心三觀有時喚作直指單傳有時喚作故家田地有時喚作向上牢關或號金剛圈或名銕酸餡或稱暗號子或曰本來人乃至用之為棒變之為喝放去收來千差萬別及乎盡底掀翻從頭勘破元來只是一箇自己這箇自己在天同天在地同地在人同人在物同物於自己分上或說本具或說本空或說悟迷或說脩證引起許多閑絡索春色無高下花枝自短長只如徐氏了心居士宿有資熏不肯昧却自己所以一出母胎便自靈利雖現女人身同行世間事其不昧者終自了然指廩捐金不待勸而行矣誦經解義豈待教而通乎又能痛念死生大事力參無字話頭日用工夫心心不間自己面目念念究明壽至五十八年臨終端坐而逝既有賢夫賢子為之廣作佛事又有孝女孝婿為之翻閱大經向普賢行願海中滿注八功德水就遮那淨法身上莊嚴萬行因華居士自己一著可謂美矣善矣如今滿世間人皆不知有自己一著以其不知故不肯信以其不信故不能行只在富貴功名中酒色財氣上乾弄一生有何成就去死日不遠猶自不回頭豈不哀哉痛哉又有一等雖信自己雖曰參禪學道而用心不切不能勇猛精進也要口頭胡說亂道臘月三十日到來十箇有五雙虗生浪死其視居士得無媿於心乎山僧六七日間將一把龜毛拂子攪翻華藏海曲順孝家之情做箇座主模樣牽經引教忉忉怛怛要與居士發揚自己一著而今看來發揚也發揚不著贊歎也贊歎不及徒爾閑言長語弄成滿地葛藤且請主丈子出來自家收拾去也以主丈畫一畫記得善財童子參徧南方五十三員善知識末後遇普賢菩薩教發十種願王引導往生樂土喚作一生參學事畢大小善財參方無眼目走得脚生瘡帶累後來人長年在途路爭似徐氏了心不出門庭徧參知識不離華藏海親見安樂不待往生何煩引導敢保善財童子羨慕不及也諸人還會麼娑婆安養路無差了得心源共一家坐看重重香水海紫金光照白蓮花華亭夏監運宅滿散懺筵請升座師云覺性如虗空地獄天宮自何而有佛身徧法界傍生鬼趣那裏得來任他滿眼橫陳總被當頭破閻羅老子與菩提達磨鼻孔相連螻蟻眾生與釋迦牟尼眉毛𤺊結若會者箇道理便見無造罪者無受罪者亦無斷罪者亦無懺罪者一切處成等正覺一切時轉大法輪若也未會却聽山僧重下註脚諸法從心生諸法從心滅無有一法不從吾心而起滅者也何者謂之法世間萬物人間萬事皆法也以萬物言之則天地山川昆虫草木但是有形有像有色有聲者皆謂之法以萬事言之則諸人從生至老日用之中所作所為或善或惡亦皆謂之法也何者謂之心心在諸人分上喚作自己又喚作主人公十二時受他主使一切處聽他差排頂天立地也是他負海擎山也是他使汝開口動舌也是他使汝舉足動步也是他此心㝡廣㝡微㝡靈㝡妙千變萬化不可思議遠則充塞天地近則常在目前爭奈視之不見聽之不聞著意求之轉求轉遠顏子有云仰之彌高鑽之彌堅瞻之在前忽焉在後也是者箇道理當其一念未生之際一真無妄之時皎皎然如古鏡之光明無染無汙昭昭然如止水之澄湛不動不搖胡來胡現漢來漢現照天照地鑑古鑑今無一絲毫隱蔽無一絲毫障礙者箇是諸佛諸祖境界及乎一念發生諸妄交擾如風動塵飛止遏不得如崖崩石裂把捉不牢如狂象無鉤牽挽不住如𤠔猴得樹呼喚不回如石火電光如神出鬼沒無你著眼處若是大智慧底人秉回天轉地之機用攫霧拏雲之手一把把住一坐坐斷放開也由我揑聚也由我者箇是諸佛諸祖妙用處其餘凡夫眾生勘不破把不住未免隨他七顛八倒七縱八橫去也孟子云出入無時莫知其鄉放辟邪侈無不為己便是者箇道理從此便有三障何謂三障業障報障煩惱障是也何謂煩惱障一念發生諸妄交擾者是也才有煩惱便有業障何謂業障殺生偷盜邪婬妄語綺語兩舌惡口貪欲瞋恚愚癡等是也才有業障便有報障何謂報障生遭王難死墯地獄餓鬼畜生三塗苦海之中受苦受罪者是也如此三障鉤鎻連環相牽不斷故謂之輪迴也當此之時皎皎光明之古鏡變而為塵垢矣昭昭澄湛之止水結而為寒氷矣既為塵垢則無鑑照之功既為寒氷則無應現之用矣然則三障本無因一念妄生而有地獄本空從一念妄興而造所以道諸法從心生諸罪從心起也由是吾佛吾祖以大願力誓度苦海眾生廣開懺悔之門特立懺悔之法使諸眾生生大怖畏生大慚愧依此法門發露懺悔妄業既消妄心既滅三障永除一真獨露便可與佛祖同一境界如以妙藥磨去塵垢而重顯古鏡之光如藉杲日銷鑠寒氷而復還止水之體所以道諸法從心滅諸罪從心亡也其理昭然如此而世間之人間有不信者第一不信有地獄苦報之事第二不信有懺悔之法殊不思如上所言三障分明現在目前且以世間之法言之即今朝廷張官置吏以治天下而世有兇狠強暴縱心作惡之徒或犯五逆十惡奸盜詐偽等官設牢獄枷鎻笞杖徒流以究治之重則明正典刑籍沒家產以懲戒之縱心作惡等即煩惱障也奸盜詐偽等即業障也牢獄枷鎻等即報障也陽間事既如此地獄可不信哉何況陽間尚可行財計囑用情隱蔽地獄則善惡影響毫髮不容其私可不畏哉其不信懺悔之法者今亦以世間之法言之世有過犯者官許發露首告首告者與免本罪此非懺悔之法乎何況懺悔之法承吾佛之大恩力既拔其苦復與其樂輕則生天重則生於佛國較之與免本罪何止霄壤懸殊由是而知懺悔法門大有利益於人不可不信也且如某人衣冠禮樂之臣族詩書文物之名家自先世以來廣行孝義多積陰德以惠其子孫然則平生既無重大之業矣今日又承孝屬代為熏脩懺法作種種佛事則又何罪而不滅何業而不消何福而不生何善而不長其所以隨佛往生者決定無疑矣其所以徹見本來面目者決定無疑矣山僧不媿詞冗重宣一偈以印之銷氷為水水如常古鏡妍磨再發光風不動兮塵不起本來面目露堂堂徐氏大夜小參僧問德山道今夜小參不答話問話者三十棒意作麼生師云我者裏不打禪客有問即答僧云無法可說是名說法又作麼生師拈棒僧便走師云做賊人心虗乃云諸佛不會說法舌頭才動平地是風波諸祖不會答禪口縫才開滿眼是荊棘若道有說有聞固是敲空作響若道無問無答又成掩耳偷鈴恁麼則銀山銕壁不恁麼則銕壁銀山恁麼不恁麼脚底有牢關山僧今日路見不平也要別通消息以拂子作打開勢云銀山銕壁八字打開了也擊拂子云脚底牢關一擊粉碎了也政好縱步於一毫端上擘開太華放出黃河露身於萬象光中倒握須彌吸乾東海使臨濟德山眉毛上出一口氣使釋迦彌勒鼻孔裏放三寸光然後向他不會答禪處答一語向他不會說法處說一句卓主丈云答了也說了也當知此法不可思議能大能小能有能無能悟能迷能凡能聖是故諸人得之靈於萬物具乎五常十大夫得之脩身齊家治國平天下聖天子得之奄有四海恊和萬阿羅漢得之具五神通證四果位辟支迦得之出無佛世度有緣人諸菩薩得之行願相資智悲雙運佛世尊得之演說一大藏教化度九界眾生至如天台宗師談具談即談空假中或談折攝二門四種淨土皆此法也華嚴宗師說毗盧性海說普賢行門說理法界事法界理事無礙法界事事無礙法界亦此法也達磨一宗說不立文字直指人心或說佛祖命燈或說本來面目總不外乎此法也恁麼則含吐十虗該羅萬有口口道著步步踏著因甚麼百姓日用而不知飯籮邊坐却嫌飢不知者且莫說只如古今以來多少聦明之士知有此法者却向文字上講明義理中尋究講也講得明究也究得到爭奈文字自是文字義理自是義理與你自家了無交涉說時似悟對境還迷蓋為但能致知而不能力行也書曰非知之艱行之惟艱祖師道說得一丈不如行取一尺說得一尺不如行取一寸若不力行決無受用既無受用未免念慮紛紛是非擾擾顛倒錯亂不得自由向醉鄉夢境裏輥過一生就利鎻名韁中擔閣一世前途生死輪迴且請自作自受去也此說且止只如吾宗門下真參實學之士晝三夜三用盡伎倆尚且不奈何如水上捺葫蘆如釘樁搖艣如走馬看花如按牛喫草也要橫說竪說東提西提到底半青半黃不能大了大當見人道箇諸佛不會說法諸祖不會答禪便乃七上八下處斷不定豈不大可憐哉若是了心底人如久客到家如推門落臼任你說禪說教談有談空八面收來一串穿却不遭諸佛舌頭瞞說與不說都是法不向諸祖口邊討答與不答都是禪拈主丈云者箇是主丈那箇是心那箇是了若道有心可了是名常見若道無心可了是名斷見若道非了非不了亦了亦不了總不出斷常諸見遂擲下云若向這裏離四句絕百非領略得去却許與諸佛祖平等受用何故千峰勢到嶽邊住萬派聲歸海上消復舉成都善女人范縣君曾參昭覺圓悟和上令看不是心不是佛不是物是箇甚麼縣君久而不悟乃號哭而告圓悟曰話頭稍長難於參究和上有何方便使我易會圓悟曰但看是箇甚麼縣君自此稍覺省力未幾果有開悟乃曰元來恁麼近那師云縣君費盡苦工夫不知元來恁麼近何似徐氏自幼便知有此事所以一生履踐真實及乎臨終恬然坐逝較之縣君省力多少山僧今夜快便難逢當場為之證據心了即了心休即休體雖常住用乃周流瀟瀟松風出萬壑杲杲春日行滄洲大平氣象一網俱收了心境界只者是南北東西得自由
