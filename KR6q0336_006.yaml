body:
  text: 小師善遇編序照堂長老義感集序余友照堂寂長老至元丁丑三月廿一日卒于吳門之能仁菴其行義感於人人哀之不能已發而為詩若辭散漫於三吳林壑間天台竹居可西堂裒而集之目之曰義感過松江請於余曰詩辭無以見出處授受之詳公與照堂同參天目幸詳之使觀者有所考余曰照堂高昌名族之裔也其宗姻鄉黨之士去故國而布列于大朝都邑者皆達官其俗尚佛教好施與又好引援進取以相榮盖去國已遠見鄉人雖疎亦親故彼氏之為沙門者往往得厚施或得厚名位而照堂一無取焉唯道是嗜凡顯密二宗大聲實之士悉從事之盡其學未厭其志延祐間南來天目扣直指之學于幻住先師日有深造遂眷眷不忍棄去草衣蒲履氷檗相持者有年逮先師告寂始北歸諸達官嚮其道爭羅致之然猶兢兢潔己非誠求道者不與語非其人不與交與交必盡其義嘗以幻住廣錄三十卷進上覽之大悅賜入藏諡先師曰普應國師既間關往復成其事復入天目願守國師之塔以老焉及有疾同居者強其出山就藥遂終于吳門云余所知者止此其他非所詳雖然即是集而求之足以見照堂之素蓄足以見交際之深情又足以見竹居之尚義凡足以稱於人傳於世激厲乎時輩者盡在是矣又奚必他詳哉銅佛贊頌序至正甲申夏錢唐照菴炬菩薩大會緇素于寶石山作佛事者四十八日以慶銅彌陀佛及觀音勢至像成亦以張其化使益廣而益遠也原其造像之始約化四十八人各施銅錢一而念佛千聲以為例如是四十八人人各轉化四十八人轉化積四百八十萬錢冶以範佛佛身長一丈六尺二大士稱之相好纖悉具備既又梯山以登之營大殿以安奉之乃有今會於是四方士頌贊交集謂其可贊者有三錢唐佛剎巨細千萬計而未始有銅像一也募施之法取少而化廣異乎常二也合眾善以為會高下之機普攝三也錄頌成卷待余序余於三者之外容有說焉初像之未成也全佛是銅及其既成也全銅是佛曰佛曰銅二名一體盖佛不自佛從緣而生也推緣生而類通之令悟世間萬物物物皆佛也此外復有說焉凡一人一念之興一錢之施則其全體銅像已隨念而應之矣一念既爾多念亦然然則應念而成之佛又何止四百八十萬哉此外猶有說焉以多人念佛之心展轉流布自今世後世以達乎無窮則佛隨而應之亦復如是而無窮也橫應之廣既如是竪應之遠又如是其數量可思議哉是由照菴宗性具之學而得其有將使人人同悟是心作佛是心是佛之說以至重重無盡互互無礙曰理曰事周法界無一而非佛故其一機之發一像之成遂能致廣遠之化者如是以余知照菴之化如是故序其贊頌之卷如是道林訓上人遊方序士有受道之器者不可不為大方遊遊足廣所聞以致其道道成矣又足致美名厚位推己有以公乎眾此古今類然不則沒踵鄉塵襲染庸下既無自以聞道能保不毀不喪其所有器哉以是知遊無負於士也然又有老於遊卒陷異學事口耳飾倨傲視其中闕然或多財以樹名附勢以苟位至危身搶攘反以貽鄉井咲者非遊咎也求道之志不確也以不確志激窮達之不平遂不急於道而急於名位而大方柄黜陟者既不能緩其所急又不能急其所不急故不容不墯時尚之獘獘豈今為然古有之惟確乎志者知名位不足急而得其所急得其所急則不足急者隨之或道與時戾不幸而不達則又推己不達之達與古為徒為物作則其在名位之有無哉故士非器則已是其器必確其志庶有以驗夫遊之不吾負也華亭訓上人字道林器宏而材贍其狀偉然足以致道致達者將有行植錫而未發若於余言有所疑乃盡言以告曰余覘今之在位者登明選公皆急於得士以嗣其道孰肯以非道遇子顧子之所急者何如耳送才侍者歸葬師序吾氏為出世之學必遠父母而從師受業焉師者植之培之務材其成以為繼述之託至恩深愛視父母無間然然其徒或翩然去之歷參大方千萬里未嘗以為遠少而出衰白而未歸未嘗以為久視受業如旅邸視其師猶眾人雖老病且死不暇顧世俗觀之悖本絕義甚矣而其心以為未始悖絕者盖有志於別傳之道也使誠無媿乎道足以成己成物聯芳佛祖曰師曰親將被其益於無窮之世較里巷相守以養老奉襄為報者不霄壤乎故為之師者其意亦曰吾徒之在方外所從必名宿所友必端人所學所詣縱未足追躅先宗豈不足豐才茂德顯芳譽以為故家之光者歟歲計之旦旦望之扶憊忍死庶幾見之或不幸不見而死而其望之者未肯俱死也然則為之徒者苟不能以其師之心為心徒碌碌羣遊羣居相習流下於道無足取者豈不相負也哉番易才侍者參方歲久將歸葬其師求余言余之師死且葬久矣而未若才之能歸也故書所不忍言與不忍不言者以為之贈血書法華經序法華者吾自心之法華也外自心以求法華無有也迦文一代時教若播百糓而穫在法華由其以佛知見開悟眾生歸於授記作佛而後已授記之說不同有本有跡跡則為諸聲聞開權顯實本則為諸大會開近而顯遠譬猶抹諸世界以為微塵以塵為劫以劫計其成佛已來之壽命至于後際而未窮其間說法授記者可勝計哉其遠雖若此然亦未離乎數量也究夫曰生曰佛曰悟曰迷曰近遠始終之數量其在吾之自心特一念隨緣所現之影響耳是故一念之擴山毫海墨不足以書其少分一念之斂針竅毛孔函之而有餘所謂非思量分別之所能解深固幽遠無人能到者其旨在此陋庸之士足以語此哉可庭詎藏主受業袁州盤龍山顯慶禪寺早挾筞為四方遊至順癸酉寺厄于火其師雲峰峙禪師奮力興復今又七年矣可庭寓吳門得受業書遂刺指血書法華經凡七卷復於是經一字一拜助其師禱于佛速寺之完令法久住其用心亦勤矣經成擬奉以還持示余余稽顙稱贊且語之曰經不云乎若佛滅後聞是經典有能自書若教人書則為已起僧坊作諸殿堂園林浴池經行禪窟一切樂具充滿其中又云眾生見劫盡大火所燒時我此土安隱天人常充滿由是觀之一毛之孔一縷之血一點一畫之布置可以展化權可以樹幢剎可以現諸佛之本光乃至寶所之歸輪王髻珠之賜靈山一會之未散若天若人奉宮殿床座花香幡盖以供養之悉在乎此子誠知此則吾自心法華之說亦當有以驗乎此矣錢王銅塔詩卷序奇貴恠古之物必見重於人然所重有不同或以娛玩或以先世之遺又或取以為進脩之法觀其所重其賢否善惡可知也禾興春野先生吳越錢氏之後有堂曰慈壽以奉其先世忠懿王所造銅塔而旦夕跪稽頌禱徼福以壽其母母今年八十又四無恙大夫士為詩若文稱美之余為序其由曰昔西域阿育王嘗作寶塔八萬四千貯釋迦佛舍利散之四方使天人龍鬼藉是以為善其在東土者有五今四明常寧之類是已故忠懿得以效之其高尺許而其形與數皆如之散之宗黨僧舍今慈壽堂之類是已以阿育之聖明能不寶其寶而以為塔者盖知推善及人為至寶也若忠懿之聚銅能鑒其為盤為柱為駝為臺之非善而以為塔是得阿育之心也至若春野克重先世之遺不墯娛玩之癖而又拳拳于善以感其朋遊是又得忠懿之心者斂夫塔由舍利而作舍利豈外物哉吾佛推廣其善以極乎大備之驗者也大備之驗佛豈得而私之乃人人之所能為而固有者余願春野因塔以思舍利因舍利以思己固有進而脩之擴而充之以驗夫大備之極斯又懿育之所未至者也春野學贍才敏為君子儒既不效儒之排佛而且事之故敢貢進脩之說以終其序云湛碧軒序龍溪定光寺在豫章城南四十里余友悅希雲故業也寺有池池上萬竹玉立其師古道太公即池為軒清甚希雲得奎章學士虞公大書湛碧以為扁諸名士亦想像而詠歌之將持以歸重會余於吳余語之曰若知湛碧之說乎水止而澄曰湛水竹交暎曰碧碧不害其湛有而不有也湛不礙其碧不有而有也或不幸風動波興潦汗雜入則湛碧逝矣吾心亦然諸塵消落當念澈然者湛也具含一切法性如隨色摩尼者碧也居是軒者啟窓憑闌因境會心則湛碧在我而不在彼矣然必深造而安居之然後知在彼有待而在我者無所待也誠無待矣則雖境風交扇情波怒搖吾湛碧自若也充是以周流異域混入異類無適而非湛碧也曩吾與子同參天目而最相知所謂在我者時至焉而居之未安別又十七年疑湛碧違子日遠今幸子知歸矣歸求而得之有以驗吾言矣千溪易名記後序劒林慧公易其寺之名千步為千溪余固得其易之之說矣盖寺之地廣步不啻千而以千步名名不稱實故以溪易之然則溪果千邪溪苟不千則實又不稱其名矣夫不稱一也名不稱則易實不稱則不易安乎余又察其步溪無病而病在乎千步既鄙千之少溪復媿千之多必併千易之然後為安也千之步不獲易於昔而待易於今溪之千不獲易於今則必待易於其後與其待後之易孰若盡善於公之手乎然易步以溪累公千萬言與玉堂諸公之鉅軸亦既勤且勞矣今復易千何余言之不憚煩也哉矧易千之義諸公未嘗言之獨余言之余言未足徵也公請決諸升陰降陽者云五百尊者名號序世尊初以三乘誘引眾生聲聞乘其一也聲聞見苦斷集脩道證滅有四果四向之殊而以出三界為極證也雖曰出三界其實不離三界特以見思惑斷諸有結空不隨三界惑結受生故謂之出三界也三界雖出所證雖極然猶未知所以求佛道而度眾生挍諸大乘政墮偏小故世尊復假彈斥使其回心至法華開權顯實有汝等所行是菩薩道以佛道聲令一切聞等語始得授記始契如來之本懷今夫所謂五百尊者隱顯於石橋方廣者疑皆得記之儔也吳門雲隱菴清上人甞覽勝于天台石橋復集五百名號為卷于其菴以備誦禮求敘其由於卷端余忝習禪於教莫之考向粗為小大之辨者意令學佛之流直趣上乘毋循偏小之轍耳然世尊初則誘引次而彈斥終乃開顯其化之序若此今余作是說者於世尊反耶合耶機應隨宜行者自擇送德藏主序人莫不知學而莫知所以求道學不至乎道非學也有世間之道有出世之道出世之道又有小有大有淺有深有權有實苟不至乎究竟之極非吾所謂道也故學者不患不詣其極患其志之不逮耳志逮矣又患不得其所師得師矣或未至所詣而中道相失則必轉而他求他求而未至則又轉轉而他求焉是以古之人無常師無定方不至乎道不已今夫困一隅而局於一師之所得者可謂求道哉清江靈峰寺德藏主溫恪粹美有大志早從孤雲高公通內外學輩類推服泰定甲子余自集雲將復歸天目過清江別孤雲而始識之孤雲卒德東遊侍竺田翁於澹湖翁未幾遷冷泉亦卒德遂謁金陵諸大老而司藏於鍾山所從所得日益不少矣伯生學士虞公嘗見而奇之昔孤雲字之曰吾心虞公謂吾心似犯竺田諱乃大書道林以易之今年秋入浙訪余松江萬竹間考始識至今十有四年矣扣其學則非昔人矣而猶戚戚以憂其所未至訴師友之乖喪痛藂社之搖落詢所往所至於余余曰子可謂善求道矣今子字道林以道為林何往而非藂社以林喻道何道不備於子矣子返而求之有餘師首楞嚴經會解序首楞嚴經者諸佛之慧命眾生之達道教網之宏綱禪門之要關也世尊成道以來五時設化無非為一大事因緣求其總攝化機直指心體發宣真勝義性簡定真實圓通使人轉物同如來彈指超無學者無尚楞嚴矣釋其名則一切事究竟堅固即所謂徹法底源無動無壞而如來密因菩薩萬行靡不資始乎此而歸極乎此耳考其所詮則談圓理以明真性開圓行以示真脩其性也體用雙彰其修也果因一契原始要終了義之說也良由諸修行人背真向妄不成無上菩提或愛念小乘得少為足或欲漏不除畜聞成過故阿難以多聞邪染為緣浚發大教而世尊首告之曰一切眾生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉又曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路斯一經理行之大本也歟由是破七處攀緣別二種根本因見顯心因心顯見雖心見互顯而正顯在心如以盲人矚暗喻見非眼屈指飛光驗見不動印觀河之非變比垂手之無遺辨於八還擇於諸物非舒無縮無是無非使悟淨圓真心妄為色空及聞見耳既悟妄為尚疑混濫故又破自然因緣示見見之非見合別業同分指見妄之所生且以一人例多人以一國例諸國總顯器界根身同一妄耳自淺而深自狹而廣雖多方顯妄而所顯惟真則又舉陰入處界廣及七大融會入於如來藏性使悟物我同根是非一體妄無自性全體即是凡十界依正之相皆循業發現而已既悟即真尚迷循發故又答山河大地之難深窮生起之由譬虗空不拒諸相發揮顯真妙覺明圓照法界一多互應小大相容即體即用非俗非真至於離即離非是即非即則藏心妙性不涉名言矣復引照鏡狂走喻妄無因結責多聞勸脩無漏通而言之皆圓理也理解雖圓非行莫證故又明二決定義初審因地發心伏斷無明為脩行之要次審煩惱根本意擇圓根為發行之由於是定六根優劣令一門深入擊鐘驗常綰巾示結陳二十五聖所證法門勑選耳根為初心方便而又教以攝心軌則安立道場遂聞四重律儀頂光神呪通而言之皆圓行也乃至由三增進成就五十五位真菩提路雖談證位未盡行因下而戒業習於七趣情想防禪定於五陰魔邪無非行門之事必期於圓滿菩提歸無所得始得名為究竟堅固之證也然則依究竟堅固之理立究竟堅固之行脩究竟堅固之行證究竟堅固之理楞嚴教旨大抵如是是知教行理三悉號楞嚴了義之說莫此加矣科經者合理行為正宗離正宗為五分一見道二脩道三證果四結經五助道謂見道而後脩道脩道而後證果此常途之序固爾究論上根脩證如發明藏性之後謂不歷僧祇獲法身請入華屋之前謂疑惑銷除心悟實相之類又豈局於常哉大哉教乎夫欲發真歸元明心見性者於此宜盡心焉然是經無教不收無機不攝或言偏意圓或名同體異昧劣之士有所不達弘經者思所以達之從而為之解自唐而宋解者凡十餘家始余見長水璿師孤山圓師溫陵環師之說又閱吳興岳師之集併得資中沇真際節檇李敏興福慤諸師之意無不大同惟所見或各從一長乃不能不小異致使行者泣岐莫辨良導則不達之患不在彼而在乎此矣今余會諸家要解以通大途異不公乎眾者節之異而互通者互存之互為激揚者審其的據而取之間有隱略乖隔處則又附己意目為補註若合殊流同歸于海故謂之會解噫道本無言非言不顯佛不得已而言矣言有不達道無以明則諸師之言亦不容其自己也言既多而不同去道轉遠則會解者又豈容其自己哉解既會矣庶幾覽者因會解以知人之言因人言以知佛之言佛言知矣究竟堅固者得矣曰行曰理曰教曰禪曰達道曰慧命皆剩語矣況所謂解與會哉時至正二年壬午佛成道日述於姑蘇城中之師子林說石菴說松陵砥知客以石菴號徵余說余恠而問之大隨木菴刳木為菴也石頭草菴結草為菴也子之石菴何謂耶坐列頑石如生公之講臺耶壘萬石為環堵如石樓石堂石軒之類耶就石山而鑿闢之為棟為宇為柱為壁為戶為牖為床座器物皆石耶愛其堅頑非若草木之易壞耶然則攻堅擊頑其成不難於草木耶不然則神力運為若飲光入定之石室耶又不然則天造地設若空生宴坐之巖屋耶砥咲而答曰石菴豈若是哉吾習華嚴教觀今吾石菴法界之異稱也菴而石理法界也石而菴事法界也石即菴菴即石理事無礙法界也隨所有物無一物而非石菴事事無礙法界也法界之旨既彰則總別異同成壞之義存焉達是義者指一塵一沙為石菴非狹也廓十方虗空為石菴非廣也離羣而索居非一也三世如來無邊開士下至仙人鬼畜林林然雜處其間非多也其一多相融廣狹自在既非造作神力之所能致又非飲光空生之所能知石頭大隨可同年而語哉余聞而驚且喜遂筆是對以為石菴說焉誠菴說誠也者信之極也信而至於誠則大本有所立而道可成矣誠之極為至真為至純為至常也真之至故無妄純之至故無雜常之至故不息無妄者誠之存乎理體也無雜者誠之形乎事相也不息者誠之應乎妙用也以其理體之誠故大而天地細而塵毛罔不由之而建立以其事相之誠故虗空法界萬象森羅交互而不礙以其妙用之誠故幻化往來始終生滅變現而無窮於是吾佛世尊體是誠而成等正覺十方菩薩推是誠於六度萬行其世間法曰脩齊平治亦以意誠為大本也至是而誠之為義也博矣今以誠為菴則微塵剎海曰聖曰凡同一門而出處也以菴為誠則墾土誅茅運薪汲水竪拳竪指之類皆自性天真之道用也然則誠菴之稱亦豈易得者哉信上人其勉諸雲海說余嘗從幻住翁徙倚于獅巖之立玉亭是時也夏氣清和朝陽如月俯視臥雲一碧如海遠近數峰出雲上如落帽如浮履如虗舟縱柂于銀濤之間相與歎曰異哉雲海也未幾卷地以起若萬騎長駈復變而為奇峰為玉樹為遊龍舞鳳又未幾欲覓絲毫不可得矣有客趍進而言曰今吾觀雲海之幻始知萬物之多天地之廣皆一雲海耳翁曰子知幻之為幻而未知非幻之幻知非幻之幻而未知所以為非幻者且聚而為海者雲也變而為多物者亦雲也其所以為雲者何物邪客罔對退而賦雲海一章余嘗永歌而和之極一時領悟之勝也嗟乎時異事殊翁往矣余與客亦四方矣知余心之所感者幾何人矣高昌沙門有字雲海者解后吳臺求一言以訂其字因惻然引聲以告之曰嵯峨萬仞兮西峯金毛一躑岩穴空天荒地老影迹絕千崖萬壑悲秋風向來謾走東西覓芒鞋踏斷無消息歲晏江空道路寒狐兔縱橫滿荊棘誰能為我重登萬仞之嵯峨松根共掃苔花石煨芋爐兮霜葉之烟沸凡鐺兮雪眼之泉招海雲於四野誦雲海之陳篇海為雲兮退藏于我室雲為海兮遍覆乎山川道人晴雨總不管坐看雲海變化而升遷佛法爛却不怕三千年斷崖說裂破虗空之謂斷壁立萬仞之謂崖飛鳥不敢度歸雲不能栖觀者駭目聞者酸心此則巨靈擡手擘太華俱胝一喝開石巖之類是也一念不起之謂斷卓爾獨存之謂崖掃除見解直示根源通一線如陷虎機截羣疑若吹毛劒毫厘有差天地懸隔此則臨濟德山棒喝之機是也絕學無為之謂斷躋攀無路之謂崖拶破死關透縵天網如師子子自解翻身不施棒喝機緣不墯語言塗轍使德山臨濟湊泊無由巨靈俱胝瞻望不及此又天目斷崖翁之妙用是也翁甞舉斷崖之義以難余余將推是義以解之言至是翁遽起而却曰謗我也罵我也請止而勿言遂止清隱說昔者有客過余而言曰塵汙之膠膠人境之擾擾何時已耶僕將遠累染踈交游以求清隱之歸可乎因問之何謂清隱曰孤峯獨宿茅舍深居一棹烟波萬松雲屋非古人之清隱乎余曰噫子泥其迹耳余所聞者異乎是請試論之有真空之清隱有幻有之清隱有絕待之清隱真空者不與諸塵作對不與萬法為侶真如淨境界一泯未甞存也幻有者譬諸鏡像水月像之在鏡外累不足以干之清也即鏡求像像不可取隱也水月亦然斯二者雖無所著然猶有所待也絕待者空而不空不空而空有而不有不有而有清隱在其中矣子如知此則同流合汙未甞非清也儼臨萬眾未甞非隱也是之清隱尚不泥乎空有況其跡乎客曰旨哉清隱吾聞命矣謝而退今海鹽志禪人以清隱需余文余絕意文字久矣因舉昔之語客者語之高泉說余與訓道林游冷泉道經玉泉觀魚山雨忽至遂入靈峯寺寺僧彌上人字高泉留坐巘雲深處引紙索高泉說因與議曰泉之在山者為奇在山而高出者尤奇高出而能流通足以惠世澤物者為全奇然在山之泉固多而求其全奇者常少冷泉玉泉非不奇也不幸而不高入西湖以載歌舞瀦方池以泳鱗𩮻斯豈足以盡其用哉谷簾之在匡廬非不高矣而陸子謂其宜茶釀泉之出琅瑘非不高矣而歐陽公謂其宜酒飛流直下三千尺李謫仙狀高泉之形勢也溪㵎豈能留得住唐先德指高泉之趣向也此二者一投于江一達于海皆未足以全其奇也吾氏法華有謂鑿原求水者則又託高泉以喻求道之方而非實有其泉也今子高泉於是數者奚取焉彌曰乃所願則在鑿原也於是道林欣然語余全奇在是矣請書以遺之絕聽說吾里人聞書記以絕聽為別稱庚辰秋會于徑山請為著語余曰此方真教體清淨在音聞聽也其可絕乎眾生迷本聞循聲故流轉聽也其可不絕乎盖聖人以言顯理俾聞者思而脩之徒畜聞而不務思脩則迷本循聲其過非小是有絕聽之義焉絕聽之義有淺有深其淺在脩其深在性脩有功用而性無功用也若夫旋聞脫聲忘言入理一根返源六用休復斯則絕聽在脩非若丹霞掩耳於戒百丈被喝而聾之絕聽也根塵既銷空覺圓淨剎剎塵塵皆吾妙性而塵說剎說無一聲不由性動無能聽者無所聽者斯則吾性本然自絕之聽豈若鉄牛不怕獅吼石女不受雷驚之無情絕聽哉雖然余又聞之昔大樹緊那羅王絃歌一奏震撼大千須彌為之涌沒然則無情亦能聽邪無情能聽其將何自而絕邪此非余敢僭言須當人自著一語英山說山類人其氣質容表萬異或恠或奇或嵌乖凹凸擁腫瘠削各隨所稟而然耳以容表言之草木不生者曰童山生而蕪穢者曰荒山有佳木異卉暢茂而泉幽石奇者曰秀曰華華而秀世或稱為英山也英之稟乎天者其質必深厚其氣必豐盈然後有以致之也山固類人而亦有所不能類者人有脩學之力存養之功充道德於其內則見乎外者睟面盎背而又文章刑儀日益著顯是能自致其英者也苟不思自致而且戕其所稟則曰荒曰童者至焉是皆人而天也豈山之事哉宜興秀上人聞是說乃再拜請曰愚號英山是有訓焉幸惠愚以自儆故為之書無念說雲居思菴主以無念字義質於余余謂無念有三怒雷震地山嶽驚泥牛之耳不掩白刃揮空鬼神泣木馬之睛不搖此頑冥之無念也萬仞崖頭撒手銅沙鑼裏盛油把定要津風高水急掃除行迹路絕門懸此坐斷攀緣之無念也一心不生萬法俱息前後際斷生死情忘此心空之無念也如是三者子將何所居思曰不然吾一念之間具含法界非心空也萬有交參羣機並赴非坐斷也木馬舞三臺泥牛鬪入海非頑冥也如月影之落江海淺深一無所擇如蓮花之出水泥垢淨二俱不著寂而常照作而不為以是為無念可乎余乃竪拳示之復展手示之思罔措一咲而去春谷說道之在人猶春之在谷也然世有議鄒衍吹律寒谷回春者或曰人心之所感或曰天時之偶然惟天與人莫之辨又議寸土含春性則曰谷吾體也春吾用也又議陽氣發來無硬地則曰春為體也谷為用也惟體與用亦莫之辨余甞有偈云有脚陽和帀地行空山習習暖風生不知裏許誰能聽呼一聲來應一聲議者又曰此一多相即小大相容之春谷也如是春谷在一沙一石一草一木則草木沙石皆一春谷也充而至一國則一國春谷也徧而至於微塵剎土則微塵剎土為一春谷也其相即相容之義愈莫能辨也武林和維那字春谷余為之泛舉若此和其辨之文江說廬陵東下有水曰文江深廣而寬平行四十里不屈折其上流則章貢二水出十八灘與永新太和諸州水會悍怒鬪激勢不可禦至是而始解瀾波游揚不疾不徐有自得之貌夫是之謂文江也父老相傳古之相地者讖曰文江深秀必世有道德之師忠良之士出焉余甞考自唐而宋禪林宗匠有青原思士有歐陽文忠公宋末則有文文山數百年間如是而已何深秀之讖不多驗耶然道德忠良之性根於人其誰不有異僧偉士亦何代而不生向之所云特舉其傑出而名世者耳湖之道場山郁藏主與余同生廬陵而自號文江當藂社搖落之秋異鄉解后因復舉文江之讖以相勗云東洲說中吳有號東洲者海上人也余甞詰之曰環須彌山有四大洲其東曰勝身南曰部而部一洲西東廣二十八萬里計其間隔越而為小洲者不知其凡幾也故洲之在東而國名震旦者是又南洲之東洲也今汝居是而以是為號乎曰否乃復詰曰積水之謂海海中可居之謂洲當濤山浪屋瀰漫淘湧之際而能使濟者得其所託居者得其所安則洲之於海為惠多矣以人心喻之其境風識浪交相扇鼓而舂撞激射之情漂蕩淪溺之勢險迫憂苦莫可具狀必有善濟者濟之使得其所然後憂者以喜苦者以樂險艱困迫之患無自而至矣今吾佛吾祖之教自西而東即其所安以濟之其為惠也不既多乎然則汝之名非積水之海也自心之海也汝之號非勝身震旦之東洲也自心之東洲也汝之志必將思以自濟然後思以濟人以是之義而號東洲乎海曰唯余嘉其志故錄是說以贈之令勿忘其所唯者焉記吳郡慧慶禪寺記姑蘇城西五里許松林柳涇暎帶如𦘕有重閣廣殿飛出林杪與西山爭高者慧慶禪寺也寺視他剎雖不古而化聲藉藉緇白歸之如市者普菴禪師之化也初普菴振化於袁之南泉山道場之盛甲天下沒世雖久揚揚有靈凡官民旱潦病橫與夫拘忌營搆之事咸禱之厥應如響皇元加贈大德慧慶禪師歲時香幣與民施交委食無寸壤居徒常數千人江湘淮漢之間其化殆遍獨未至於吳其至有待於時邪亦必待人而後行邪延祐甲寅春南康無瑕沙門宗𤧚訪道至吳門誦寒山夜鐘江楓漁火之句惻然有感于中乃謀結菴以延游錫且以奉禪師郡人金國寶首率財營地相其成戶屨日滿日持鉢以餉之閶關驛道濵長河民苦泥淖𤧚募眾以甓之橋之圮者新之凡利人之事靡不為為必徼靈於普菴江艘海舶有獲冥應而脫風濤者至則拜普菴為更生由是施者翕然遂建無量壽閣以祠佛及五百尊者像閣後為普光明殿普菴之像居焉殿後為大莊嚴閣像盧舍那佛及五十三參敞其下為演法之堂繕治方殷而𤧚告寂實至順庚午七月一日也其徒法智繼其志夙夜靡懈規制日益增廣元統二年奉帝師法旨賜以今額眾以寺未具體咸願輸力於是比丘法營三門達信營觀音殿蜀人楊善卿作外門疊石岸河以接通衢松江府判官澤之曹公作輪藏之殿宣讓王施銀鈔五千緡助建栖僧之堂從而鐘之樓香積之厨旃榎林庫堂行堂兩廡方丈皆以眾力次第成復創塔院於寺南之蓮華峰榜曰歸真中為三塔同室異竁僧俗皆得以藏焉寺之體至是具矣智請於余曰先師遺誡在延接凡百仰于施甲乙度徒而繼席者從眾所推不以其次進法智非才不足以繼幸而有成普菴之賜也懼來者昧其本願為我記之余謂世尊以正法眼藏涅槃妙心付摩訶迦葉凡廿八傳至達磨又十傳至臨濟臨濟十三傳為普菴普菴以臨濟峻機大用陶鍊學徒不歷階梯深達佛祖堂奧此其化之大本者也彼弭灾救患應禱於有為功用者餘事也今慧慶有其居矣有其眾矣當務大本以率以訓使人人發真歸元同悟普菴之自性然後隨方建化各顯自性之普菴上以壽聖躬下以福黎庶則異時宗嗣之昌法幢之固化聲之大豈如是而已哉善惠菴施茶田記吾佛之致滿足菩提者以其不捨一法以其無一法非濟人之行也故凡學佛之徒見一行足以濟人必勇為之然行有鉅細濟人有緩急架舟梁樹宮剎捨頭目髓腦其行固大矣有以一勺之湯一啖之茶活人於道路者功或倍之是盖濟其急也吳郡閶關西瀕河為路負者戴者轡者纜者奔蟻縱橫於臂交趾接之衝每歲夏秋暑酷行塵𦦨飛河波沸濺焦渴瘏痡枕藉而暍死者有之至大戊申善惠菴沙門慧持請于有力者作亭菴外鑿井其下歲募茗藥及是時汲清煑香手給其施由是德其惠者不可勝紀延祐間持沒善達繼焉迄今二十年矣忽語人曰吾銖求黍乞勞不敢恤嗣吾來者或憚其煩而廢之將若何於是有感其言者欣然相率施以田若干且議曰田籍于菴米別貯毋公私互濫歲會其餘積以備旱澇如是則用有恒產雖千載無足慮屬余文記諸余曰噫自濟易濟人難濟人者推己之餘易求諸人難求人以濟人者暫易持久難今夫以茶湯濟人雖一至微事然平生扣謁𤨏屑志不少衰既能守鮮終之戒又挈挈為悠久謀苟非具學佛知見其肯以無厭之勞不報之施累其身復累其後於無窮世乎後之覽者知濟人之行不可不為知滿覺之道一法不可捨必有感於此而奮發於此故不辭為之記普應國師舍利塔記至治癸亥秋先師中峰和尚寂于西天目山之師子巖弟子建塔于巖之西奉全身葬焉天曆二年奎章閣學士虞集奉勑為塔銘名其塔曰法雲元統甲戌今上皇帝賜號普應國師并賜語錄入藏勑藝文監丞揭傒斯為之序其道行機辯宗法授受出處建化之跡累朝錫賚之重槩見于銘與序矣是年之冬杭州七寶山雲居禪菴別為塔一成用藏遺髮舍利即塔為祠巖肖像以供事之住菴沙門指月謀記其由於石謁余曰初國師不願處俗父母患之鄰有故宋宮人楊氏妙錫奉老子之教為女冠識師非凡器乃喻其父母令出家及祝髮又助僧牒衣具而求其所祝之髮少許貯以香函供之淨室越數年有舍利生於髮久而益多積至五十餘顆五色晶熒觀者駭異楊自是易所學以學佛既老遂以舍利託雲居盖有意焉且雲居之創也叨國師化力未有以報願因楊氏之遺以紀靈瑞以告夫菴之子孫云余謂國師紹臨濟垂絕之宗大唱其道普應羣機薄海內外風馳霆震自吾徒以及異教上而王公士夫下而街童竈婦均佩其化相率躋于聖賢之域其應之普之大若此若楊氏以信慕之機而獲舍利斯特冥應之一小驗耳烏足記哉覘月之意將使來者觀小驗以發其大機是又不容其不記也靈雲銕牛和尚行業記師諱持定號銕牛生於吉安之太和州磻溪王氏故宋尚書戶部侍郎贄九世孫也自幼絕葷茹清苦剛立有塵外志而世緣奪之咸淳庚午時年三十有一謁永新西峯寺肯菴勤禪師剪髮聞別傳之旨情累釋然尋依仰山雪巖和尚居槽廠服杜多行巖示眾有云兄弟家做工夫若也七日夜一念無間眼不交眨無箇入處斫取老僧頭做舀屎杓師默有所領勵精奮發巖令為眾持淨眾患痢委身事之未幾師亦有疾疾革醫謂不可乃取一觸桶就屏處危坐其上藥粥漿飲一皆禁絕單持正念目不交睫者七日第七日夜將半忽覺山河大地草木藂林徧界如雪天明月下堂堂一身乾坤包不得久之如聞擊木聲驚醒徧體汗流其疾亦愈踴躍自慶不已實癸酉年六月廿四日也旦詣方丈舉似巖巖舉公案詰之酬答無滯復示偈曰昭昭靈靈是什麼眨得眼來已蹉過廁邊籌子放光明直下元來只是我至元戊寅命為僧付衣偈曰無相福田衣我今付與汝悟明心地後如龍吐甘雨自是隨大僧歸堂脇不沾席者又六年一日聞上堂舉亡僧死了燒了向甚麼處去自代云山河及大地全露法王身言下疑情蕩盡身如踴高丈許眾退即詣方丈曰適來和尚舉揚般若驚得法堂前石師子咲舞不已巖云試道看師云劫外春回萬物枯山河大地一塵無法身超出如何舉咲倒西天碧眼胡巖敲面前卓子云山河大地一塵無這箇是什麼師作掀倒勢巖咲曰一彩兩賽及入室問曰親切處道將一句來師云不道巖云為什麼不道師拈起手中香合子云這箇得來不直半文錢巖云多口漢巡堂次師以楮被褁身而睡巖召至方丈厲聲曰我巡堂汝打睡若道得即放過汝若道不得趂汝下山師隨口答云銕牛無力懶畊田帶索和犁就雪眠大地白銀都盖覆德山無處下金鞭巖曰好箇銕牛也因以為號一時行輩靡不推服至元廿五年戊子游方至衡陽之酃縣過桃源山愛其幽深乃有栖遯意山舊有寨頑悍之徒負其險而聚保之及遭兵變遺骸枕藉蛇虎鬼魅縱橫出沒往往為民害行者凜凜畏避師束茆為廬與二三禪徒居之雨霧晦冥之夕鬼獸圍繞嗥呼師舉迷悟因緣諭之授以戒法羣恠遂息酃人素昧禪學聞者驚異縣達魯花赤伯顏公縣尹陳公首相率入山拜跪問道從而貴豪暴慢之士皆屈膝執弟子禮四方禪笠踵至廬無以容桂芳尹公施地廣其基德祥叚公父子倡眾以建寺捨田以飯僧寺成榜曰靈雲眾益至師考鼓伐鐘升堂入室大唱雪巖之道其說法也不尚奇峻務直截提警而已其行百丈禪規也不及浮繁懼廢學者之工程耳其勵眾也不事虗語以身率之勇於進而悟機將發者必晝夜陪坐以守待之及乎勘辨印可則痛棒熱喝無少假借其真切為人也如此貧者助其浣紉病者手餉羮藥雖庸夫愚婦必隨機導誘各遂其所求作屋寺西曰西菴後為普濟塔拾林野遺骸聚藏焉鄉鄰死無所歸者皆得以歸之其弘慈利物又如此大德壬寅冬手書長偈示眾其末曰塵世非久日銷月磨桃源一脉三十年後流出一枝無孔笛吹起太平歌明年春將示寂侍僧求別眾語師曰吾別眾久矣恬然坐逝遺命火葬眾弗忍函全身於陶具迎奉于西菴越三年啟視坐如生爪髮俱長泰定甲子塔于寺北三十里曰沙潭師生於嘉熈四年庚子八月十一日寂於大德七年癸卯正月十五日壽六十有四僧臘二十有六度徒弟正悟等八十餘人嗣法匡徒者洪之般若世誠瑞之南山志清潭之皇慶克紹白鹿思念韶之南華智規江陵之資壽福越也師與陡崖戒公魯山慧公生同里剪髮剃髮同師同得法為法昆季陡厓開山於永新之六字峰距靈雲二百里化風交扇衲子奔趍往還時號二甘露門也師歿迄今已三十六年其徒智涇走江浙將求當世名公銘其塔會余華亭示語錄一卷及出處顛末命述其行余謝且遜曰陡厓和尚吾受業祖也師吾叔祖也尊卑之分懸殊何敢聞命涇公曰先世行業子孫顯揚之禮也不可辭於是焚香頓首受而述之如前云銘上天竺寺如菴法師塔銘錢唐上天竺寺為天台教宗凡其宗之講學規制與夫稟法為大名德師表者悉繇之而出有事於會同迎謁則位在禪律諸宗之上又有觀音大士揚靈以振其化是為江南第一勝道場非道德才智之師不稱其位近代若如菴法師者厥惟稱哉如菴華亭人受業化城永壽寺今化城住山景福其高弟也遣其孫師訓來曰先師處方外五十餘年四會說法至于上竺乃復歸受業而終顧尚有意於其子孫邪襄奉粗畢惟塔未銘幸賜一言以銘之余閱其狀師名淨真字如菴族沈氏母朱夢明月從海而升墯于懷覺而有娠生而瑞光滿室識者奇之曰此兒非凡器夢月升海者海月都師之再來耶九歲依化城明靜法師志公出家授以法華歷耳成誦十六為僧受具博究諸乘宿慧頓發毅然以性學自許首謁雲夢法師澤公於廣福及遷延慶遷演福皆從之典賓綱眾服勞既久惟心法未盡底蘊時無極法師度公化聲大振遂造其室朝夕咨扣盡其學眾咸屬望謂大教之託在是矣雲夢卒柳塘權公繼其席擢師為第二座大德間出主海鹽德藏說法為度公嗣時寺幾廢師奮力扶樹眾之散者聚田之奪者歸仍割己儲營法華期懺事迄于今翕然至治改元遷華亭超果復捐長資募搆萬佛閣泰定乙丑行省丞相脫驩公兼視宣政院事舉住下天竺上章以營搆未備辭而疏幣交至強其行諸大方麟鳳爭願出席下居七年講貫不倦得旨決者眾矣寺之門舊臨㵎㵎之南逼於巖巖下之逕迂且小師命闢之高其門大書佛國山以揭之至順辛未上竺湛堂澄公以老乞閑舉師為代官命率諸山迎居之先是師以疾晝𥨊夢白衣大士持金瓶水灌其口曰汝勿憂非久當愈因扣以未來休咎復云汝却後二年當避喧於大樹之下夢覺疾果愈竊自疑避喧樹下非入滅之讖乎暨至上竺見寢堂西偏有大樹堂有扁曰靜處始悟前夢由是大開法會去來會學常數千人帝師聞而嘉之賜以金紋之衣佛心弘辯之號平章同同憲使鄧公諸達官皆折節從之游時謂辯才法師後未之多見也師臨眾簡嚴不妄言咲每夙興默課法華暑寒不輟翰帖酬應運管若不經意人得片紙半櫝輙秘之癸酉冬預知時至不以諭眾命扁舟亟歸受業未幾示微疾留偈而逝十月二十二日也闍維得設利五色舌根頂骨不壞越二年乙亥十月某日奉遺骼於祖藏之側而塔焉世壽七十有二僧臘五十有六嗣法若干人徒弟若干人乃為之銘曰天台鉅宗天竺盛集匪伊人兮孰造其極異哉如菴應化靡測海月辯才誰今誰昔虩虩法雷杲杲慧日何燭非幽何啟非蟄歸藏故丘是訓是式子孫繼之有永無斁松石軒銘高麗國無外式禪師作軒于松岳山鵠峰之下扁曰松石西游會余姑蘇求為銘銘曰軒依松石名松石愛松非聲石非色石上之松說而默松下之石默而說當軒坐者無外式耳根久已忘喧寂視我非我物非物即一而三三即一一三俱遣無離即無外無中兩無迹枯木龍吟誰辨的天籟滿空明歷歷點頭自許機尤密劫波誰管仙衣拂取之不得捨不得今我銘之果何益為君隔海通消息瑚枝上扶桑日竹龜銘吳門隋義甫得一竹龜于市長四寸許觀者奇之盖斵竹象龜得其絕似而有可恠者首尾四肢凡六物由六竅見于外皆圓活動轉其腹則枵然反覆視之六物之貫于竅者兩端俱大而無容出入驗其體與龜身異固非就一身而斵出者又非有布髹假合之迹巧匠諦觀莫知何從而納諸可恠也龜之背負一竹架高不盈尺架惟二柱悉匾闊每柱為五竅貫以五物亦大其兩端如骨轆焉架之頂為一小塔其機竅轉活皆相似且不知其何所用者博物之士莫之考或疑仙術之戲耳義甫求余銘之余曰諸法從心生仙術不生於心乎生於心者其妙尚爾則心之本妙豈凡耳目之所能及而測識者哉然龜有知兆之靈今竹龜又一奇物得之者應有驗於他日也銘曰斵竹為龜六用有機或曰仙戲非人所為法由心現其機萬變妙入玄微世眼莫辨竹比君子以直以堅龜善靈應而享長年是皆吉徵之召宜隋卿得之而寶焉濟川銘若濟巨川用汝作舟楫此商高宗命傳說之語謂其有濟世之材也今華亭有字濟川者栖遲丘壑不苟利祿且有志于出世之道余以是知濟川之義不在彼而在乎此矣為之銘曰濟川維何言載之舟其舟維何惟己是求彼揭彼厲彼泳彼游情波怒搖我心則憂嗟我懷人聖賢之儔自濟濟他為惠必周春潮雨急野渡風休無住無著兩岸中流浦東西林海會寺鐘銘五金入爐金性融體成大器流注空脫略模範超神功之百尺凌蒼穹雲林之西雲浦東朝陽夜月天曈朧華鯨怒吼奔象龍聲撼教海喧禪藂醉夢者醒聵者聦酸楚是停塞者通聖賢海會吾道隆施福山積民物豐八荒萬歲歌堯風聽松樓銘受業觀山寺有樓曰聽松吾孫中和請銘為之銘曰曾樓在山清籟在松玄洲夜瑟華岳秋鐘客有善聽燕坐其中善聽維何匪聾匪聦聲性本假起滅無從一根既拔六用俱空空有不二心法互融如是聽者入妙圓通龍濟禪寺友雲禪師塔銘臨濟正脉自楊岐至圓悟大慧而愈昌既而大慧諸子橫翔捷出其最超絕者曰佛照佛照諸子最顯者曰妙峯凡一門數世雄據大方化聲交振而四海雷奔盛矣哉當是時獨友雲鍪禪師密領妙峰之旨退而韜晦于荒寂之濵刻苦以厲行乃若追復大梅懶瓚之遺風者何邪或者議曰夫名位化權之顯赫由時緣際會之偶然不可強也然亦有所本焉道德本也化權末也惟友雲患後之來者務齊其末而不揣其本於是去華就實躬行以範之故其所尚也高古其自律自奉也謹嚴而簡淡其垂示機語也不險不峻而痛切肺腑凡所以抑揚化法激寤來學使厚其本者切莫大乎此矣余少時聞是言輙知慕敬及長拜禪師遺像于螺山求其言行之詳而莫之考中抱缺如閱今四十年矣螺山宇郁藏主師之孫也慨禪師之塔未有銘訪余吳門師子林求為文以銘之遂欣然讀其狀師諱宗鍪友雲其自號也俗廬陵王氏宋嘉定戊辰八月三十日生自幼喜學禪坐世網不能羈年十二從寶壽院海室淙公出家授以經誦如素習十九薙髮受具二十二參方夏坐青原山冬上袁之集雲又二年由廬阜而淮而浙聞妙峰和尚闡化靈隱往依之峰峻拒以驗其志久乃得參堂勇憤自誓越三白如一日端平乙未佛涅槃日妙峰上堂拈主丈云釋迦老子來也諸人還見麼微妙淨法身具相三十二放下主丈云你諸人不會入涅槃去也師於言下豁然有所契悟矣後辭以歸峰識其意乃囑曰深山裏結箇茅菴去淳祐癸卯登吉水之東山佛頂峰捫蘿披榛得脩山主古寺基掃虎狼狐兔之跡以居焉木食㵎飲夙夜危坐或雪寒無宿火啖昌歜數寸度日甞口占以自遣云山僧有分住烟蘿無米無錢莫管他水似琉璃山似玉眼前儘有許來多繼是稍疏泉墾荒為田以自給舂炊樵汲皆躬為之久則為法而問學者至焉頑慢闡提之服其化者至焉輸財輸粟為僧而堂為佛而殿者至焉日闢日葺不數年矗然一藂席矣因襲舊名榜之曰龍濟清凉禪寺云石屏盧和尚自浙歸妙峰寄法衣竹篦并其肖像以付師峰自題其像曰妙峰孤頂草離離橫按竹篦三尺銕只許佛頂龍濟知父子不傳真秘訣其付授之的在是矣師甞書門以示來參曰除却眼耳鼻舌身意那箇是你自己若也道得許你親見龍濟來其或未然且居門外雪巖和尚見而問曰曾接得幾人師曰山僧從來不會按牛頭喫草有因歲暮而問曰臘月三十日到來時如何師曰門前無索債人其語似平易而意已切至人有醉心浮華習為狂妄或穿鑿機緣謬稱證悟者一見則魂消意解盖師之冷嚴質確足以感人者率如此也郡東螺湖橋廢師因父老之懇募架石以易之仍結菴以待雲水螺山道場是也忽示疾復歸佛頂緇白隨之者數百人既集眾囑後事復彈指一聲云只此是別眾語也侍僧請留頌不答至夜漏將二皷遽索筆書云一燈在望更無言說大地平沉虗空迸裂遂泊然而寂時至元丁亥七月二十七日也住世八十歲僧夏六十有一度徒繼武等若干人以八月一日塔全身于峰之顛云余於是從容語郁曰末法精進幢天下思見久矣惜余不能文姑述其槩而繫之以詞以俟夫後之作者焉詞曰濟北之道痛快活脫大用現前機先一喝子孫嗣之化有隆汙惟其道用隱顯不殊伊昔妙喜象龍濟濟一傳再傳妙峰崛起迨茲友雲雅趣高深大梅懶瓚千載同心末習競趍波頹瀾倒不有斯人孰識古道佛頂巖巖遺蹤絕攀巋然一塔下瞰群山金剛眼睛如鏡照像啟之者誰一燈在望勒銘螺岡用顯其光妙峰一脉吾將見其復昌
