body:
  text: 小師善遇編法語示用菴照上人佛法徧在一切處一切處不容尋討舉足下足菩提場認得分明還不是滿眼滿耳處沒蹤沒由沒蹤沒由處滿眼滿耳古人此等語言大似一手擡一手搦待汝自家瞥地慶快平生奈何千萬人中求一箇半箇覿體承當了不可得此無他欲明恁麼事須是恁麼人若是越格丈夫有移天關轉地軸底手段就銀山銕壁裏點開達磨眼睛向石火電光中爍破瞿曇面目拈起龜毛拂子吞却百億蘇迷盧倒轉兔角杖頭傾出無邊香水海有時遇賤即貴迦葉糞掃衣價直百千萬有時遇貴即賤輪王髻中寶不直半文錢到者裏方有少分相應既得相應方知三世諸佛歷代祖師與自己同一處安身立命既知佛祖落處方知佛祖用處既知佛祖用處方知宗門下神出鬼沒敲東擊西以句剗句以機奪機設平地牢關布縵天網子如金翅擘海如香象截流如師子教兒懸厓一拶乃至打草驚蛇據欵結案盡是將自得不傳之妙轉作為人方便信手拈來當頭破似空合空無一毫滲漏如鏡照鏡無半點誵訛如巨靈擘破太華山腕頭不費纖毫力始可稱為摟空如來藏拶碎祖師關底越格大丈夫也是則固是只如臨濟大師道有時先照後用有時先用後照有時照用同時有時照用不同時此四句中有一句指鹿為馬有一句按牛喫草有一句鬼門上貼卦有一句口縫未開說破了也你還作麼生定當若也定當不出切忌渾侖吞棗辜負先德埋沒己靈且將如上許多閑絡索拈向一邊只就本參事上密切體究一切時一切處猛著精彩看他是箇甚麼道理閑忙靜閙動轉施為畢竟承誰恩力政當體究之時不得墯古人窠臼不得受諸聖羅籠不得避喧求靜不得捨事就理前輩斥云死水浸石頭鬼窟作活計緣木求魚撥波覓水乃學者之大病也須是具辨龍蛇之眼毫髮不受人瞞用擒虎兕之手斯須不容放過勘辨既明把捉既定却不妨向塵勞世網中大抹高揮熾然作用亦不妨向語言文字上東咬西嚼傳唱敷揚著著是你得力時頭頭有箇出身路豈不見道大道只在目前要且目前難覩欲識大道真體不離聲色言語恁麼提掇得行挨拶得去忽然洗面摸著鼻孔當知照用四句空拳嚇小兒臨濟大師在汝脚跟下蹲坐吳門用菴照上人志明大法初苦咨參出紙求語不覺引起葛藤紙長未盡復說三偈以盡之一是句亦剗非亦剗臨濟滅却正法眼拍盲曾築大愚拳不識睦州會擔板二老婆心是葛藤窠佛法從來也沒多一揑虗空成粉碎眼前留得舊山河三真照無私用不虧同時先後不同時鬼家活計掀翻了氣殺曹州小𤺊兒示能大拙長老蜀中歸山拙到無可拙處謂之大拙纖毫拙不盡者到不得大拙田地此之大拙却非大巧若拙之拙亦非巧盡拙出之拙且非百不能百不會之拙仍非奴郎不辨菽麥不分之拙又非掘地覓天敲氷取火之拙者也今時大方宗匠為師為徒者一箇箇具大智慧具大機變拙之一字素不願聞若望其一到大拙田地盡恒沙劫不可得矣且莫說今時只如從上諸佛也到不得歷代諸祖也到不得天下老和尚也到不得凡諸學佛之流要悟禪悟道底盡其智能竭其伎倆都到不得則上座作此等批判具此等見解莫說到不得夢也夢不見在如今大拙能長老若必欲名實相應親到者箇田地須是先將諸佛諸祖併許多到不得底老凍儂束作一束送向千山萬山青松白雲半間草屋之下深深掘箇地爐就冷灰底一窖埋却莫留絲毫影跡莫露絲毫氣息却不妨向冷灰之上燒糞火煨芋頭飢則噇教飽飽則信步行徤則盤膝坐困則伸脚眠拚取一生殘性命只恁麼絕學無為拙將去拙去拙來拙到無可拙處忽然蹉脚踏翻冷灰觸著佛祖鼻孔同時打箇噴嚏起來道如今埋沒我不得也那時曰巧曰拙未免掩口一咲亦未免遙向三千里外痛罵老拙一頓在示如維那苦樂逆順道在其中此乃龍門和尚赤心赤膽痛為學人警䇿之語也蓋世間境緣非苦即樂非順即逆盡大地人遭他籠無出頭分故學道之士往往因此四種退失初心喪壞法體者亦不為不多矣原夫曰苦曰逆只是箇不如意底境界能使人起憎起嫉起怨起惡如值冤讐多方迴避如遭繫縛百計求脫引發種種煩惱將一片道心等閑颺却曰樂曰順只是箇如意底因緣能使人起愛起貪起染起著如嗜醇酒不覺沉酣如貪宴寢不覺睡著轉入轉深將一片道心等閑忘却却不知樂是苦因順為逆本四者相依互為出沒皆世相變遷之常事耳不應遇順樂則生欣逢逆苦則反欣為怨怨欣取舍鈎鎻連環道念何從而在哉當思樂緣苦境亦不偶然總是宿業所招繫乎定分不容苟求而得苟避而免也又當思遇苦遇樂雖屬定分然亦浮幻不實暫有還無以智眼觀之妄起妄滅如樹頭風如谷中響如空裏華耳於吾道何所礙焉間有知是世相知為定分知屬浮幻底向閑時冷處也說得圓融儘有主宰及乎真境現前依舊分踈不下擺撥不行總而言之只是見地未徹劄脚未穩道念輕微故爾道念者何了生死明大法之念也其真實以是念橫在𮌎次間者如握金剛王寶劒萬丈寒光威凜凜地聖來凡來恨不得一揮百雜碎當此之時處佛國天堂不見其順樂居魔宮虎穴不見其逆苦又有甚麼利便不利便如意不如意處可得而分別哉近時參玄上士雖於逆順門頭具得隻眼又或被一種虗名聲閑學解當頭瞞却殊不知此等作為也是道在其中始得苟非道在其中直饒學解過人聲名蓋世亦未免遭先聖呵斥以為癡狂外邊走埋沒祖師心可不畏乎莫若屏絕外緣單存正念𢬵取窮徹骨苦到底守卑微於萬人之下更𢬵取唇生醭舌生毛一丁不識百事不能只恁麼捱將去異時驀忽向垃圾堆頭拈出一句半句驚天動地其聲名腥薌自不容其掩矣倘或不然則依前被苦樂逆順穿却鼻孔去也其中何道在之有哉示樂真居士狄同知吾佛世尊之道如杲日之在中天光無私照照無不覩初非恠詭僻異之術亦非險峻幽深之事蓋其立言垂化原始要終無非教人為善而已為善者何治心而已治心者何捨邪從正而已心也者從古逮今聖凡貴賤一切生靈之所共稟者也充而論之天地以之而建立陰陽以之而運行風雨晦明以之而變化草木萬類以之而發生其於人也在眼為見在耳為聞在鼻為嗅在舌為甞乃至俯仰折旋行住坐臥一靜一動一語一默喜怒哀樂之情取舍向背之行皆心之所為也窮其神妙如經所謂現寶剎於毛端轉法輪於塵裏擲大千於方外納須彌於芥中百千三昧靡不由之而變現也心體本一惟於應事接物之際或失主宰遂有邪正真妄之分焉真心者何本來清淨無所汙染本來解脫無所繫礙妙應隨緣縱橫自在之謂也妄心者何由迷真覺隨念變遷識想紛飛根塵膠擾而顛倒錯亂靡所不至之謂也譬若鏡焉本體明淨胡來胡現漢來漢現妍𡟎萬應毫髮無差或不能護其本真而汙以妄垢日積日厚則本明本淨者隱矣既有妄心則所趨所為悉名妄業既有妄業則有妄報業報相隨若形影之不相離然則三塗五苦生死輪迴不可得而免矣究其背真向妄一至于此倘無治法則其害何窮是故吾佛思所以治之演出一大藏教曲垂種種方便者皆去妄就真之法也亦猶磨鏡之方藥焉使其日治日磨垢盡明現而後已苟知治心如治鏡則人皆可使為聖賢之歸使人人為聖賢之歸則吾佛治心之道豈恠詭僻異之術險峻幽深之事哉世之昧者或主乎先入之言局於一偏之見不能刮目佛書留心佛道既不知信而反見謗是猶盲者之謗日孰能加損於無私之照哉自佛法流東以來受其惠者盈天下爾後時殊事異法久弊生依文解義者多力行脩治者少是以達磨一來掃空陳弊直指人心不立文字貴在機先言外脫體承當謂之教外別傳極其省要痛快者也自此別傳之宗布滿海內而名公鉅儒亦皆幡然從之如裴相國張相國白侍郎柳刺史楊內翰楊次公趙清獻公富鄭公黃太史蘇翰林輩皆不離富貴功名文章事業而能發明直指之道氣吞佛祖聲撼乾坤豈非一生取辦而千古慶快者哉今廣平西村狄相公亦深信吾宗者泰定乙丑丙寅間余寓吳門幻住菴西村丁母憂廬墓於閶關外其孝行盛稱于時余甞為撰廬墓序多引儒典之言而西村以佛法見問余乃許之曰他日為西村言之未晚也由是燕鴻南北曠不相聞者十有六年矣近余重到幻住而西村亦自京還年登五十富貴方來忽出長紙二幅求語進道舉向來相許之言似索余之宿逋也然我宗無語句亦無一法與人惟在乎自參自悟自得耳其自參自悟之方先須照破世間虗名浮利恩愛豪華萬境萬緣同一夢幻次須痛念流光如箭時不待人生死岸頭無本可據然後將宗門中省要處念念提撕政當提撕之時於脩身齊家聽訟治獄禮樂刑政之宣行案牘簡書之酬酢總不相妨總是下手得力處果能如是功不浪施念無虗棄驀忽剖破藩籬摸著佛祖巴鼻豈復讓於裴張蘇黃輩哉今西村之索我者我已償其逋矣發明直指之道吾亦有望於西村他日重逢吾將索公之逋也公當力行之深造之示真殿主僧問趙州如何是佛州云殿裏底此一轉語輕若遊空絲不費纖毫氣力快若吹毛劒掃空萬別千差從上佛祖到者裏石火電光把捉不住正法眼藏到者裏瓦解氷消提掇不起十方空索索一法不當情無粘不解而無縛不除矣近代學語之流不識古人舌頭落處見他道箇殿裏底便乃橫生擬議或謂佛是觸目現成有情無情同一覺體或謂佛是惟心所造木雕泥塑能顯法身或謂此是傍邊指點聲前意外別露真機或謂此是格外提持即相離相而非離非即點檢將來都是錯會既是錯會未免粘上增粘縛上加縛帶累古德靈妙之言翻成戲論豈不是屈事直饒離却如上錯會別資一路意解得行爭奈遇緣觸境依舊透脫不過此無他只是自己分上不曾透頂透底脫略一回大似隔靴抓痒於事何濟如今要脫略一回也無難事只消就本參親切處猛著精神橫看竪看忽爾看破方知殿裏底話乃至如上四種橫議一切處瞞你不得了也吳興真禪人頑石和尚之子掛錫大乘充殿主之職其為眾為己之心打成一片誠慕道衲子也傳頑石之命過余求語於是示以前說而奉饒一偈云如何是佛殿裏底三世如來眼花起燈籠露柱咲顏開咲破虗空半邊觜咄示蜀中果講主即文字之謂教離文字之謂禪禪非外教而禪教非外禪而教教乃有文字之禪禪乃無文字之教曰禪曰教名異實同蓋同一治心之善權方便耳佛說一切法為度一切心我無一切心何用一切法亦如醫方萬品為病證萬差而設苟去其病則溫涼虗實之劑何所施焉彼未達方便之理者乃各私其所宗教則以記持誦習依文解義為尚禪則以拍盲枯坐不涉義路為高各執一是彼此相非苟非徹悟自心親見佛祖善權之意者其是非何自而息哉昔德山和尚以聰敏智辯講貫金剛奧義氣吞江海及乎出峽初見龍潭遽云龍又不現潭又不見早已摸索不著矣至夜參吹滅紙燭處打失眼睛始肯道窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑由是拈一條白棒打風打雨此豈記持誦習依文解義之境界也哉又如圓悟和尚早味禪旨眼空諸方萬里南來諸大老莫不歎異而首肯之既而見東山演祖備呈所解祖曰勤上座你說底是法座頭禪濟不得事圓悟不肯其說拂袖便行後至金山寺於熱病中檢點平生所解底並無得力處乃自省悔再參東山因聞頻呼小玉之話有疑未幾聞鷄聲廓爾脫略始悟前非此又豈拍盲枯坐者所能至是哉夫此二老其初也自謂俊鷹快不受羅籠賴遇本色宗匠以惡辣手與之揭開頂門正眼然後如象王擺脫羈鎻海上橫行如獰龍奮迅于九霄興雲布雨等若遊戲當是時也心法雙泯藥病兩忘佛來祖來退步有分尚何教禪之足論哉蜀中果講主前二大老之里人也舍教而禪篤志于進天目夏罷將理歸楫求語為別舉此似之脫或勇憤不禁脚蹉手跌觸翻灩澦堆踏斷三巴路圓悟德山亦當望塵而拜爾其勉之示昱藏主佛祖無上妙道初非強生節目且非異端揑恠又非甚高難行之事只是你日用常行見成受用底強而名之喚作自性天真佛又喚作自己主人公近而言之你一切時一切處用釋迦老子眼睛耳朵見色聞聲用達磨大師舌根鼻孔出言吐氣極而論之十方諸佛諸祖各各赤窮性命盡在你掌握之中揑聚放開無不由你你若果有者箇操略管取諸佛諸祖向你面前納欵有分就你手裏乞命無由你若未具超宗越格底眼目又無縛虎拏龍底手段未免一切處一切時見色被色礙聞聲被聲礙以至出言吐氣皆是白日青天開眼𥧌語是故圓覺經云由有無始本起無明生已主宰一切眾生生無慧目身心等性皆是無明誠哉是言也既自失其主宰又且聽命於無明由是不能轉物為物所轉一箇娘生髑髏被他穿却一條死活命根被他管却你却甘心向黑暗稠林中粘手綴脚無自由分就滔天苦海裏頭出頭沒無解脫期教中說為真可憐愍勞他古佛世尊不忍坐視拖泥帶水多設方便為你解粘去縛下而諸祖不惜眉毛示汝一機一境一挨一拶如擊石火如閃電光如疾𦦨過風如奔流度刃如金剛圈如銕酸餡百種千般一一控你箇出身之路你若是箇銅頭銕額漢撥著便轉如師子兒向萬仞懸厓一拶便解翻身哮吼一聲百獸腦裂始有少分衲僧氣槩豈不見臨濟大師三度問黃檗佛法的的大意三遭痛棒後被大愚點著不覺打破漆桶却道元來黃檗佛法無多子者箇便是一拶翻身底樣子從此海上橫行作陰涼樹子蓋覆天下兒孫後來白雲端和尚云一拳拳倒黃鶴樓一踢踢飜鸚鵡洲有意氣時添意氣不風流處也風流者箇是通身痛快不忝為臨濟兒孫底樣子吾受業師孫昱藏主勵志參禪果能奮發勇往莫道白雲臨濟當知達磨大師釋迦老子盡在你脚尖頭切忌等閑蹉過示大休永菴主大休大歇乃佛祖力行親到之處謂之大寂滅海謂之實際理地謂之絕學無為閑道人皆大休之異名也如是大休在乎悟證却非說了便休古者謂不學佛法惟務休心休得一分心學得一分佛法休心至于究竟即是學佛法至于究竟然則佛法別無可學惟以休心為學也原夫諸佛眾生同具大心之體徧周沙界無動無遷如太虗空具含萬象曰祖曰佛靡不由之而建立其孰能休之哉今夫所謂休者虗妄攀緣輪迴生死之心耳曠古迨今馳求不息如燈𦦨𦦨似水涓涓此心不休則悟證之理絕矣休心之法須具頂門正眼照破塵勞業識然後盡情放下乃至放下又放下和箇放下也放下縱使根塵同消勞慮永息廓爾悟徹全體現前此猶是小休小歇之地直待掀翻窠臼掃絕階梯迷悟兩忘與奪自在不守一途方便轉身異類中行熾然作用而靡涉思惟不動真機而圓應法界夫如是始有大休分華亭永上人天目斷厓和尚之徒也既以大休為號直須名也大休實也大休說也大休行也大休念念休步步休得休便休一休永休永休須是永大休不至大休誓不休示壽上人一大藏教掛網張風千七百則掉棒打月者箇說話為學者覿面全提最為的當倘非性燥衲僧打破娘生腦蓋向無依倚處著得隻眼者到者裏承當不得未免返被葛藤教網纏繞脚跟觸途成滯或將心意識領取一知半解粘皮綴骨障自悟門謂之雜毒入心如遭魔魅所魘又如認賊為子既為魔賊之所攝持乃向六根門頭弄光弄影口裏邪言崇語惱亂好人他日三寸氣消非持似落湯螃蠏要且閻家老漢打筭飯錢毫𨤲不肯放過在且如宗門垂手機用不同其最痛快最直截者無如臨濟德山臨濟見僧入門便喝德山見僧入門便棒政是盡底掀翻和盤托出向他未喝未棒已前直下領略早是劒去久矣何況當面蹉過却來背地搏量將一棒一喝喚作門庭施設又喚作隨機應用又喚作一期方便塞斷學者喉吻似此要見臨濟德山非但三生六十劫抑且使二老聞之槌胸有分矣大抵學者當以生死未了為要緊大事其餘惡知惡解如經蠱毒之鄉水也莫沾他一滴只就所參話上徹頭徹尾打成一片雖在廣眾中龍蛇混處魔佛交參戲咲怒罵逆順縱橫著著有箇轉身處驀忽黑漆桶子連底脫去等閑開口動舌蓋天蓋地總是自己胸襟流出却將一大藏教千七百則點檢佛祖敗闕方是衲僧奇特處豈肯墯他途轍效今時儱侗者哉廣德東山壽上人銕山和尚之孫也倘依吾說而力行之則異時大振乃祖家聲為不難矣示權藏主古德云參禪須是起疑情大疑大悟小疑小悟不疑不悟然此疑情初無指授亦無方便安排做作等事只為自己生死未明曠劫至今展轉流浪生既不知來處死又不知去處此豈不是真切起疑情處乎從上佛祖雖不參公案話頭惟切切於生死事上疑著疑之不已自然情念消心路絕知解泯能所忘不覺不知忽然明得便是打破疑團透脫生死底時節也近代宗師為見學者不守正念不具正信反於生死之疑不真不切由是教參話頭貴令放捨一切見聞覺知乃至世出世間諸緣雜務單單起大疑情參去離話頭外別無生死離生死外別無話頭話頭既透生死亦明然則從上佛祖因疑生死悟道近代學人因疑話頭悟道所疑雖似不同而所悟之道無不同也今之參禪不靈驗者病在不起疑情處疑情不起病在生死不切處因此不疑不切遂與話頭日踈日遠矣且如兜率道撥草瞻風只圖見性即今上人性在甚處既見得性要脫生死眼光落地作麼生脫脫得生死要知落處四大分離向甚處去如上三關還曾一一透得也無若也未透未免虗生浪死果能於此透得無一絲毫滯礙乃至參底疑底透底和箇話頭打歸自己更無一法當情亦無一法為了為不了方許親到不疑之地示定上人衲僧自己衣單下一著子包括天地洞貫古今雖曰昭昭在前無一絲毫漏透爭奈湊泊他不得捫摸他不著所以三世諸佛費盡口業橫說竪說說不定歷代諸祖用盡工夫逆行順行行不定佛祖既定不得未免誤賺學者心路轉多話頭轉雜千差萬別由此而生永無定當之日矣考夫佛祖之意豈肯特地賺人蓋為者一著子不受人差排不受人指註你要恁麼他却不恁麼你不恁麼他却恁麼雖有百千神通要定定不得故其所說所行不過一期方便萬不得已而然耳然則諸佛言教諸祖機緣流布世間總是鬼神茶飯在學者自己分上有何交涉哉金陵定上人負大丈夫志誓欲定當者一著子其志誠可嘉也且佛祖說底行底猶自用不著何況近時藂林近時宗師近時榜樣與夫山野之語其可取而用哉你若果有丈夫志氣要定也不難但將從昔至今閑雜骨董盡情掃向一壁揑定拳頭咬定牙關立定脚頭單單靠定自己向頂門上突出金剛正眼把他定不得底通上徹下密密捕忽然被你破當知佛祖說底行底總是自家活計由我橫拈倒用說定也得說不定也得我為法王於法自在豈不是真大丈夫能了大丈大事而出類拔萃者哉你若離却自己別靠一著以求解會斷斷不敢相許示記禪人祖師道參須真參悟須實悟閻羅大王不怕多語又云毫釐繫念三途業因瞥爾情生萬劫羈鎻此已是痛心苦口血滴滴地為你說警䇿了也又何待別有所求哉蓋參禪要了生死要脫三界輪迴要透諸祖玄關然後逆行順化接物利生此豈等閑細事所以須真參而實悟也你若參而不真悟而不實未免大開兩眼坐在鬼窟裏引起一種邪見邪解說黃道黑非惟謗正法輪亦且於生死輪迴根本上愈深愈重愈無解脫之時矣若是實悟底人如魚飲水如啞子得夢呈似人不得說向人不得如斬一握絲一斬一切斷又如十字街頭撞著親爺相似一見便見一識便識豈待開口問人然後定其是否哉今之學者但患其不真參毋患其不實悟設或久參而不獲悟者但使其真參之心愈真愈實愈久愈不退轉自然有箇消息來也善記禪者以見解差別來求警䇿我有四句你且牢牢記取參教透了悟教圓佛祖拈他向一邊莫學渠儂昧因果妄談般若罪彌天示心源聚維那識心達本源故號為沙門吾佛垂訓垂誡簡要切當雖一大藏教泛引曲喻瀾翻潮湧浩無邊涯究其指歸未有外乎此者也既為佛之徒心苟不識源苟不達能不愧於沙門之號乎性為心之源心為法之源歷觀諸器世間高下洪纖之萬物苦樂逆順之萬事善惡無記之萬念無一法不自心源變現譬若為江為河為湖為海皆謂之水而世豈有無源之水哉心源本空萬法妄變故學者因念慮事物積妄成迷內外交奔流蕩忘返求其知有心源者鮮矣夫欲識達心源別無奇術惟於念慮洶湧之際用截流機當頭坐斷向事物蔽交之時具透關眼徹底照破倐爾洞見心源如口唇邊摸得鼻孔自然千穩百當不待問人矣政當恁麼時前無釋迦後無彌勒上無攀仰下絕己躬喚作心源早是描𦘕虗空更言識達何異重加五彩明眼人前不直一咲示信維那僧問歸宗如何是佛歸宗云向你道你還信否僧云和尚重言焉敢不信歸宗云即你便是僧云如何保任歸宗云一翳在目空花亂墜者僧可謂具大信力纔聞舉著便乃直下承當得大受用去也今時學者根器不齊於即你便是之談人人知得人人解得人人說得只是承當不得及乎教他提話頭話頭提不起教他做工夫工夫做不上病勢轉深藥頭轉不靈驗此無他正信之心不真不切故爾信為根本一切佛法由此發生信為門戶一切聖賢由此趣入謂信者何信有三種第一須信自己與諸佛諸祖本同一體一切現成若非悟證一回只是箇迷妄凡夫生死岸頭決定不了第二須信佛祖留下一言半句灼然有箇悟處若非真參實究勇猛精進決定無自悟之理第三須信世間名利妄想攀緣政是障道之本若非和座掀翻掃蹤滅跡決定無參學之分有能如是信得穩穩當當如一座鐵山相似一切妄緣妄境穿鑿不入搖撼不動管取日用自然得力而發明大事有日矣示孫養拙居士養拙居士置身於諸緣膠擾之間用心於八面應酬之際其正念不為物轉日究楞嚴圓覺二經而以了義為問了義者非偏小權宜之教乃為圓頓上機稱性而說推窮妄想開示真心極盡根源發揚秘奧一法無餘之謂也楞嚴云一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉蓋妄想乃輪轉生死之根本亦名攀緣心亦名顛倒想如是妄想只在諸人六根門頭情境交接之處且如眼之見色隨色起想耳之聞聲隨聲起想皆由迷却常住真心隨境而轉境順則愛境逆則憎由愛起貪由憎起瞋由此妄貪妄瞋熏成妄業由此妄業招感妄報遂於三界之內七趣之中妄妄相因妄生妄死上從無始劫來下入盡未來際妄受輪轉無有了期故吾佛七處徵心者徵此妄想之心也八還辨見者辨此妄想之見也已而多方引喻種種發明自五陰六入十二處十八界至于七大廣破因緣自然生滅等法無非窮其妄想示其真心必欲眾生返妄歸真頓悟佛性而後已然真妄同源初無二體特因迷倒而有分別迷則依真起妄如結水以成冰悟則返妄歸真猶消冰而為水也圓覺云一切眾生種種幻化皆生如來圓覺妙心猶如空花從空而有幻花雖滅空性不壞眾生幻心還依幻滅諸幻盡滅覺心不動其序亦云迷之則生死始悟之則輪迴息二經所談同一了義同一指趣其要在乎悟心耳故凡學道之士須求正悟倘得正悟即妄皆真觸處融通隨機解脫盡虗空徧法界山川草木日月烟雲萬法縱然法法皆楞嚴之妙體也聲色藂中是非海裏愛憎任性取捨隨緣萬念交馳念念皆圓覺之妙心也回觀二經微言奧義以及一大藏教諸祖禪詮所有礙膺之事可一咲而釋之矣況爾養拙二字亦一返妄歸真之方也誠能去巧用拙存養功深則正悟之期可坐而待也山僧不惜舌長重說一偈以為懸記圓覺楞嚴示密因道人養拙契天真礙無礙境俱超越不歷僧祇獲法身示性空達禪人妙圓覺性本自空寂平等清淨廓若太虗非體狀可以指陳非方所可以趣向非門路可以進入非五彩可以描摹寥寥乎無一物之可取蕩蕩乎無一法之可施超越古今離諸生滅莫可得而形容思議之也由業之所感緣之所會從畢竟無成畢竟有一物既立萬法隨生自是萬境發現萬象橫陳大地山河微塵剎土靡不有焉其所有者非覺性之本有乃情識與緣業交遘而妄有也妄有者如夢幻影響如陽𦦨空花充塞世間亂生亂滅以目前觀之不可謂無究其始終則非實有也蓋情識從覺性轉變而生情識如形緣業如影情識一生緣業即現未有形而不現影者未有影而不隨形者吾之覺性雖能變現情識而不與情識俱變故曰覺性如虗空平等不動轉亦如大圓鏡體本淨本空而妍醜諸像隨至而彰雖諸像有妍醜有去來而鏡體未甞隨其妍醜去來夫是之謂性空也故十方如來體此性空成無上覺一切菩薩依此性空圓脩聖道無邊眾生迷此性空沉墜生死於生死中種種憎愛種種執著從情識而起緣業從緣業而動情識互相膠擾返覆纏綿積生積劫三界往還而不知有性空之解脫也於是諸佛菩薩世起而救之形於語言現於行事推明緣業於塵勞煩惱之中開示情識於見聞覺知之頃令其即妄明真共達性空之理耳能達是理者當機活脫正念炳然於法於塵無染無著不離覺知聞見轉而為清淨智觀不舍煩惱塵勞發而為神妙功用審如是則吾性空之道將與諸佛菩薩覿體無別矣豈止於能達而已哉示西資會道友淨土惟心心外無土此惟心之土其東無東其西無西四維上下含攝無餘所謂十方微塵佛剎者吾淨土中之剎也三世恒沙諸佛者吾淨土中之佛也極樂世界彌陀世尊亦吾淨土中之一剎一佛而已諸法不有之謂淨諸法不無之謂土即真即俗非一非多用常繁興體自清淨染而非染脩而非脩本無心念之可繫往而非往生而非生亦何方所之可指哉由眾生不達惟心局乎現量機根不等證悟懸殊故於一淨土中標列四種曰常寂光曰實報曰方便曰同居同居又二曰穢曰淨常寂為總餘土為別常寂則一餘土則多彼彌陀極樂則又同居淨土之一耳而釋迦世尊獨指彼佛為繫念之主偏指彼土為往生之方者以彌陀願重偏接娑婆眾生亦令眾生繫心一處想念易成近則可感同居淨報遠則可為上三土之因也由是一代時教中丁寧指示勸往者不知凡幾矣如引六方諸佛廣長舌贊則證其往生之信也如寶積經中印許淨飯王及七萬釋種同生極樂則示其往生之驗也又如華嚴末會普賢勸進善財及海會大眾以大願王導歸安養至如觀佛三昧經文殊自敘宿因謂得念佛法門常生淨土則又主伴助揚弘其往生之教也此皆信解圓宗之眾超登地位之人尚願託生彼國然則中根下器容不信且慕乎東土自匡廬遠公及天台賢首歷代聖師得承是教自行化他曰僧曰俗往生應驗者傳記紛然不可得而勝數矣惟禪學之士間有疑焉故永明壽禪師稟單傳直指之道而亦兼以淨土化人乃作四料揀偈其略曰有禪無淨土十人九蹉路無禪有淨土萬脩萬人去此豈自貶其禪耶蓋隨機設化或抑或揚亦且使禪者知淨土之不必疑也至若天衣懷真歇了死心新長蘆賾圓照本諸大禪老兼行淨土之化不約而同是皆善達惟心不局乎禪者也今晦室彰公於天目西菴月建西資會會諸禪侶舉百丈茶毗十念之規推廣為三時繫念佛事斯蓋得於永明諸老之意者歟徑山元叟和尚中竺一溪諸公各贈言以贊之余不獲辭遂引惟心之說以相證云示周仲翔居士物有同類而不同其分者本乎一定之天也大鵬一舉九萬里翱翔雲漢之表視九州為隘而斥鷃之飛不過尋丈翱翔乎蓬蒿之間而已亦各極其力各盡其分耳在人亦然其富貴貧賤窮達得喪之分定于天毫髮不容其損益也昧是分者或求榮而舍辱趨利而避害下則攀緣其上近則覬覦其遠至於勞心焦思有終其生而不得遂其志者非惟不遂其志亦且增其業本也以是知天定之分非天定也乃吾業力所致而定也業力感於前定分應於後業猶因也分猶果也由其業力之萬差故分之優劣豈得而同哉業感之分固不能同其妙圓真覺之道則未甞不同也夫道也者包天地亘古今聖凡愚智靡不具有反而求之無所不達彼達道者盡其性以安其分處卑汙貧賤恬如也無能移其守視富貴聲利澹如也無所動其心既不為物欲之所誘故不為業力之所牽逍遙乎萬物之初翱翔乎三界之外氣類不足以拘之勢分不足以齊之翔雲漢而隘九州者又焉足以知此哉示止照長老由澄諸念靜慧發生諸如來心於中顯現是語也止照之謂歟夫萬法同歸之性海體合聲消常澄常湛或受動於八境之風則情濤識浪洶涌萬端非止無以澄其澄湛其湛也一性圓彰之法界見亡物泯常顯常明稍蒙昏於二障之塵則惑霧迷雲交參萬態非照無以顯其顯明其明也群動既息一波不生萬象昭然無雜無礙則照不離乎止中重昏既清一翳不起十方廓爾無動無搖則止不居乎照外止猶定也照猶慧也以止而照定為慧之發以照而止慧為定之依慧發不枯止足以資照之用定依不乏照足以成止之功止止而遺其照或墯為沉空滯寂之非照照而遺其止或流為察覺審觀之弊蓋止固止乎動亦乃動之根故遺照之止非墯空寂則散亂生焉照固照乎昏亦乃昏之本故遺止之照非流覺觀則沉迷現矣是故止照相須無容其偏廢也然則是止也非本具之止依動靜以彰其功是照也非自由之照假昏明以顯其用既未離乎功用豈得謂之真止真照者哉若夫止功不立照用俱忘然後即動即靜為真照之止即昏即明為真止之照真照之止混乎動靜則百千諸佛入正定於情濤識浪之間而不害其為體合聲消者也真止之照融乎昏明則八萬行門昭正智於惑霧迷雲之際而不礙其為見亡物泯者也至是則諸念不澄而澄靜慧不生而生諸如來心不現而現矣雖欲以太虗之體千日之光喻之者又何翅霄壤也哉曲江真相鑑長老以止照須余語槩論及此鑑其擇焉示曹妙淨居士問三教戒殺因緣戒殺者勸人莫殺物命也物在性命不可殺也報償之理如影隨形殺之必受其報也裴公美曰血氣之屬必有知凡有知者必同體張橫渠曰民吾同胞物吾與也歷觀古君子之言蓋謂物之與人同稟靈知之性也物雖不若人之最靈然其愛身惜命之情畏死貪生之念則與人無少異也靈知既同情念又同故謂之同體也故謂之吾與也吾與者吾儕輩也既為同體之儕輩其可殺而食之乎奈何最靈之人不能禁口腹之欲不能推同體之思不顧其愛身之情不憐其畏死之念往往故殺而食之殺彼之身以養我身害彼之命以活我命仁恕之心果安在哉孔子曰山梁雌雉時哉時哉子路共之三嗅而作朱晦菴引邢氏註曰時哉言雉之飲得其時子路不達以為時物而共具之孔子不食三嗅其氣而起孔子之不食者蓋有所不忍也孟子曰見其生不忍見其死聞其聲不忍食其肉肉尚不忍食死尚不忍見其能忍於故殺之乎孔孟聖賢也聖賢仁恕之心於斯見矣老子曰馳騁田獵令人心發狂又曰射飛逐走發蟄驚栖縱暴殺傷非理烹宰如是等罪司命隨其輕重奪其紀筭筭盡則死死有餘責乃殃及子孫凡孔老二教之聖賢立法化世雖曰不同而好生惡殺之言無不同也至如吾佛世尊則又以業報因果生死輪迴之事詳示而嚴戒之佛之教曰造業為因受報為果死死生生隨業受報互相酬償如輪之回轉也其言十善則以不殺生為最先其言十惡則以殺生為最重殺生之業死墯地獄地獄罪畢復墯餓鬼餓鬼罪畢復墯畜生於畜生中方還宿報殺害者還其殺害食噉者還其食噉還報既畢縱得人身或短命或多病乃至盲聾瘖瘂疥癩㿈疽種種不如意事是皆殺業之餘報也故經云假使百千劫所作業不亡因緣會遇時果報還自受此理昭然可鑒佛語豈欺人哉又曰若殺物命即如殺佛蓋諸佛菩薩誓度眾生以誓願力隨類化身故羽毛鱗甲之中皆有菩薩聖賢之身也何況一切生靈皆具佛性汝若殺之即是殺佛殺聖賢也又曰若害物命即如害父母眷屬何以言之汝從久遠劫來受無量無數生死每一受生皆有父母兄弟姊妹眷屬此無量無數之父母眷屬輪迴於生死之中未能解脫或作大身眾生或作小身眾生水陸飛行滿眼皆是改頭換面各不相識汝若害之即是害父母眷屬也縱不自殺而令人代殺是亦令人以害吾眷屬也哀哉痛哉既告以殺業輪迴之報又喻以聖賢眷屬之身可謂示之詳而戒之嚴矣達是理者佛言可不信乎信是言者物命其可殺乎凡今之人或於血肉之貪未能頓斷者且食三淨之肉漸制其情漸減其業也三淨者吾佛所謂不見殺不聞殺不疑為我殺如是三種名為淨肉權許食之此乃為迷情太重貪欲太深者曲垂方便之言耳其餘或在家或出家稱為聖賢之弟子者當推仁恕之心當起慈悲之念血肉之貪理宜頓絕殺害之業理宜頓斷然後可以頓空罪報頓脫輪迴而頓造佛祖聖賢之域也古德云凡欲殺生者當作自身觀自身不可殺物命無兩般戒之哉戒之哉物命決不可殺也示慈護侍者師子無法教兒直向懸崖一拶要從拶處飜身死活不容眼眨此數語可喻吾宗參學之法也從上尊宿以峻機密用垂手接人往往絕其門路去其窠臼不容湊泊不許躋攀又如推落千丈井中不假寸繩令他自出何甞有一法與人學者能如是自參自究自死自活方許他做得半箇參方問道底真正種草舍此之外或以和會機緣引人落草或以穿鑿知解瞎人眼睛甚至半青半黃打入魔家眷屬古人道醍醐上味為世所珍遇斯等人飜成毒藥此宗門之大患學者當深防而嚴戒者也余受業寺師孫慈護侍者來師子林隨群逐隊將一年忽浩然有歸志出是軸求䇿勵之語因引前喻復示之偈曰老古錐沒頭腦一味隨人顛倒也不會打草驚蛇也不會按牛喫草師子林中師子兒大者大兮小者小趂之不去招不來增亦非多減非少我無一法教渠教是外邊之繞待渠萬仞懸崖自解飜身便了地黑天昏吼一聲瑚枝上日杲杲示同參道有同學禪有同參同參底是禪同學底是道且道先師意是同是別文字失於學問參究缺於悟明且道先師此語是褒是貶世尊三昧迦葉不知迦葉三昧阿難不知且道則上座鼻孔是橫是直生不知來處死不知去處且道生死是何物受生死底是何人宗師家沒奈何說箇生死早是無事生事又說參禪學道分明剜肉醫瘡指望你靈機自發自討箇轉身路你既自無機變未免累他傷鋒犯手有時打破乞兒飯椀有時見你瞌睡送箇枕頭有時用錐錐你有時用鈎鈎你有時以楔出楔有時以毒攻毒有時將烏豆換你眼睛有時用砒礵活你性命盡是應變神機何曾有定法要在學者自識病根自知變證自生轉智自得妙用善於用者老鼠屎勝過龍肝不善用者師子乳不如驢尿所以道燒却醫書方做得盧醫扁鵲因甚學者不參言外活意往往說生死著生死說禪道著禪道說參學著參學說佛祖著佛祖恰似箇黐膠團子東粘西惹轉不乾淨宗師到此弓折箭盡却說達磨是老臊胡釋迦老子是乾屎橛十二分教是拭瘡疣紙別無禪道可學有可學者盡落邪魔外道不如無事好學者聞之又向無事處墮坑落壍左也不得右也不得只道茆長短焉知地不平老漢一生參學遭却多少誤賺曾經巴峽猿啼苦聽著驢鳴也斷腸今日沒興撞著你又來說生說死說迷說悟且如演若達多迷頭狂走迷時頭本不失悟時頭非外得一悟一迷與頭有甚交涉當知此事如太虗空絲毫增減他不得生死迷悟與他有甚相干縱饒你實證實悟倘絲毫證悟之見未忘政是地獄種子先師意未夢見在若遇咬猪狗底手脚痛棒打折你驢腰不為過分你如今要會先師意有甚麼難但將生死迷悟等三檐兩桶酸臭惡水盡底傾飜不留涓滴然後痛加精采直下點檢看一動一靜一語一默一條性命畢竟在甚麼人手裏吽吽者裏却不是戲處點檢不出痛棒打折你驢腰點檢得出痛棒打折你驢腰離此二句別有消息痛棒打折你驢腰為甚如此為你未會先師意在且道先師意畢竟作麼生咄
