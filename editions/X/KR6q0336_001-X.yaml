body:
  text: 小師善遇編示眾師既不住山故無上堂入室等語然或因僧請益或同參激揚或時節應酬或與客道話引證機緣或因事舉古警發初學隨所聞而錄之不擇次第總目之曰示眾舉世尊云吾有正法眼藏涅槃妙心付囑摩訶迦葉廣令傳授師云今日不肖兒孫要問黃面老子者兩件物你從那裏得來諸方有海蠡禪海蚌禪銕剗禪老僧底却是水上葫蘆禪觸著便動捺著便轉活鱍鱍地無你奈何處昨日一陽來復見說生根了也諸人為我提起看執法脩行如牛拽磨關西沒頭腦漢盡力道得一半不執法脩如磨拽牛山僧忍俊不禁也只道得一半休休以何法證以何法脩隨流認得性無喜亦無憂不風流處也風流驀拈主丈云叵耐雲門大師又道觀世音將錢買胡餅放下手却是饅頭卓主丈不因夜來鴈爭見海門秋有時伸出佛手有時放出驢脚錯有時拍禪床有時擊香卓錯有時舌生毛唇生醭主丈長年靠壁角臨濟德山鼻孔一時穿却錯諸禪德向者三箇錯處認得老僧請你喫無麵䬪飥佛祖行不到處行取一步佛祖說不到處說取一句召眾云一舖是九里三舖廿七里者箇是佛祖行不到處老僧行到今日初三明日初四後日初五者箇是佛祖說不到處老僧說到喝一喝寧與有智人𤺊罵莫與無智人說話馬祖喝百丈黃檗驚吐舌不共戴天讐怨氣深入骨雖然三度打臨濟明知彼此無干涉後來臨濟道箇無多子始覺棒頭如銕橛從此逢人喝人政是忍疼不徹向人却道蒿枝拂又道再思一頓無人下手此意誰曾識如今滿眼是兒孫箇箇會喝馬喝牛門庭施設叵耐無人肯耳聾無人肯吐舌只有箇沒髭鬚底胡子路見不平火蛇燒面通身熱諸禪德屈屈趙州道箇無字開口見心肝因甚諸人自生障礙時有僧請益云蠢動含靈皆有佛性為甚麼狗子獨無師云莫說狗子直饒你問他釋迦彌勒還有佛性也無他也道無僧云趙州禪在口唇邊因甚只會道箇無字師云趙州見處只到者裏僧云和尚不肯趙州那師云是僧云趙州是古佛和尚因甚不肯他師云趙州在那裏隨後便喝南泉云我十八上便解作活計趙州云我十八上便解破家散宅師云誰知南泉活計政是破家散宅底山僧敢保老趙州不識南泉窮徹骨錯疑活計是家私却道解破家散宅或者道趙州不錯疑却是和尚錯疑山僧遂撫掌呵呵向他道好好山僧錯疑也好趙州不錯疑更好臨濟云我者裏是活祖師西來意一切臨時要用便用師拈拂子搖曳示眾云我者裏也是活底要用便用一切臨時且道與臨濟底是同是別擊一擊擲下云臨濟猶欠者一著在問話且止直饒問似雲興答如瓶瀉只是閙熱門庭在你諸人分上料掉沒交涉豈不見道言無展事句不投機承言者喪滯句者迷擬心即差動念即乖不擬不動立地死漢故我祖師門下驀劄相逢無你轉身處據令而行無你開口處跨一步去銕壁銀山眨得眼來電光石火三世諸佛現前也只得望崖而退若是箇生銕鑄就底漢等閑一擲抹過太虗直得南山鱉鼻吞却東海鯉魚陝府銕牛撞倒嘉州大象三界拘繫不得千聖羅籠不住從前萬別千差當下七通八達一一現成一一圓妙方信道達磨元是老臊胡臨濟喚作白拈賊雖然恁麼到獅林門下更須朝打三千暮打八百何故如此卓主丈云華岳連天秀黃河徹底清直指人心見性成佛縱橫不是塵撲落非他物等是空拳誑小兒究竟誰曾辦端的徒成一犬吠虗千猱嘷實嘷到如今轉見狼籍只落得錦鯉尾巴焦烏龜眼睛赤則上座眼底無筋腕頭無力朽索御六馬明知六馬御不得捧土塞孟津明知孟津塞不得也要敲東籬打西壁風角鳥占說黃道黑惹得諸人氣不平罵我假佛衣竊佛食是一枚無狀村夫裨販如來之賊如今事不得已只得合掌低頭遙謝諸人曰我不敢輕於汝等汝等皆當作佛萬一不然老僧有箇師子林分付與當來彌勒任諸人狹路相逢一棒打與狗子喫遂拍掌呵呵大咲下座雪峰輥毬禾山打皷趙州道無雲門道普貼秤麻三斤庭前栢樹子古人垂示雖不同各各控你箇入處者裏還有證據也無有趙王因好劒合國人帶刀楚王好細腰宮人多餓死一葉落天下秋一塵起太地收源頭截斷無涓滴萬派百川俱倒流時有僧問既是源頭截斷無涓滴那討萬派百川俱倒流來乃拍手咲而答之我是親見底你是卜度底以拂子打圓相云十方三世一切佛墮在裏許跳不出汝等既是勇猛漢盡力打箇𨁝跳看若跳得出堪與佛祖為師亦與老僧爭氣不然老僧也只得墯在裏許酸醯甕裏多蚊蚋破驢脊上足蒼蠅我者裏沒咂噉沒栖泊有扇打有烟熏貪生怕死漢不用上吾門琉璃光法王子云觀三千大千一世界內所有眾生如一器中貯百蚊蚋啾啾亂鳴於分寸中皷發狂閙逢佛未幾得無生忍老漢竊疑道大千世界眾生聖凡同處其聖位中有佛有菩薩有善知識或說教或說律或說禪各有師承各分主伴各各提唱各各發明乃至向上向下全提半提照用交參機境縱奪總是破執蕩迷革凡成聖之法因甚緇素不分一例比作蚊蚋一例喚作啾啾亂鳴鼓發狂閙琉璃光得與麼生大我慢慢佛慢法慢諸賢聖慢業未除如何亦得無生法忍疑而未決偶爾瞌睡夢見琉璃光變作忿怒夜叉形打我一棒云你不見教中道諸佛出世悉皆如影有所說法悉皆如響你將說底作實法會邪若作實法會即是謗法若謗法即謗佛若謗佛即謗自己若謗自己即謗大地眾生我底慢業可除你底謗罪難懺老漢方擬祗對被他一喝云你喚甚麼作佛喚甚麼作法喚甚麼作自己喚甚麼作眾生語未絕又一喝等閑遭者一棒兩喝不覺徧體汗流豁然眼醒親到不疑之地諸禪德如今汗過清涼也熨斗煎茶進一杯舉譬如牛過窓櫺頭角四蹄都過了惟有尾巴過不得師云者箇是東山演祖不了事處老漢參方三十年也有兩件不了底事是甚麼兩件事飢來要喫飯困來要打眠舉南泉斬猫話乃呵呵大咲云南泉趙州人窮智短相識滿天下知心能幾人僧問南泉斬猫意作麼生答活底自活問趙州救得猫兒又作麼生答死底自死問斬底是邪救底是邪答斬底救底與猫兒都沒交涉僧云某甲不會答你若不會問取兩堂首座紙屏風上畫於菟兩眼通紅似火珠夜來突出一雙角鬪殺楊岐三脚驢汝等諸人上床下地出門入戶各自照管窮性命佛法本無玄妙只要汝諸人各各知道眼橫鼻直便休今我現前一眾有鼻皆直有眼皆橫面面相對那箇不知乃至晝見日夜見星飢喫飯冷添衣燈籠與露柱交參厨庫與三門鬪額者箇是你眼睛鼻孔裏事諸人總知扇子𨁝跳上三十三天築著帝釋鼻孔盞子撲落地楪子成七片者箇是祖師拈弄底諸人也知知則許你知還曾得便休也未既是未得便休且莫等閑放過也須向冷地裏猛著精神自家摸索看忽然摸著鼻直眼橫却來露箇消息喝一喝老僧三十年妄談般若死後當墯無間地獄昨夜十方諸佛生大哀愍同時現前情願墯地獄代我受罪老僧厲聲向他道者箇是我摩裩擦袴做得來自作自受底干你甚麼事諸佛擬議被我一喝倒退三千里諸佛出世為一大事因緣欲以佛之知見開悟眾生山僧亦有一大事因緣欲以眾生知見開悟諸佛汝等還甘此話麼貪恚愚癡是我親莊嚴法報化三身眾生度盡恒沙佛諸佛何曾度一人生死事大諸禪德須是將生死兩字貼在額頭上始得有僧出云某甲不然只將不生不死四箇字貼在額頭上師召眾云者漢元來怕生死如何會得老僧禪遂拈主丈趂出跛者命在杖濟者命在舟有來由沒來由一身還有一身愁衲僧門下奪食駈牛擬著眼看便與閉却戶牖擬開口道便與塞却咽喉夜廊無月不點火露柱從教撞破頭江上漁翁得魚而喜相向而歌曰棟子花開石首來填溝塞壑聚成堆任公徒費釣鰲餌日日海頭空手回任公子聞之不覺手舞足𮛫狂咲不休諸禪德你且道他咲箇甚麼山僧自幼便知有參禪學道可惜不遇人殃殃祥祥弄了一二十年後來被中峯老師折挫一上又被燈籠冷咲一上忽覺腦門熱發滿面慚惶方自信參禪學道是錯用心成佛作祖是錯用心從此一放放下做箇無轉智無出豁漢喫粥喫飯過聽風聽雨眠如今筭來又過二三十年了往往被人問著無以藉口依舊將參禪學道四箇字勸發曰僧曰俗精進修行可謂自不修行令他修行無有是處自不精進令他精進無有是處既無是處合請諸人處斷處斷得公罰錢出院打殺也甘心處斷不公汝諸人性命却在老僧手裏工夫做到極則無把捉處譬如宰臣之家忽遭籍沒父母兄弟妻子眷屬朋伴奴婢誅戮都盡一身萬里居竄逐窮荒之地無一人相識無一人倚靠無一人商量平生受用境界機謀志氣一時喪盡當萬死一生之際自作轉變忽然得箇頂天立地底活計方是男兒大丈夫咄各自鼻孔各自出氣將謂人人似你工夫做到轉身處不知不覺築著磕著者塲痛快舉似人不得譬如窮子久失慈母十字街頭忽然撞見執手牽衣彼此雙淚如雨當此之時只合歡咲因甚却哭不是苦心人不知僧請益萬法歸一話師云青州布衫重七斤趙州無一線遮身譬如趕狗入窮巷轉過頭來亂咬人青州布衫七斤重賊是臨時相鼓籠如今見賊不見贓帶累平民搜地孔師子林下幸自太平不許瞎驢趂隊哄世尊一日升座眾纔集文殊白槌云諦觀法王法法王法如是世尊便下座師云眾中商量道世尊升座入林不動草文殊白槌入水不動波自然海晏河清風行草偃乃搖手呵呵大咲云錯了也錯了也且道是何道理掀翻海岳求知己撥轉乾坤致太平不知不覺忽拶透大地山河顛倒走水底火發燒虗空草木藂林盡作師子吼師云吾祖雪巖老和尚大驚小恠好一塲熱亂顧左右云此事還端的也無待汝拶透來却向汝道雲門云盡大地是箇解脫門枉作佛法會却何不見山是山見水是水師云潦倒雲門前言不應後語如今盡大地人見山何曾喚作水見水何曾喚作山既不作佛法會又喚甚麼作解脫門我眼本正因師故邪邪師過謬非眾生咎喝一喝東海鯉魚打一棒雨似盆傾意作麼生各請下一轉語看良久自代云東海鯉魚打一棒雨似盆傾臨濟云你一念心上清淨光是你屋裏法身佛你一念心上無分別光是你屋裏報身佛你一念心上差別光是你屋裏化身佛師云大小臨濟元來是箇弄光影底我當時若見便與一喝喝住掀倒禪床非惟坐斷渠儂舌頭亦免後代兒孫向光影裏作活計慈悲不是佛忿怒不是魔明州布袋橫拖竪拖人人自屎不覺臭淨潔地上政好放屙金窠草窠相去幾何歲寒落葉無人掃一任門前堆積多舉寶公傳語南岳思大和尚何不下山教化眾生目視雲漢作麼思大云三世諸佛被我一口吞却更有甚麼眾生可化師云寶公思大一人拖泥帶水一人斂手縮脚徐六擔板遭人點檢召大眾云二大老即今在山僧主丈頭上眉毛𤺊結共展神通還見麼拈起一枝無孔笛臨風丁倒兩頭吹天如老漢一箇呆僧爭奈諸人認他不著道他卓卓巍巍他却藞藞苴苴道他藞藞苴苴他又卓卓巍巍或時做知識模樣談玄說妙或時現三頭六臂發瞋發惡如是等處一一認他不著殊不知老漢不在諸人眼睛裏却在諸人鼻孔裏諸人不信伸手摸看縱饒摸他不著也摸著自家鼻孔香嚴道一擊亡所知更不假脩持靈雲道自從一見桃花後直至如今更不疑師云見桃擊竹悟天真莫向燈籠說悟因忽爾被伊開口咲直教無地可容身聖節示眾雲從龍風從虎聖人作而萬物覩古人恁麼贊揚也只見得一半當知道聖中有聖主中有主量括乾坤壽超今古且如何是超今古底句虗空可量剎塵可數新年示眾憍陳如坐堂禾山殷打鼓牛尾巴說禪烏楖𣗖下語說禪云臘月三十昨日去正月初一今日來下語云夜暗晝明去是誰去天高地闊來是誰來獅林好箇上堂被他抄前說了只落得打箇問訊燒香喫茶結夏示眾今晨四月十五諸方浩浩譚禪不是結却布袋便是同泛銕船者裏隨緣度日誰能掘地覓天饑來喫飯困來打眠只有一事不得不向諸人道閻羅老子要打算飯錢老僧夜半得一夢開得眼來無處說盡力呌無人應盡力喝無人知當時諸人政在夢中今日諸人眼開老僧却當說夢第一不許作說夢會第二不許作實法會是什麼床下泥猫兒咬破銕酸餡打鼓上堂入室據座舉揚般若提唱宗乘且拈過一邊著老僧從早起下床屙屎送尿洗面漱口撥火燒香和南問訊喫粥喫飯呼童掃落葉臨水看遊魚一語一默一動一靜將諸人本命元辰恣意賣弄晝夜六時未嘗間歇如今百億須彌山聚在諸人眼睛裏百億香水海灌在諸人耳孔中諸人猶來者裏嫌少在臨濟云我在黃檗先師處喫六十痛棒如蒿枝拂相似師云好箇頑皮癩骨不知痛痒底麤漢何似近代兒孫箇箇皮下有血動著他絲毫不得也奇哉即此用離此用馬祖百丈少賣弄越格超宗有一機說甚麼龍生龍鳳生鳳縱使掣開金殿鎻撞動玉樓鍾也被端禪師道破弄到帝王前一場乾打閧到恁麼時還有舉似處也無有金毛師子尾吒沙口縫未開乾坤震動知見無見斯即涅槃師云明眼人前三尺暗賓中無主主無賓夜叉拈起吉橑棒打落松梢月一輪見見之時見非是見師云海底波斯失却金雙盲婆子草中尋夜深摸得松毛刺走徧東村呌賣針釋迦未生以前還有佛法也無達磨未來以前還有禪道也無傍有僧云和尚說法說禪盡是偷竊古人底豈不見法華舉云釋迦不出世達磨不西來佛法徧天下談玄口不開師云低聲低聲法華舉也是白拈白雲端和尚云古人留下一言半句未透時銕壁相似一日透方知自己元是銕壁如今作麼生銕壁銕壁師云白雲被鐵壁透打失一隻眼睛竪拂子召眾云萬法歸一一歸何處拂子是萬耶非萬耶是一耶非一耶自代云來說是非者便是是非人擲拂子下座老僧從十歲以來拍盲學坐將貪瞋癡當頭按下後至天目山遭兩場屈事第一遭人冷地咲破第二遭人捏住咽喉因此撞起貪瞋癡熾然發現捺不住如今年老成魔索性將錯就錯以主丈畫一畫多少人到者裏不得多少人出者裏不得他人愛底我也愛他人怕底我也怕也曾怒罵他人也受他人怒罵他人敲鷄卵尋骨頭我也鑽虗空覓縫罅雖然百事雷同却有一般希差以手槌胸云莫道無相識相識滿天下諸人在者裏討甚麼碗棒喝交馳接後昆諸方何處不開門老僧無這閑施設只是如常箇老僧臨濟一喝不作一喝用字經三寫烏焉成馬老僧一喝只作一喝用臭肉爛鮓賣與要者有過無過諸人試定當看喝一喝淨髮次示眾殿前地是側塼鋪寸草年深根也無有箇師姑要還俗夜來剃却赤鬚胡韓信云狡兔死走狗烹高鳥盡良弓藏他雖是箇殺人不眨眼底大將軍却也做得半箇禪和子初參蒯通不被人移換好次參高帝𢬵得大死一回亦好若更得絕後再甦一著天下人不奈他何噓臨濟下兒孫都是白拈賊賊眼明如燈能見暗中物現前一眾各守清規齋前參後不許開櫃阿呵呵也是過後張弓富嫌千口少貧恨一身多若是半貧半富底口數尚可酌量若是不貧不富底佛也處分不得須是打殺家長始得一手指天一手指地曰天上天下惟吾獨尊師召眾云者箇是誰語僧擬對驀拈主丈云莫謗佛良久云莫謗老僧又良久云莫謗自己又良久卓主丈云三段不同收歸上科捨得赤窮活計與你一場富貴乃長噓一聲云今人少信龍王留取夜明珠乞兒留取破蓆袋狗子佛性有狗子佛性無功德天與黑暗女一條主丈兩人扶夜來齊發一咲咲道丹霞燒木佛院主墯眉鬚咄舉拂子云只者些子不直半錢指揮佛祖號令人天即今分付諸人去也擲拂子喝一喝下座臨江能藏主至示眾徑山龍王怒即好鬪驪珠搆得還他且免貪前失後掉臂出關清風滿袖換却世間人眼睛自有臨江軍黑豆金剛圈被人透了栗棘蓬被人吞了老倒楊岐伎倆已盡天如則不然禪客相逢只消道箇吽吽直教他透不得吞不得蘇州百萬倉前昨日二三十輩枷項杻手如柳穿魚今朝米債已還各自歸家穩坐惟有長連床上客無繩自縛苦憂煎禪債至今還未得不知何日是歸年文殊普賢昨夜起佛見法見貶向二鐵圍山古人用處偏枯有前無後我者裏家法又別直饒不起佛見法見也須貶向二鐵圍山何故賞則俱賞罰則俱罰三界無安猶如火宅昨日傍州有信來一火洞然成瓦礫誰知老僧者裏全身坐在火中四面熾然臭烟蓬㶿諸人還能相救麼若救得賞你大白牛車若救不得各家掃取門前雪鎮州出大蘿蔔頭宣州出好花木瓜相國寺裏芭蕉樹風吹雨打彷彿破袈裟諸方大有奇特事師子林下無足誇地爐燒栢子蒿湯當點茶老僧與諸人共一條性命生同生死同死樂同樂苦同苦絲毫無間隔頃刻不相離雖然如是大事為你不得小事各自支當棒如雨點喝似雷奔朝打三千暮打八百呵呵大笑云他家自閙我國晏然有般漢便道老和尚錯了也鍾須鍾鳴鼓須鼓響無事無為是金鎻難老僧直得無言可對乃以手自摑口云只好喫現成粥飯什麼人教你閑多管如何是佛麻三斤如何是佛乾屎橛如何是佛殿裏底三文大光錢買一箇油糍喫在肚皮裏當下便不飢鮎魚上竹竿胡孫入布袋衲僧面前一揑粉碎所以道不見一法即如來方得名為觀自在僧問投子同和尚云一大藏教還有奇特事也無同云有僧云如何是奇特事同云演出一大藏教雲巖新和尚云演入一大藏教大慧杲和尚云演出演入則不無二大老若論奇特事三生六十劫未夢見在師云藂林商量都道大慧不肯二老若作恁麼商量三生六十劫未夢見大慧在單單提一箇無字如靠一座須彌山擊拂子云須彌山崩了也崩後如何看脚下山中何所有嶺上多白雲阿呵呵箇是眾家之物誰敢私而有之雖然如是只可自怡悅不堪持贈君舉百丈野狐因緣師云前云不落後云不昧引得野狐隨羣逐隊喝當時若下得者一喝前後五百生一時粉碎心是根法是塵兩種猶如鏡上痕召眾云心法既是根塵且道鏡是何物擊拂子云打破來與汝相見主人嫌客客亦去客嫌主人客亦去莫若隨家豐儉大家相聚喫莖虀何故曾為浪子家無小使釋迦老子推不開達磨大師趕不出引得一畆之地三蛇九鼠盡道呼蛇易遣蛇難拍膝云有甚麼難家有白澤之圖必無如是妖恠起滅了無根本大似鑊中湯滾上頭攙水不如下頭退火者箇譬喻還當得參學事麼撫掌咲云若當得參學事飯頭火工悟道多時也千尺絲綸不為盲龜跛鱉千鈞強弩不為鼷鼠發機師子不食鵰殘俊鷹不打臥兔從上尊宿都曾恁麼說來老僧更說箇甚麼殺人須用殺人刀活人須用活人劒古人用處固是老漢者裏不然活人須用殺人刀殺人須用活人劒伶俐衲僧一任疑著靜時聒聒閙時悄悄小中現大大中現小一莖草丈六金身丈六金身一莖草饒君百巧千奇不如㘞地一聲好喝一喝錯會不少女子臨出嫁時治家作活之法一一請教父母惟有生子養子不待教而自能所以俗書云未有學養子而後嫁者也誠哉近代宗門衲子則不然先學說法然後學做佛寧可不做得佛不可不會說法恠哉開浴次示眾鶻臭布衫都脫盡一絲不掛見全身入門莫道無知識壁上燈籠解咲人世尊昔日拈一枝花迦葉破顏微咲老僧今日拈一炷香一眾低頭合掌今古事分明有何差異處因甚世尊大驚小恠却道吾有正法眼藏涅槃妙心付囑摩訶迦葉潦倒瞿曇好不丈夫金色頭陀好不丈夫遂成殃及兒孫未能盡絕人事乃以手左右相揖云喫茶去喫茶去隔江招手橫趨望見剎竿回去知有般事便休何用傷鋒犯手却咲老百丈遭逢馬大師始則扭折鼻梁次則耳聾三日枉討許多辛辣喫遂喝一喝云馬大師來也口是禍門合取好雪中客至煨芋作供次示眾懶殘捉我芋頭煨羨我深居似大梅有客無端來借問一花五葉幾時開蘇州呆蘇州呆門外雪成堆徹骨還他凍一回杭州新到僧請益次示眾佛法下衰藂林秋晚賢聖隱伏邪法增熾咄是何言歟四五百條花柳巷二三千處管絃樓你信誰道蘇州有常州有僧問雲門如何是西來意門云長連床上有粥有飯師云跛脚大師只會現成受用不知稼穡艱難若問老僧却向他道元日人日未有不陰料想今年桃李貴不如井底種林檎人從江西來接得湖南狀告報懷州牛喫禾益州馬腹脹師子林下燒湯點茶閑看茶童三馬九亂佛來也請居門外那有閑房著白雲老僧者裏不是不開門戶不容物蓋不欲與諸方攙行奪市你如今口喫諸方飯頭戴諸方屋呈拂子云惟有鼻孔眼睛却在老僧者裏諸禪流莫妄擬擬著是非蜂起差之毫厘失之千里擲拂子下座飛來峰頂猿不受人羈鎻我不敢望你息却喜風滅却瞋火但望你一飽忘百飢暫時無彼我識得淡中滋味長酸梨不換頻婆果舊同行至示眾透網金鱗何似不入好忽然會得箇入處不是同行也大難有時句到意不到有時意到句不到有時同中有別別中有同有時似同非同似別非別所以道舉不顧即差互嫂嫂雖是大哥妻師姑却是女人做昨夜曼殊徧吉二大士諍論佛法不已被我一喝云住住聽分付玉泉浩公著你在布裩帶上國清寺裏教你燒火掃地如今在我者裏橫草不拈竪草不捉喫了現成粥飯更要爭閑氣何不忖思來處於是二大士一咲而解見性成佛賺殺多少人都道成佛要緊見性不要緊成佛念頭急見性念頭寬其奈轉寬轉遠轉急轉遲只貪飯好喫不信是米做山僧今日隨機應變為他掇轉話頭改作見佛成性又不然改作成佛見性豈不快哉有箇漢却又罵我顛倒不順理遂欵欵向他道君不聞聖性無不通順逆皆方便也罵我不得也罵你不得且待明眼人斷父母未生前與汝相見了也還識老僧麼識與不識且過一邊眼目定動劈胸一拳有箇漢識得破佛也不要做老僧大展三拜為他證明三世諸佛歷代祖師天下老和尚有口只堪掛壁江陵周善宗為重建小飛虹橋示眾小飛虹在獅林裏橋下竹風涼似水舊虹飛去新虹來我跨虹飛從此始諸人一任往還兩岸且無彼此脚踏實地如象王翻身一躑如師子諸方尊宿垂手不同有門外垂手底有門裏垂手底或謂門外大奢門裏大儉又謂門裏大奢門外大儉一等是入草求人裏外未免相咲相咲且莫問且喚甚麼作門若道無門為法門又喚甚麼作裏外學者用盡氣力貴圖省力用力圖省力錯了也不用力圖省力又錯了也且如何得不錯去不許夜行投明須到諸人還知山僧立地處麼仰面是天堂低頭是地獄還知山僧落處麼水裏好打眠火裏好洗浴國清寺裏炙茄次維那被拾得打一竹串維那呌云看者風顛漢拾得云蒼天蒼天寒山問云你打他作麼拾得云費却多少鹽醬師云大樹大皮褁小樹小皮纏維那既受拾得點檢拾得也合受人點檢還知拾得合受點撿處麼試道看衲僧門下有收有放放也春潮帶雨晚來急收也野渡無人舟自橫不收不放時如何不是弄潮人休入洪波裏玉龍攪海千江漲巡海夜叉鞭鐵棒驚起陝府銕牛吞却嘉州大象汝諸人揑定死蛇頭不得動著動著便三十主丈承言者喪火裏死水裏葬滯句者迷上脚土下脚泥不承言不滯句大江東流夕陽西去蔣山藏主至示眾全提半提全藏半藏十寸是一尺十尺是一丈尺有尺形剪有剪樣拂子也用打圓相楖𣗖橫挑不顧人誌公豈是閑和尚覿面來時如何分付與典座有漏笊籬無漏木杓小乘錢貫大乘井索學得者般答話一日可答千萬轉轉轉不錯及乎問著主人公却又不知下落靈龜只會靈他人未死遭人鑽出殻施主做木龕成示眾生死與涅槃六六三十六無常等不來我且先瞑目諸禪德且道天如即今是死是活死却活天如活却天如死佛佛受輪迴只為者些子依圓覺上期一百二十日掩室安居書偈於門示眾平地牢關立一重佛來無路得相逢分明只在尋常處如隔千峰與萬峰道友曾貫之為定水西原塔基示眾我與諸佛祖同樂亦同苦同死同時埋同坑無異土雖然恁麼就中也有些子不同處老僧今日預先分付下土掩壙時諸人著眼看伏死不伏埋從來是者漢因事示眾以拂子擊禪床左邊云莫認錯莫認錯通身是病通身藥擊右邊云莫錯認莫錯認通身是藥通身病竪拂云如今藥病兩忘諸人還見麼三錢賣却黑撈波打瓦鼓唱村歌隨處薩婆訶擲拂子下座除夜示眾欲達佛性義當觀時節因緣舊時官歷賣不直錢師子林下別有說焉過得臘月三十日明朝決定是新年普說結夏前十日遠近禪侶共集立書記詎藏主請為普說師云壓石取油敲氷覓火諸方大有不甘底賣水向河頭教胡孫上樹我者裏也曾咲人如今事不得已移高就低竿木隨身逢場作戲若是久經行陣底不應袖手傍觀出來遞相鞭逼看僧問佛佛授手祖祖相傳畢竟傳箇甚麼師云脚未跨門與你三十了也問達磨不來東土二祖不往西天還有為人處也無師云有進云且如何是和尚為人處師云浴院裏燈籠咲破半邊口進云莫便是學人轉身處麼師云上天無路入地無門進云今日多幸得聞師子吼也師便喝僧禮拜師云拜即任拜者一喝不曾倒地在乃擊拂子召眾云聲前一路千聖不傳不離當處常湛然喝信手拈來萬化千變覓即知君不可見喝且道者兩喝是同是別若道同爭奈是兩喝若道別爭奈只一般者裏會去火𦦨不妨蚊蚋泊者裏不會藕絲牽動銕崑崙你若是箇拗性漢不問會不會不問同不同將古人說底兩句山僧喝底兩喝同時颺在他方界外却看無依道人弄出神頭鬼面有時吞却十方虗空教一切有情無情都無出頭分有時放出山河大地任他森羅萬象徧界縱橫到者裏喚作不離當處常湛然也不得喚作覓即知君不可見也不得分身兩處看也不得併作一處看也不得取不得舍不得不可得中只麼得還會麼惟證乃知難可測諸禪德宗門下者一著子妙在自證自得其自證自得之妙乃是箇活脫無依底道理傳不得教不得學不得擬不得智如鶖子思量他不得辯如滿慈分別他不得自有宗門已來都道有參有學誰知道自證自得底與參學料掉沒交涉世之所謂學得底說得底盡是情識依通知見解會政是無量劫來生死根本縱饒你宿熏智種不被情識所遷生具正因不遭知解所障體認得倜儻分明猶是死法望他活意萬里崖州盡理言之縱饒你學得契佛契祖說得契佛契祖倘未到活脫無依田地未免都是死法所以臨濟大師道我者裏是活祖師西來意要用便用一切臨時前輩大達之士得者些子活脫道理隨機應變逆行順行誵誵訛訛千奇萬恠謂之大用現前不存軌則直是無你湊泊處只如歸宗赤眼禪師一日剗草次有座主僧來參偶見一蛇師即鋤斷之僧云久嚮歸宗元來只是箇麤行沙門宗云你麤我麤者箇公案藂林把做誵訛看殊不知歸宗老人坐在活脫無依處所以橫拈倒用一切自由你若未見此老落處安知此老用處既未知此老用處爭恠你喚作誵訛又如丹霞和尚至一村院值雪寒乃取木佛一尊燒火向院主恠問之霞曰燒取舍利主云木佛那討舍利霞曰既無舍利更燒一尊主怒而詬之明日院主眉鬚墯落者箇公案更自誵訛據理論之安有我作他受之理既無此理畢竟如何湊泊後來真淨和尚住歸宗舉赤眼因緣乃云大眾只如赤眼斬蛇向其僧道你麤我麤且古人見處作麼生遂舉拂子云今日歸宗舉拂子與當時歸宗斬蛇是同是別良久云人人有箇天真物妙用縱橫總不知今日分明齊指出斬蛇舉拂更由誰者箇老真淨雖為赤眼善巧分疎爭奈𦘕蛇添足轉見誵訛又舉丹霞燒木佛院主眉鬚墯落驀拈主丈云不是木佛便擲下云誰敢燒你擬即眉鬚墯落不擬又且如何遂高聲呌行者拈起主丈此老可謂不惜自己眉鬚要與古人盡力包褁爭奈濕紙裹大蟲且道誵訛在甚麼處諸禪德要見丹霞赤眼橫拈倒用為人處直須親到他活脫無依境界始得此話且止當知說箇活脫無依早是不得已向無名字中強安箇名字彼自證自得底他也不知是活脫境界隨機應變時他也不知是活脫妙用如今人聞箇活脫名字便準擬打箇𨁝跳指東劃西胡揮亂霍將謂是活脫元來却是死法中之死法矣蓋此活脫境界本無定方所以指示人不得前輩得之者亦無定法所以準擬湊泊他不得只如俱胝和尚住庵時有一尼戴箇笠子來繞他三帀三問云道得即放下笠子俱胝道不得尼便行俱胝云何不且住尼云道得即住俱胝又無語尼遂去俱胝深自愧歎後來舉似天龍和尚天龍曰你問我我與你道俱胝曰道得即放下笠子天龍遂竪起一指俱胝忽然大悟自此凡有所問只竪一指常自謂我得天龍一指頭禪一生受用不盡俱胝身畔有一供過童子每遇人問他事他也學竪指祗對俱胝聞之乃潛一刀在袖中喚童子近來問云聞你也會佛法是否云是俱胝遂問如何是佛童子便竪起指頭俱胝即以刀斷其指童子呌喚走去俱胝復喚童子童子回頭俱胝再問如何是佛童子再將手起不見指頭忽然大悟諸禪德當初俱胝答尼話不得時不是不會佛法只是會得箇死法及見天龍竪指方悟得箇活脫底童子學竪指時也只學得箇死法及見無指頭方悟得箇活脫底取要言之俱胝因見指頭得箇活脫童子因不見指頭得箇活脫看他兩人得處自是兩般何曾有定法既無定法你且準擬向誰邊湊泊又如香嚴和尚昔在百丈會中問一答十問十答百後到溈山溈山向父母未生前拶他一語乃不能答既而徧搜平日所解所記竟無一語可酬遂求溈山說破山不肯說於是發憤盡棄所學直入南陽住菴一日因擲瓦礫擊竹作聲乃悟即說頌曰一擊亡所知更不假脩持動容揚古路不墯悄然機云云諸禪德香嚴在百丈溈山會中時不可謂之不會佛法只緣會得底也是死法直待盡情放下放下到亡所知處忽爾得箇活脫便解道動容揚古路不墯悄然機你看香嚴得處又與俱胝兩人不同此豈有定法而可湊泊者哉後人不曉將謂亡所知與枯木頑石相似便擬忘形死心去湊泊他如此湊泊政是能知所知熾然競起要到亡所知處驢年也未夢見在後來大慧和尚為嫌學者妄擬湊泊皆是見境生情隨語生解欲救此病乃曰俱胝得處不在指頭上香嚴悟處不在擊竹邊大慧此語恰似向走盤珠上撥一撥愈不容其湊泊矣此話且止當知說箇得字說箇悟字又比之如大醉忽醒大夢忽覺亦是不得已強立對待之名且如不飲酒人本自無醉何消說箇醒字眼若不睡諸夢自除何勞說箇覺字若是不迷不失底人向他說箇得字悟字堪作何用豈不見祖師道迷時只迷悟底悟時只悟迷底迷悟兩忘直下是甚麼既知此說便當知佛法二字總是不得已假立對待名句表顯之談應病之藥耳你若坐在無依田地既不見有凡夫眾生又不見有涅槃生死然則佛法二字於你分上有何用處故南陽忠國師云踏毗盧頂上行說甚麼十身調御既知假立對待之說便當知曰佛曰法曰眾生曰國土俱從無依建立是故臨濟和尚云無依道人是諸佛之母佛從無依生若悟無依佛亦無得所謂一剎那間遊履三眼國土入諸佛世界入眾生世界入諸魔世界乃至徧入一切真俗淨穢等法界而不著不礙者總是自己無依道人翫弄神變遊戲三昧放去收來得大自在處也因甚近時諸人拋却自己神通妙用却乃波波地向心外求佛心外求法外求有相佛與你不相似心外本無法求者轉非真何況拖箇死屍上人門戶求語言求知解以為參學苦哉屈哉祖師萬不得已向你道參須真參悟須實悟閻羅大王不怕多語此乃望你離却語言文字知見解會扣己自參以求自悟你既不肯扣己自參以求自悟却更外邊運糞入𡎺滿一肚皮自既不知臭穢又將吐出熏人豈不是大苦大屈者哉近代宗門稱參學者十箇五雙皆坐此病蓋由最初不具眼目錯將表顯方便之談作實法會了不覺全身坐在佛法知見解會之中引得心裏沸啾啾地口裏水漉漉地說玄說妙說奇說怪非惟因此障却悟門亦且因此造無間業如來說為真可憐憫間有一種學者能向者裏返省而知非幸而不遭佛法知見解會所障却又坐在無佛法知見解會之中開口動舌只管山是山水是水天晴地乾雨落地濕如何是佛殿裏底如何是道門外底一味平常蓋覆打歸無事甲中平地上死人死了活不得此亦名為真可憐憫又有一種學者能向者裏返省前面二者俱非二俱遠離單持正念幸而做到身心寂滅前後際斷一念萬年去却又坐在乾淨田地上自以為究竟於是祖師呵責之謂其被勝妙境界障住正悟不得現前此亦名為可憐憫者又有一種英俊上士能向者裏透得過又能懸崖撒手絕後再甦實有所悟實有所見祖師亦復呵之謂其坐在解脫深坑見地不脫礙正知見纖毫未盡猶隔鐵圍雪巖和尚亦云政恁麼時須見人坐在者裏成法塵盲枷瞎棒打得脫要用便用無疎親祖師重重逼拶之意無他惟恐你凡性雖盡聖見未忘不得到活脫無依田地信知宗門下者一著子大非容易何況今時有一種掠虗漢不曾見好人不曾做真實工夫脚下浮逼逼地面前黑漫漫地便爾拍盲胡說亂道於中亦有曾見好人曾做真實工夫底或因志氣狹劣不耐長遠而自退者或因障難折磨不能堅忍而自屈者或因塵勞蹔息便以為是而自誤者或因得箇入頭便以為足而自畫者或因師家錯謬隨邪倒見而自陷者或因藂林中以名位相驕勢利相勝激發狂妄而打失初心者又或最初發心半真半假一半心要了生死一半心要做善知識急不能悟而假稱悟者此等皆非真正種草病在好為人師急求恭敬供養從而學打口鼓妄談般若乃至用棒下喝搖手竪拳杜撰狂言恠語頌話頭頌公案說做處說悟由用冬瓜印子引惹一隊邪神野鬼閙熱門庭弟子與師魔魔相黨甚至於揑合機緣編入語錄安排名字插上祖圖自謂瞞得一切人爭奈有箇無面目漢不被你瞞留箇無間鐵圍待你來供養你在似者般盲盲相引誤陷後昆底爭恠得祖師道就糞掃堆頭活埋却千箇萬箇有甚罪過山僧從小年來聞有宗門下事也學坐禪惜乎不遇惡辣鉗鎚未免也被一知半解所障又被一種速求開悟底心梗礙胸次自不知其是病及到天目依附幻住老和尚每每見他道老幻一生參禪不得開悟我心中竊有所疑後來方知老和尚具大人相不險不恠不矜不誇他平生不肯自說悟由得處而又嚴約參徒潛行密用者意在使今時未得謂得未證謂證妄稱知識誑謼閭閻之徒知所羞媿知所畏懼此政是切救今時墮邪之病以為後學掠虗之戒者也宗師為人處局面時時新至此老又是一番變局豈常情所能測哉山僧雖是依附多年要且一法無所得非但一法無所得更且和我從前所學所解底一時打失了以是之故自知恩大難酬因而索性放下山邊水邊做一箇萎萎隨隨無出豁漢但是此老平生諱忌底約束底不敢輕易動著如是者二三十年矣今日因人逼請普說不覺路見不平嘔出許多狼藉大似風邪惡犬不顧好人一例狂吠若論糞掃堆頭活埋底少我一分不得今此現前一會禪德賴是純真潔白未中雜毒之士於我如上所說底不許記箇元字脚但當信取自家有箇活脫無依底活鱍鱍地無所滯礙雖無形狀無處所而能通貫十方徧入諸法一切神通三昧變現自在不少一絲毫六道神光晝夜未甞間歇不用安排不容揀擇直下體取便是一念相應便是要得一念相應但放下世間出世間事休歇世間出世間心不得嫌事礙心不得將心避事你但一切時一切處於心無心於事無事自然左右逢原所以道直下便是天寬地平要用便用一切現成豈不省力豈不慶快平生萬一不然別無方便且只短中求長單單守取箇所參底話却不得別起第二念穿鑿註解不得聽其自然打歸懵懂袋裏去不得撑眉努目強著氣力剋時限日速求開悟不得特地寬展程期待其自悟不得於境緣紛亂處倉皇失措不得於境緣寂靜處放曠自如又不得盡依古人硬法度當知各人做處各各不同宜自調停自作轉變要在歷歷常現前步步不相離忽然守到無滋味處無倚靠處無可奈何處如墮坑壍之中進不得退不得那時政是好消息也切須緊把繩頭拶將去拶到水窮山盡處自然有箇轉身時你若不能直下體取又不甘守箇無義味話急要說禪說道舍此真參別求佛法知見解會願作魔家眷屬此亦隨汝顛倒所欲一任學取傳取一任高揮大抹只恐一氣不來打箇筋斗撞著閻鬍子不肯讓人情橫撑銕面皮佛也救不得若是真正丈夫即今便合猛省珍重冬至節覺義上人集諸禪友請普覺僧問如來一音說法眾生隨類各解未審和尚如何為人師云蝦䗫𨁝跳上天蚯蚓驀過東海進云恁麼則超佛越祖去也師云你向那裏見得進云今古應無墜分明在目前師云杜撰禪和退後一步僧云臨濟三問黃檗佛法的的大意三遭痛棒此意如何師云愁人莫向愁人說進云後被大愚點發却道元來黃檗佛法無多子此又如何師云愁人好向愁人說進云此是大愚分上黃檗分上師云你且自道看僧云龍得水時增意氣虎逢山色長威獰師云此是黃檗分上大愚分上僧擬議師遂喝僧云臨濟兒孫天然有在便歸眾師乃云如來一音演說法眾生隨類各得解因其各解乃顯普解因其普解乃顯普說說若不普解亦不普是故說一字一字普說一句一句普說漸漸普說頓頓普說事事普說理理普說而默默普默而說說普山僧早刻承諸人啟請普說故借禪客所問略明普說之義此說且置只據目前孤明歷歷能聽普說底是誰能解普說底是誰合掌問訊底是誰低頭禮拜底是誰諸人各自點檢看你莫強支吾便道能聽能解底是我主人公我且問你主人公是長是短是大是小是甚面孔是甚模樣是在甚處安身立命直饒你知得分明見得分明說得分明我更問你能知能見主人公底是誰能說是我主人公底是誰你爭知說底見底如底和箇主人公都是假名字道是也不得道非也不得道亦是亦非也不得道非是非非也不得須是自悟始得豈不見祖師道即心是佛又道非心非佛又道不是心不是佛不是物你且道不是心不是佛不是物畢竟是箇甚麼者裏若非悟去便擬強說是我主人公得麼所以山僧往年在淨慈寺結夏秉拂有僧出問不是心不是佛不是物是箇甚麼我乃隨口答云不是心不是佛不是物是箇甚麼僧云者箇是某甲問頭何不別道一句我又答云不是心不是佛不是物是箇甚麼別道了也僧罔措我便喝復顧左右云主丈在不在主丈若在則上座自合喫三十當時與麼提掇可謂太煞直截者僧不瞥地也是箇瞎漢點檢將來總是殘羮餿飯不堪咬嚼如今在師子林中合為諸人別作供養諸人既識師子林還識老僧麼老僧是箇無牙無爪底呆師子也不曾𨁝跳也不曾哮吼多少人望風而退多少人過門不敢入或者疑信相半好惡相半贊毀相半老僧都不管只管閑閑地獨行獨坐怡怡然自咲自喜賴是無人識我若使人人識我我又堪作何用今日無端被汝諸人不顧身命撞在這裏相挨相拶所謂狹路相逢不容迴避若不將本分草料供養三十年後也道曾見老僧來豈不遞相鈍置適來禪客道臨濟兒孫天然有在老僧亦道諸人入此門者都是臨濟兒孫切不得自生退屈彼既丈夫我寧不爾臨濟眼橫鼻直諸人鼻直眼橫覓一絲毫異相了不可得覓一絲毫同相亦不可得既是吾門種草誰管是異是同滅却正法眼藏扶起臨濟正宗且臨濟正宗作麼扶起扶起三玄三要邪扶起四料揀邪扶起四賓主邪扶起四喝邪且喝是粥飯氣阿誰不會你看田夫使牛也喝祗候引馬也喝樵子見蛇也喝乞兒趕狗也喝賭坊裏攧錢也喝使長罵奴婢也喝總是一等粥飯臭氣如何喚作臨濟正宗縱使道一喝分賓主照用一時行會得箇中意日午打三更者箇說話也只瞞得諸人瞞不得老僧諸人試驗看良久喝一喝云此喝未形以前賓主照用是有邪是無邪此喝既消之後照用賓主是無邪是有邪正當喝時主賓照用在喝裏邪在喝外邪在不裏不外邪又喝一喝云者一喝却將箇中意一時說破了也也只瞞得自己瞞不得諸人諸人也須日午打三更始得據老僧與麼批判還扶得臨濟正宗起麼既扶不起敢保臨濟正宗決定不在照用處不在賓主處不在四喝處不在四料揀三玄三要處總不在一切處既不在一切處畢竟在甚麼處只在諸人自己分上諸人當知自己分上一著子烜天赫地三世諸佛歷代祖師天下老和尚不敢正眼著只貴當人直下承當便了前輩尊宿為你不肯直下承當萬不得已曲垂方便教你參箇無義味話只如僧問趙州狗子還有佛性也無州云無早是和盤托出你既不能領略萬不得已作死馬醫又教你單單提一箇無字先將四大五蘊六根六塵六識乃至目前所見山河大地明暗色空萬象森羅情無情等都盧併作一箇無字一提提起行也恁麼提坐也恁麼提睡夢也恁麼提起居飲食皆恁麼提綿綿密密提無間無斷提提教凝然一片針劄不入與銀山鐵壁相似忽爾不知不覺一拶拶透自己一著子不待承當而自然分曉矣者一著子既分曉父母未生前面目也分曉四大分散後落處也分曉日用中事也分曉老僧舌頭瞞你處也分曉從上佛祖千差萬別誵訛處也分曉既爾一一分曉即是扶起臨濟正宗底時節也當此之時世法佛法了無縫罅便見三玄三要四料揀四賓主四喝以至四大五蘊六根六塵六識山河大地萬象森羅無一法不是臨濟正宗不待扶而自起也然後剗除也得建立也得與三世諸佛把手共行也得教三世諸佛向我背後叉手也得是謂我為法王於法自在者也老僧今日事出急家門舌頭拖地眾中還有直下承當得底麼若有試呈伎倆看若無莫恠老僧傍若無人開大口說大妄語滅却正法眼藏去也阿呵呵且莫錯會好驀拈主丈云毒藥醍醐醍醐毒藥錯與不錯吞却不如吐却卓主丈下座
